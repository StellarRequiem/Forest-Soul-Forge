# Forest Soul Forge frontend — nginx server block.
#
# Design notes (for audit):
#   * Explicit MIME types for JS/CSS. Alpine's bundled mime.types is fine but
#     we re-declare application/javascript for .js to guarantee ES modules
#     load correctly in every browser version.
#   * gzip on for text assets — ~5x reduction on the JS bundle.
#   * Short cache on index.html (must-revalidate), long cache on hashed
#     assets. The frontend doesn't hash filenames yet; when it does, flip
#     /css/ and /js/ to `immutable` + 1-year max-age.
#   * No access_log file — the container writes to stdout/stderr per the
#     nginx:alpine default, which docker/compose captures.
#   * Listen on 80. The compose port mapping exposes this as 5173 on the
#     host, matching the daemon CORS allowlist.

server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ------------------------------------------------------------------
    # gzip — static assets benefit measurably; keep level conservative so
    # cold-boot latency isn't dominated by compression CPU.
    # ------------------------------------------------------------------
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   512;
    gzip_types        text/plain
                      text/css
                      text/javascript
                      application/javascript
                      application/json
                      image/svg+xml;

    # ------------------------------------------------------------------
    # MIME — explicit for ES modules. Some browsers will refuse to load
    # a module with Content-Type: text/plain.
    # ------------------------------------------------------------------
    types {
        text/html                             html;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        image/svg+xml                         svg;
        image/x-icon                          ico;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        font/woff2                            woff2;
        font/woff                             woff;
    }
    default_type  application/octet-stream;

    # ------------------------------------------------------------------
    # Caching policy.
    # index.html: revalidate every request so deploys show up immediately.
    # static assets: moderate cache; flip to immutable once filenames are
    # content-hashed.
    # ------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /css/ {
        add_header Cache-Control "public, max-age=3600";
    }
    location /js/ {
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Security headers — minimal set appropriate for a local-first UI.
    # CSP intentionally omitted: the frontend is ES-module-only and makes
    # fetch() calls to a user-configurable API origin (the daemon). A
    # tight CSP would need per-deployment configuration that doesn't belong
    # in a baked image. Revisit if we ever serve this behind a reverse
    # proxy with a known daemon URL.
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-Frame-Options        "SAMEORIGIN"     always;
    add_header Referrer-Policy        "no-referrer"    always;
}
