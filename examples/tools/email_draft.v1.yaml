schema_version: 1
name: email_draft
version: '1'
description: >
  Draft a polite, well-structured email from bullet points covering
  what you want to say. The agent never sends — it only drafts —
  so this is read-only and safe for any posture. Useful for
  operator companions, status reports, vendor outreach, meeting
  followups.
implementation: prompt_template_tool.v1
side_effects: read_only
archetype_tags:
  - assistant
  - companion
  - briefer
  - vendor_research
input_schema:
  type: object
  properties:
    bullets:
      type: string
      description: >
        Bullet points covering what the email should say. Newline-
        separated; each bullet is one idea. The model groups them
        into paragraphs with appropriate transitions.
    recipient:
      type: string
      description: >
        Who the email is to (e.g. "the engineering team", "Alex",
        "a vendor named Acme"). Shapes greeting + tone.
    intent:
      type: string
      description: >
        One-line statement of the email's purpose
        (e.g. "request a meeting", "summarize last week's progress",
        "decline the proposal politely").
    tone:
      type: string
      description: >
        Target tone — "formal", "casual", "diplomatic", "direct",
        "warm", or another adjective. Defaults: use "professional"
        when unsure.
  required:
    - bullets
    - recipient
    - intent
    - tone
prompt_template: |
  Draft an email matching the brief below. Output the email body
  ready to send — no preamble, no commentary, just the email itself
  starting with the greeting and ending with the signature line
  "[your name]".

  Conventions:
    - Open with an appropriate greeting for the recipient + tone.
    - Group the bullet content into 1-3 short paragraphs with
      natural transitions. Don't write the email as a bullet list
      unless the bullets are explicitly a list (numbered items,
      multiple distinct asks).
    - End with a clear next step or call to action if the intent
      implies one.
    - Sign off appropriately for the tone.
    - Subject line on the FIRST line as "Subject: <line>".

  Recipient: {recipient}
  Intent: {intent}
  Tone: {tone}

  Bullets to cover:
  {bullets}

  Email:
forged_at: '2026-05-11T18:00:04Z'
forged_by: forest-team
forge_provider: hand-authored
