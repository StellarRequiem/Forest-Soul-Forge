schema_version: 1
name: text_summarize
version: '1'
description: >
  Summarize a paragraph of text into exactly three concise bullet
  points, each capturing one key idea. Useful for compressing meeting
  notes, articles, agent reports, or any long-form content into a
  scannable summary. Side-effect-free, agent-internal.
implementation: prompt_template_tool.v1
side_effects: read_only
archetype_tags:
  - briefer
  - knowledge_consolidator
  - assistant
input_schema:
  type: object
  properties:
    text:
      type: string
      description: The text to summarize. Can be one or more paragraphs.
  required:
    - text
prompt_template: |
  Summarize the text below into exactly three concise bullet points.
  Each bullet captures one key idea in a single sentence. Do not
  add bullets that aren't supported by the text. If the text is
  too short to support three distinct ideas, return fewer bullets
  rather than padding.

  Text:
  {text}

  Three bullet points:
forged_at: '2026-05-11T18:00:00Z'
forged_by: forest-team
forge_provider: hand-authored
