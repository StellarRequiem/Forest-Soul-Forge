schema_version: 1
name: sentiment_analyze
version: '1'
description: >
  Classify the sentiment of a text passage as positive, negative,
  neutral, or mixed, with a confidence score and a brief rationale
  pointing to the load-bearing phrases. Useful for triaging support
  tickets, summarizing user feedback, screening community discourse,
  or watching agent self-reports for distress signals. Read-only.
implementation: prompt_template_tool.v1
side_effects: read_only
archetype_tags:
  - briefer
  - assistant
  - signal_listener
  - knowledge_consolidator
input_schema:
  type: object
  properties:
    text:
      type: string
      description: >
        The text to analyze. Works on any length from a single
        sentence to a multi-paragraph passage. For very long inputs,
        consider chunking — sentiment can shift through a long text.
    target:
      type: string
      description: >
        What aspect of the text to analyze sentiment toward —
        "overall" (default), "the author's mood", "feelings about
        a specific topic in the text", "tone toward the recipient",
        etc. Pass "overall" if unspecified — this constrains the
        model to a single dimension rather than averaging across
        multiple stances.
  required:
    - text
    - target
prompt_template: |
  Classify the sentiment of the text below.

  Output format — pure YAML, nothing else:

  sentiment: <positive | neutral | negative | mixed>
  confidence: <0.0 to 1.0, with one decimal place>
  rationale: <one-sentence explanation pointing to the load-bearing
              phrases or signals>
  key_phrases: <list of 1-3 verbatim short quotes from the input
                that drove the classification, each ≤80 chars>

  Guidelines:
    - "mixed" is for text that genuinely expresses both strong
      positive AND strong negative signals (not the same as
      neutral). Use sparingly.
    - "neutral" is for descriptive / informational text without
      clear affective valence.
    - Confidence reflects HOW CLEARLY the text signals the
      chosen class, not how strong the sentiment is. A clearly
      mildly-positive text gets high confidence; a strongly
      ambivalent text gets lower.

  Sentiment target: {target}

  Text to analyze:
  {text}

  Output:
