schema_version: 1
name: key_audit
version: '1'
description: |
  VaultWarden's post-incident key state snapshot. Terminus of
  the canonical chain — does not delegate further. Enumerates
  cryptographic key material on the host (paths, sizes, mtimes,
  perms — never bytes), checks integrity of operator-named
  canonical key paths against a baseline written from a prior
  audit, and persists the state to lineage memory so the next
  audit can diff against it. Surfaces warnings (wrong perms,
  vanished keys, mtime drift on sensitive paths) for operator
  review. ADR-0033 §Cross-agent chains link 4.

  This skill writes its OWN baseline forward — first run records,
  subsequent runs compare. operator can override with an explicit
  baseline_override input when re-baselining after a known-good
  rotation event.

requires:
  - key_inventory.v1
  - file_integrity.v1
  - memory_recall.v1
  - memory_write.v1

inputs:
  type: object
  properties:
    triggered_by:
      type: string
      description: "what skill or operator action triggered this audit"
    evidence_path:
      type: string
      description: "optional incident evidence tarball path; cross-referenced in audit"
    canonical_key_paths:
      type: array
      items: {type: string}
      description: "absolute paths whose integrity is critical (e.g. ~/.ssh/id_ed25519)"
    baseline_override:
      type: object
      description: "explicit baseline; when present, skips the memory_recall lookup"

steps:
  - id: inventory
    tool: key_inventory.v1
    args:
      categories: ["keychain", "ssh", "signing"]

  - id: pull_baseline
    tool: memory_recall.v1
    args:
      scope: lineage
      tags: ["key_audit", "vault_warden"]
      limit: 1

  - id: integrity
    tool: file_integrity.v1
    when: ${gt(count(inputs.canonical_key_paths), 0)}
    args:
      paths: ${inputs.canonical_key_paths}
      baseline_digests: ${pull_baseline.entries}

  - id: persist
    tool: memory_write.v1
    args:
      scope: lineage
      tags: ["key_audit", "vault_warden"]
      content:
        kind: key_audit_snapshot
        triggered_by: ${inputs.triggered_by}
        evidence_path: ${inputs.evidence_path}
        platform: ${inventory.platform}
        warning_count: ${inventory.warning_count}
        ssh_private_count: ${count(inventory.categories.ssh.private_keys)}
        signing_blob_count: ${inventory.categories.signing.private_blob_count}
        integrity_verdict: ${integrity.overall_verdict}

output:
  warning_count: ${inventory.warning_count}
  warnings: ${inventory.warnings}
  integrity_verdict: ${integrity.overall_verdict}
  audit_timestamp: ${persist.entry_id}
