schema_version: 1
name: threat_intel_refresh
version: '1'
description: |
  threat_intel_curator's signature skill. Refreshes the local
  intel cache by pulling operator-configured feed URLs, verifying
  provenance, tagging freshness, and writing curated rows.

  Pipeline:
    1. prior_intel — memory_recall scope=private for prior intel
       rows on the same source (so dedupe + freshness comparison
       can run without re-pulling).
    2. verify_chain_integrity — audit_chain_verify confirms the
       chain itself is hash-linked end-to-end before publishing
       intel summaries. Required by the constitution's
       require_provenance_attestation policy by analogy.
    3. fetch_feed — web_fetch pulls each operator-supplied URL.
       Tight allowlist enforced via per-agent constitution
       constraints.allowed_domains (set at birth time from
       config/threat_intel_sources.yaml when that ships; today
       the operator passes URLs through inputs).
    4. verify_artifact — file_integrity computes sha256 against
       the downloaded body; compared with operator-supplied
       expected_sha (when available) per
       require_provenance_attestation.
    5. summarize_intel — text_summarize collapses the fetched
       feed into a structured row (CVE list / IOC list /
       advisory summary).
    6. write_intel — memory_write scope=private records the
       curated row, tagged with source URL + retrieval timestamp
       + content sha256.

  Output: structured intel row + memory entry id. Operator queries
  the cache via memory_recall by source / freshness / tag. The
  skill NEVER acts on the intel — that's response_rogue's lane.

  Why allowlist-via-constitution, not hard-coded:
  Operator configures sources; the curator never modifies the
  allowlist (forbid_silent_feed_substitution policy). Each
  curator birth pins its sources at birth time; refreshing the
  source list requires rebirth or a posture-mediated update
  (the latter via ADR-0036 posture overrides).

requires:
  - web_fetch.v1
  - file_integrity.v1
  - memory_recall.v1
  - memory_write.v1
  - audit_chain_verify.v1
  - llm_think.v1
  - text_summarize.v1

inputs:
  type: object
  required: [feed_url]
  properties:
    feed_url:
      type: string
      description: >
        URL to fetch. Must be in the agent's allowed_domains
        constraint (constitution-bound at birth). web_fetch will
        refuse with a clean error if it's outside the allowlist.
    feed_source_label:
      type: string
      default: ""
      description: >
        Operator-readable name for the source (e.g.
        "abuse.ch-feodotracker", "circl.lu-advisories"). Included
        in the memory tag so the cache is queryable by source
        rather than only by URL.
    expected_sha:
      type: string
      default: ""
      description: >
        Optional. Operator-asserted sha256 of the expected feed
        body. When set, verify_artifact compares; mismatch halts
        with a provenance-failure event. Empty string means no
        expectation; provenance is still recorded but not gated.
    freshness_window_seconds:
      type: integer
      default: 86400
      description: >
        How recent the prior intel row must be to count as
        "current". Beyond this, the curator's brief will flag the
        source as stale. Default 24h.

steps:
  - id: prior_intel
    tool: memory_recall.v1
    args:
      query: "threat_intel:${inputs.feed_source_label}"
      mode: private
      limit: 5

  - id: verify_chain_integrity
    tool: audit_chain_verify.v1
    args:
      max_unknown_to_report: 20

  - id: fetch_feed
    tool: web_fetch.v1
    args:
      url: ${inputs.feed_url}

  - id: verify_artifact
    tool: file_integrity.v1
    args:
      paths: []     # web_fetch result is in-memory; the integrity
                    # tool will hash via the fetch result body
                    # surfaced through ctx (T6b will tighten this
                    # contract — for now, this step records the
                    # intent; the actual hash check is operator-
                    # driven post-fetch).
      mode: snapshot

  - id: summarize_intel
    tool: text_summarize.v1
    args:
      text: ${fetch_feed.out.body}
      target_words: 250
      style: bullet_points
      focus: "IOCs + CVEs + advisory action items"

  - id: write_intel
    tool: memory_write.v1
    args:
      content: ${summarize_intel.out.response}
      layer: episodic
      scope: private
      tags:
        - "threat_intel"
        - "source:${inputs.feed_source_label}"
        - "url:${inputs.feed_url}"
        - "attestor:threat_intel_curator"

output:
  feed_url: ${inputs.feed_url}
  source_label: ${inputs.feed_source_label}
  chain_status: ${verify_chain_integrity.out.status}
  intel_summary: ${summarize_intel.out.response}
  intel_entry_id: ${write_intel.out.entry_id}
  # Operator reads intel_summary; queries memory_recall by
  # 'threat_intel:<label>' to walk historical intel for that source.
