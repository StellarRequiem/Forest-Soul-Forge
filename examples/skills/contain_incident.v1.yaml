schema_version: 1
name: contain_incident
version: '1'
description: |
  ResponseRogue's containment procedure. Minimal-viable chain
  link: records the alert to lineage memory and (for chains that
  pass a real downstream_agent_id) delegates VaultWarden.key_audit
  so the operator sees a key-state snapshot taken AFTER the
  incident summary lands. Real triage/evidence_capture/isolate
  steps land in v2 once the smoke validates this shape; the
  chain in this version stops cleanly without firing
  isolate_process so the operator's approval queue stays clean
  during smoke runs. ADR-0033 §Cross-agent chains link 3.

requires:
  - memory_write.v1
  - delegate.v1

inputs:
  type: object
  required: [alert, match_count]
  properties:
    alert:
      type: string
    match_count:
      type: integer
      minimum: 0
    downstream_agent_id:
      type: string
      description: "VaultWarden agent — when present, chain continues to key_audit"

steps:
  - id: persist
    tool: memory_write.v1
    args:
      layer: episodic
      scope: lineage
      tags:
        - contain_incident
        - response_rogue
      content: "containment_record: alert=${inputs.alert} match_count=${inputs.match_count}"

  - id: key_audit_handoff
    tool: delegate.v1
    args:
      target_instance_id: ${inputs.downstream_agent_id}
      skill_name: key_audit
      skill_version: "1"
      inputs:
        triggered_by: "contain_incident"
        match_count: ${inputs.match_count}
      reason: "post-incident key state snapshot"

output:
  alert: ${inputs.alert}
  match_count: ${inputs.match_count}
  delegated_to_vault: ${key_audit_handoff.grant_id}
