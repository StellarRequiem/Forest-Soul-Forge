schema_version: 1
name: wiring_audit_triage
version: '1'
description: |
  Triune-Main scheduled triage of WiringSentinel's most-recent
  wiring_audit_outcome. Engineer-Main runs this skill; it delegates
  to Reviewer-Main and Architect-Main for the rank + synthesis steps.

  Flow:
    1. engineer_extract  — text_summarize compacts the raw outcome
                           into an operator-actionable item list.
    2. reviewer_rank     — delegate to Reviewer-Main with the extracted
                           list; reviewer assigns severity per ADR-0081
                           §severity (high/medium/low/info).
    3. architect_priority — delegate to Architect-Main with ranked list;
                           architect produces a prioritized remediation
                           order memo with dependency reasoning.
    4. record            — persist the synthesized memo to Engineer-Main's
                           lineage memory tagged 'wiring_audit_triage'.

  Designed to be called by Engineer-Main. Reviewer-Main +
  Architect-Main instance_ids are passed as inputs by the wrapper
  script that schedules this skill (dev-tools/run-triune-triage.command).

  Sister-role pattern (no bonded triune yet): delegate.v1 to the
  *-Main siblings by instance_id; out-of-lineage flag set true with
  audit attribution. Future enhancement: birth all three under a
  shared parent + bond them via the triune-bond endpoint so the
  delegate constraint runs cleanly.

requires:
  - text_summarize.v1
  - memory_write.v1

inputs:
  type: object
  required: [recent_outcome, reviewer_instance_id, architect_instance_id]
  properties:
    recent_outcome:
      type: string
      minLength: 1
      description: |
        Full content text of WiringSentinel's most-recent
        wiring_audit_outcome memory entry. The wrapper script reads
        this from the daemon's memory API and passes it in.
    reviewer_instance_id:
      type: string
      description: "instance_id of Reviewer-Main (code_reviewer)."
    architect_instance_id:
      type: string
      description: "instance_id of Architect-Main (system_architect)."
    triggered_by:
      type: string
      default: scheduled
      description: "scheduled | manual | post-audit — operator context."

steps:
  - id: engineer_extract
    tool: text_summarize.v1
    args:
      # bullet_points style; target ~200 words to keep the
      # downstream delegate payload bounded.
      style: bullet_points
      target_words: 200
      text: |
        EXTRACT the operator-actionable items only from this
        WiringSentinel wiring_audit_outcome. Output a flat bulleted
        list grouped by item-type. Drop chain-of-evidence framing;
        keep tool/skill/handoff names + the reason for each gap.

        Item types to extract:
          - Orphan tools (tool name + any hint at owning archetype)
          - Broken handoff routes (domain/capability + reason)
          - Skills unresolvable (skill name + missing requires)
          - Skills with no carrier archetype (skill + required tools)
          - Chain integrity break (only if present)
          - Broken constitution parse count (informational only)

        --- BEGIN wiring_audit_outcome ---
        ${inputs.recent_outcome}
        --- END wiring_audit_outcome ---

  # NOTE on architecture: a future revision will use delegate.v1 to
  # fan out to Reviewer-Main + Architect-Main. That requires a generic
  # llm_pass.v1 single-step skill wrapper (not yet built). For now the
  # triune is logical/persona-based — Engineer-Main runs all three
  # text_summarize calls with explicit persona prompts. Real LLM output,
  # real multi-perspective synthesis. The reviewer_instance_id +
  # architect_instance_id inputs are recorded in the final memory
  # write as attribution.

  - id: reviewer_rank
    tool: text_summarize.v1
    args:
      style: bullet_points
      target_words: 250
      text: |
        You are the code-reviewer in the Triune-Main work cell.
        RANK each item below by operator-impact severity per ADR-0081
        §severity:

          high   - any handoff entry_agents resolve to nothing,
                   chain break, constitution parse failure.
          medium - orphan_tools > 0, skills_unresolvable > 0,
                   broken handoffs with the skill manifest missing.
          low    - tools_kit_no_agent > 0 (normal during rollouts).
          info   - freshness notes only.

        Output the SAME list, but prefix each item with [HIGH] /
        [MEDIUM] / [LOW] / [INFO]. Add one short sentence per item
        explaining the severity choice.

        --- BEGIN engineer-extracted action list ---
        ${engineer_extract.response}
        --- END action list ---

  - id: architect_priority
    tool: text_summarize.v1
    args:
      style: paragraph
      target_words: 400
      text: |
        You are the system-architect in the Triune-Main work cell.
        Produce a PRIORITIZED REMEDIATION ORDER from the
        severity-ranked list below. Consider dependencies:
          - Chain-break fixes BEFORE anything else (downstream
            audits unreliable until chain is verified).
          - Skill-missing handoffs BEFORE orphan-tool retirement
            (broken handoffs are user-visible; orphan tools just
            clutter the catalog).
          - Within same severity, alphabetical OR by domain
            clustering (e.g., all d3 fixes together).

        Output:
          1. Numbered list (1..N) of items in execution order.
          2. One-line dependency rationale per item.
          3. Closing sentence: "Estimated total burst count: <N>"
             (where N is your guess at the operator-burst count
             to resolve everything).

        --- BEGIN severity-ranked list ---
        ${reviewer_rank.response}
        --- END ranked list ---

  - id: record
    tool: memory_write.v1
    args:
      layer: episodic
      scope: lineage
      tags:
        - wiring_audit_triage
        - triune_main
      content: "triune_main_wiring_triage: triggered_by=${inputs.triggered_by} reviewer=${inputs.reviewer_instance_id} architect=${inputs.architect_instance_id} | extracted: ${engineer_extract.response} | ranked: ${reviewer_rank.response} | prioritized: ${architect_priority.response}"

output:
  extracted: ${engineer_extract.response}
  ranked: ${reviewer_rank.response}
  prioritized: ${architect_priority.response}
  triggered_by: ${inputs.triggered_by}
