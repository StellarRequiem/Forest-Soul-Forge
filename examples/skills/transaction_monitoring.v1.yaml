schema_version: 1
name: transaction_monitoring
version: '1'
description: |
  TransactionTracker-D6's primary skill. Dispatches
  transaction_categorize.v1 over an operator-supplied batch of
  transactions + operator-supplied category rules, composes a
  structured categorization attestation tagged for
  budget_analyst + risk_advisor pickup.

  Composition + attestation only — the tracker NEVER charges
  anything (manifest hard rule); NEVER composes burn-rate
  narratives (budget_analyst's lane); NEVER advises on
  investments (investment_researcher's lane). Categorization
  attestations land in private memory tagged for downstream
  pickup (transaction_categorized:${batch_slug}).

  Six-step pipeline:
    1. operator_context — operator_profile_read fetches
       currency + areas_of_focus.
    2. recall_rule_corpus — memory_recall scope=lineage for the
       operator-supplied category-rule corpus
       (rule_corpus tag). The corpus is the load-bearing input
       — operators refine it over time.
    3. recall_prior_categorizations — memory_recall scope=private
       for prior categorization attestations on this batch_slug.
       The tracker extends rather than duplicates.
    4. verify_chain_integrity — audit_chain_verify confirms the
       chain is hash-linked end-to-end.
    5. categorize_batch — transaction_categorize.v1 applies the
       rule corpus deterministically over the transaction batch.
       Read-only.
    6. write_categorization_attestation — memory_write
       scope=private records the verdicts tagged for downstream
       pickup (transaction_categorized:${batch_slug} +
       attestor:TransactionTracker-D6).

  NEVER charges anything. forbid_transaction_execution policy
  enforces this at governance layer regardless of posture.

requires:
  - memory_recall.v1
  - memory_write.v1
  - audit_chain_verify.v1
  - transaction_categorize.v1
  - operator_profile_read.v1

inputs:
  type: object
  required: [batch_slug, transactions, rules]
  properties:
    batch_slug:
      type: string
      description: >
        Identifier this categorization batch binds to (e.g.
        "fiscal-month-2026-05"). Used as the
        transaction_categorized:${slug} memory tag.
    transactions:
      type: array
      minItems: 1
      maxItems: 500
      items:
        type: object
        required: [txn_id, amount]
        properties:
          txn_id: {type: string}
          merchant: {type: string}
          description: {type: string}
          amount: {type: number}
          currency: {type: string}
    rules:
      type: array
      maxItems: 200
      items:
        type: object
        required: [category]
        properties:
          category: {type: string}
          merchant_contains: {type: array, items: {type: string}}
          description_contains: {type: array, items: {type: string}}
          amount_min: {type: number}
          amount_max: {type: number}
    operator_reason:
      type: string
      default: ""
      description: >
        Audit-readable prose recorded in the attestation.

steps:
  - id: operator_context
    tool: operator_profile_read.v1
    args: {}

  - id: recall_rule_corpus
    tool: memory_recall.v1
    args:
      query: "rule_corpus"
      mode: lineage
      limit: 5

  - id: recall_prior_categorizations
    tool: memory_recall.v1
    args:
      query: "transaction_categorized:${inputs.batch_slug}"
      mode: private
      limit: 3

  - id: verify_chain_integrity
    tool: audit_chain_verify.v1
    args:
      max_unknown_to_report: 20

  - id: categorize_batch
    tool: transaction_categorize.v1
    args:
      batch_slug: ${inputs.batch_slug}
      transactions: ${inputs.transactions}
      rules: ${inputs.rules}

  - id: write_categorization_attestation
    tool: memory_write.v1
    args:
      content: |
        Categorization batch ${inputs.batch_slug}:
        transactions=${categorize_batch.out.summary.transaction_count}
        categorized=${categorize_batch.out.summary.categorized_count}
        uncategorized=${categorize_batch.out.summary.uncategorized_count}
        per_category=${categorize_batch.out.summary.per_category}
        rule_count=${categorize_batch.out.rule_count}
        operator_reason=${inputs.operator_reason}
        chain_status=${verify_chain_integrity.out.status}
      layer: episodic
      scope: private
      tags:
        - "d6_transaction_categorized"
        - "transaction_categorized:${inputs.batch_slug}"
        - "attestor:TransactionTracker-D6"

output:
  batch_slug: ${inputs.batch_slug}
  transaction_count: ${categorize_batch.out.summary.transaction_count}
  categorized_count: ${categorize_batch.out.summary.categorized_count}
  uncategorized_count: ${categorize_batch.out.summary.uncategorized_count}
  per_category: ${categorize_batch.out.summary.per_category}
  chain_status: ${verify_chain_integrity.out.status}
  attestation_entry_id: ${write_categorization_attestation.out.entry_id}
