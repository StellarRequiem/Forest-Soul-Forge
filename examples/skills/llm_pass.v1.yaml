schema_version: 1
name: llm_pass
version: '1'
description: |
  Generic single-step skill wrapping llm_think.v1. Exists so
  delegate.v1 has a real skill target on sister agents — delegate
  invokes skills (not tools), and we don't want every triune
  participant to need a bespoke skill manifest.

  Use this skill as the delegate target when one agent needs to
  ask another to "run an LLM pass with this prompt." The prompt
  is the `prompt` input; max_tokens + task_kind pass through.

  Wraps llm_think.v1 (not text_summarize.v1) because llm_think is
  in every triune-relevant kit (software_engineer, code_reviewer,
  system_architect, experimenter, every observer/investigator/
  communicator/guardian/researcher genre default since B392), while
  text_summarize was missed from system_architect's kit and would
  require a substrate rebirth to add. Output shape is identical
  ({response, model, task_kind, elapsed_ms}) so callers reading
  ${pass.response} work regardless of the underlying tool.

requires:
  - llm_think.v1

inputs:
  type: object
  required: [prompt]
  properties:
    prompt:
      type: string
      minLength: 1
      description: |
        The full prompt to feed to llm_think.v1. Includes whatever
        persona framing + instructions + source material the
        caller wants the target agent to process.
    max_tokens:
      type: integer
      minimum: 1
      maximum: 8192
      default: 1200
    task_kind:
      type: string
      enum: [classify, generate, safety_check, conversation, tool_use]
      default: generate

steps:
  - id: pass
    tool: llm_think.v1
    args:
      prompt: ${inputs.prompt}
      max_tokens: ${inputs.max_tokens}
      task_kind: ${inputs.task_kind}

output:
  # Surface the wrapped tool's output verbatim so the caller can
  # interpolate ${delegate_step.output.response} just like a
  # direct llm_think call.
  response: ${pass.response}
  model: ${pass.model}
  task_kind: ${pass.task_kind}
  elapsed_ms: ${pass.elapsed_ms}
