schema_version: 1
name: morning_sweep
version: '1'
description: |
  LogLurker's daily wakeup procedure. Scans operator-named log
  files for an anomalous-signal pattern (single regex; multi-
  pattern callers compose alternations with '|'), persists the
  match count summary to lineage memory, and — when the count
  crosses an operator-supplied threshold — delegates to
  AnomalyAce.investigate_finding. ADR-0033 §Cross-agent chains
  link 1.

  This is the entry point for the canonical security swarm chain:
    morning_sweep → investigate_finding → contain_incident → key_audit

requires:
  - timestamp_window.v1
  - log_scan.v1
  - memory_write.v1
  - delegate.v1

inputs:
  type: object
  required: [log_paths, pattern, downstream_agent_id]
  properties:
    log_paths:
      type: array
      items: {type: string}
      description: "absolute paths to log files; log_scan walks dirs recursively"
    pattern:
      type: string
      description: "single regex (compose alternations with '|' for multi-signal)"
    since:
      type: string
      description: "natural-language window for timestamp probe; default 'last 24 hours'"
    escalate_threshold:
      type: integer
      minimum: 1
      default: 3
      description: "match count at which to delegate to AnomalyAce"
    downstream_agent_id:
      type: string

steps:
  - id: window
    tool: timestamp_window.v1
    args:
      expression: ${inputs.since}

  - id: scan
    tool: log_scan.v1
    args:
      paths:   ${inputs.log_paths}
      pattern: ${inputs.pattern}

  - id: persist
    tool: memory_write.v1
    args:
      scope: lineage
      tags: ["morning_sweep", "log_lurker"]
      content:
        kind: morning_sweep_summary
        match_count: ${scan.match_count}
        files_scanned: ${scan.files_scanned}
        pattern: ${inputs.pattern}
        window_start: ${window.start}
        window_end: ${window.end}

  - id: escalate
    tool: delegate.v1
    when: ${gte(scan.match_count, inputs.escalate_threshold)}
    args:
      target_instance_id: ${inputs.downstream_agent_id}
      target_skill: investigate_finding.v1
      inputs:
        match_count: ${scan.match_count}
        pattern: ${inputs.pattern}
      reason: "morning_sweep matched threshold; correlate + score"

output:
  match_count: ${scan.match_count}
  files_scanned: ${scan.files_scanned}
  escalated: ${defined(escalate)}
