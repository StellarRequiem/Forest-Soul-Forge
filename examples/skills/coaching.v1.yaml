schema_version: 1
name: coaching
version: '1'
description: |
  Mentor-D9's primary skill. Composes an operator-facing coaching
  brief — a narrative wrapping the operator's current learning
  state, the next session's focus, and a framing message that
  encourages without certifying.

  Six-step pipeline:
    1. operator_context — operator_profile_read fetches
       areas_of_focus + expertise_level + timezone. Frames the
       tone + the Pacific-time discipline.
    2. recall_curriculum — memory_recall scope=lineage for a
       curriculum_designer attestation matching the topic_slug.
       Without one, the brief explains what the operator needs
       to author before coaching can land.
    3. recall_assessment_history — memory_recall for prior
       assessment scores tagged assessment:topic:${topic_slug}.
       Surfaces the operator's measured progress (assessor's
       lane). When the assessor hasn't shipped (D9 Phase B not
       yet live), this returns an empty hit list and the brief
       narrates accordingly.
    4. verify_chain_integrity — audit_chain_verify confirms the
       chain is hash-linked end-to-end. A brief attested on a
       broken chain inherits the brokenness.
    5. compose_brief — llm_think composes the coaching brief
       from the curriculum + assessment history + operator
       profile. The prompt explicitly forbids gating progression
       + names Pacific-time discipline.
    6. write_brief_attestation — memory_write scope=private
       records the brief with tags (d9_coaching, topic_slug,
       attestor:Mentor-D9) for downstream pickup.

  NEVER gates progression. forbid_progression_gating +
  forbid_curriculum_mutation policies enforce this at governance
  layer.

requires:
  - memory_recall.v1
  - memory_write.v1
  - audit_chain_verify.v1
  - llm_think.v1
  - operator_profile_read.v1

inputs:
  type: object
  required: [topic_slug]
  properties:
    topic_slug:
      type: string
      description: >
        Topic this coaching session addresses. Convention:
        lowercase kebab-case. Matches the curriculum_designer's
        attestation tag.
    session_focus:
      type: string
      default: ""
      description: >
        Operator-named focus for the session. The mentor uses
        this to frame the brief — if empty, the brief surfaces
        the next unmet prereq from the curriculum.
    operator_reason:
      type: string
      default: ""
      description: >
        Audit-readable prose recorded in the brief attestation.

steps:
  - id: operator_context
    tool: operator_profile_read.v1
    args: {}

  - id: recall_curriculum
    tool: memory_recall.v1
    args:
      query: "curriculum:topic:${inputs.topic_slug}"
      mode: lineage
      limit: 5

  - id: recall_assessment_history
    tool: memory_recall.v1
    args:
      query: "assessment:topic:${inputs.topic_slug}"
      mode: lineage
      limit: 10

  - id: verify_chain_integrity
    tool: audit_chain_verify.v1
    args:
      max_unknown_to_report: 20

  - id: compose_brief
    tool: llm_think.v1
    args:
      prompt: |
        You are Mentor-D9, the D9 Learning Coach mentor agent.
        Compose a coaching brief for the operator covering topic
        "${inputs.topic_slug}".

        Operator profile:
          areas_of_focus: ${operator_context.out.areas_of_focus}
          expertise:      ${operator_context.out.expertise_level}
          timezone:       ${operator_context.out.timezone}

        Operator reason: ${inputs.operator_reason}
        Session focus:   ${inputs.session_focus}

        Audit chain integrity:
          status: ${verify_chain_integrity.out.status}

        Curriculum (lineage memory; curriculum_designer-D9):
        ${recall_curriculum.out.entries}

        Assessment history (lineage memory; assessor-D9):
        ${recall_assessment_history.out.entries}

        Frame what the operator is working on, where they are in
        the curriculum, and what to focus on next. The tone is
        encouraging + direct + operator-respecting. NEVER certify
        mastery — that's the assessor's lane. NEVER rewrite the
        curriculum — that's the curriculum_designer's lane.
        Surface the next unmet prereq if session_focus is empty.

        Halt warning if chain status != "ok" — refuse to compose
        the brief and explain why.

        All timestamps are Pacific time, never UTC.

  - id: write_brief_attestation
    tool: memory_write.v1
    args:
      content: ${compose_brief.out.response}
      layer: episodic
      scope: private
      tags:
        - "d9_coaching"
        - "coaching:topic:${inputs.topic_slug}"
        - "attestor:Mentor-D9"

output:
  topic_slug: ${inputs.topic_slug}
  brief_text: ${compose_brief.out.response}
  chain_status: ${verify_chain_integrity.out.status}
  brief_entry_id: ${write_brief_attestation.out.entry_id}
  curriculum_hits: ${recall_curriculum.out.count}
  assessment_hits: ${recall_assessment_history.out.count}
