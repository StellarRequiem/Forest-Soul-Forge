schema_version: 1
name: key_audit
version: '1'
description: |
  VaultWarden's post-incident key state snapshot. Minimal-viable
  chain terminus — runs key_inventory and persists the result
  count to lineage memory. Does not delegate further. Real
  integrity probing + baseline diff lands in v2 once we have a
  durable baseline path. For now this skill proves the chain
  reaches its tail. ADR-0033 §Cross-agent chains link 4.

requires:
  - key_inventory.v1
  - memory_write.v1

inputs:
  type: object
  properties:
    triggered_by:
      type: string
      description: "what skill or operator action triggered this audit"
    match_count:
      type: integer
      minimum: 0

steps:
  - id: inventory
    tool: key_inventory.v1
    args:
      categories:
        - ssh
        - signing

  - id: persist
    tool: memory_write.v1
    args:
      layer: episodic
      scope: lineage
      tags:
        - key_audit
        - vault_warden
      content: "key_audit_snapshot: triggered_by=${inputs.triggered_by} platform=${inventory.platform} warning_count=${inventory.warning_count}"

output:
  warning_count: ${inventory.warning_count}
  warnings: ${inventory.warnings}
