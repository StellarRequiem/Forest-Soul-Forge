schema_version: 1
name: investigate_finding
version: '1'
description: |
  AnomalyAce's incoming-finding correlator. Minimal-viable chain
  link: records the finding to lineage memory and — when the
  match count crosses an operator-supplied threshold — delegates
  containment to ResponseRogue. Real analytics (correlate, score)
  will land in v2 once we have realistic event schemas to feed
  log_correlate; for now this skill proves the chain shape.
  ADR-0033 §Cross-agent chains link 2.

requires:
  - memory_write.v1
  - delegate.v1

inputs:
  type: object
  required: [match_count, downstream_agent_id]
  properties:
    match_count:
      type: integer
      minimum: 0
    pattern:
      type: string
    contain_threshold:
      type: integer
      minimum: 1
      default: 1
      description: "match count at which to delegate to ResponseRogue"
    downstream_agent_id:
      type: string
      description: "ResponseRogue instance_id"
    vault_agent_id:
      type: string
      description: "VaultWarden instance_id; passed through to contain_incident"

steps:
  - id: persist
    tool: memory_write.v1
    args:
      layer: episodic
      scope: lineage
      content: "anomaly_finding: match_count=${inputs.match_count} pattern=${inputs.pattern}"

  - id: contain
    tool: delegate.v1
    when: ${inputs.match_count >= inputs.contain_threshold}
    args:
      target_instance_id: ${inputs.downstream_agent_id}
      skill_name: contain_incident
      skill_version: "1"
      inputs:
        alert: "${inputs.match_count} matches of pattern ${inputs.pattern}"
        match_count: ${inputs.match_count}
        downstream_agent_id: ${inputs.vault_agent_id}
      reason: "match_count >= threshold; route to containment"

output:
  match_count: ${inputs.match_count}
  match_count_in: ${inputs.match_count}
