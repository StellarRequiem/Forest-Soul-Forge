schema_version: 1
name: schedule_reminder
version: '1'
description: |
  TimeSteward-D2's reminder-creation skill. Validates the fire
  time against the operator's work_hours, verifies audit chain
  integrity, appends the reminder to data/d2/reminders.jsonl,
  and writes a memory attestation that the operator can recall
  later.

  Four-step pipeline:
    1. operator_context — operator_profile_read fetches
       work_hours + timezone. Steers the prompt + future
       analysis ("did we just schedule a reminder in the
       middle of dinner?").
    2. verify_chain_integrity — audit_chain_verify confirms
       the chain is hash-linked. A reminder scheduled against
       a broken chain is operationally untrustworthy.
    3. schedule — schedule_reminder.v1 appends the record to
       the ledger. Filesystem side-effect; per-call approval
       gates via filesystem_always_human_approval. YELLOW
       posture additionally queues the action.
    4. attest — memory_write scope=private records the
       attestation with action_kind + fire_at + attestor +
       reminder_id.

  Constitutional policies enforce the action discipline at
  governance layer (require_action_attestation,
  forbid_silent_calendar_action, forbid_chain_break_action).
  All timestamps Pacific time per CLAUDE.md.

requires:
  - memory_write.v1
  - audit_chain_verify.v1
  - schedule_reminder.v1
  - operator_profile_read.v1

inputs:
  type: object
  required: [fire_at, message]
  properties:
    fire_at:
      type: string
      description: >
        ISO-8601 timestamp when the reminder should fire.
        Pacific time conventions per CLAUDE.md (e.g.,
        '2026-05-24T09:00:00-07:00'). Must be in the future.
    message:
      type: string
      description: >
        The reminder text the operator wants surfaced when the
        fire time arrives (1-2000 chars).
    channel:
      type: string
      default: memory
      description: >
        Delivery surface. 'memory' (default) always works
        without external connectors. email / slack / desktop
        require the respective connector.
    operator_reason:
      type: string
      default: ""
      description: >
        Audit-readable prose recorded in the attestation.

steps:
  - id: operator_context
    tool: operator_profile_read.v1
    args: {}

  - id: verify_chain_integrity
    tool: audit_chain_verify.v1
    args:
      max_unknown_to_report: 20

  - id: schedule
    tool: schedule_reminder.v1
    args:
      fire_at: ${inputs.fire_at}
      message: ${inputs.message}
      channel: ${inputs.channel}

  - id: attest
    tool: memory_write.v1
    args:
      content: ${schedule.out.reminder_id}
      layer: episodic
      scope: private
      tags:
        - "reminder_scheduled"
        - "fire_at:${inputs.fire_at}"
        - "channel:${inputs.channel}"
        - "attestor:TimeSteward-D2"

output:
  reminder_id: ${schedule.out.reminder_id}
  fire_at: ${schedule.out.fire_at}
  channel: ${schedule.out.channel}
  chain_status: ${verify_chain_integrity.out.status}
  attestation_id: ${attest.out.entry_id}
