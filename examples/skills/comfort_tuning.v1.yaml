schema_version: 1
name: comfort_tuning
version: '1'
description: |
  ComfortOptimizer-D5's primary skill. Dispatches
  comfort_recommend.v1 over current home_state + operator
  preferences + time-of-day window + composes a recommendation
  attestation tagged for routine_composer pickup.

  Composition + attestation only — the optimizer NEVER actuates
  devices (routine_composer's lane) + NEVER classifies energy
  anomalies (energy_warden's lane) + NEVER alerts on security
  (home_sentinel's lane). Recommendation attestations land in
  private memory tagged for downstream pickup
  (comfort_recommendation:${window_slug}).

  Seven-step pipeline:
    1. operator_context — operator_profile_read fetches
       areas_of_focus + timezone. Drives the time_of_day window
       interpretation (a "morning" recommendation at 06:30
       Pacific differs from "morning" at 10:30).
    2. recall_state_snapshots — memory_recall scope=lineage for
       home_state snapshot attestations within window_minutes
       (default 60). The wrapping skill consumes these to compose
       the per-area current state passed to comfort_recommend.v1.
    3. recall_prior_recommendations — memory_recall scope=private
       for prior recommendation attestations on this window_slug.
       The optimizer extends rather than duplicates.
    4. recall_steward_report — memory_recall scope=lineage for the
       matching state-of-the-home report (cross-references
       presence framing — a "dim lights in the bedroom"
       recommendation at midday when the bedroom is empty is fine;
       at 23:00 when someone is asleep in it is different).
    5. verify_chain_integrity — audit_chain_verify confirms the
       chain is hash-linked end-to-end. A recommendation attested
       on a broken chain inherits the brokenness.
    6. compose_recommendations — comfort_recommend.v1 produces
       the deterministic per-area recommendation set across
       scene + temperature + lighting dimensions.
    7. write_recommendation_attestation — memory_write
       scope=private records the recommendation set tagged for
       downstream pickup (comfort_recommendation:${window_slug} +
       attestor:ComfortOptimizer-D5).

  NEVER actuates devices. forbid_device_action policy enforces
  this at governance layer regardless of posture. NEVER classifies
  energy anomalies. forbid_energy_classification policy enforces
  this at governance layer regardless of posture.

requires:
  - memory_recall.v1
  - memory_write.v1
  - audit_chain_verify.v1
  - comfort_recommend.v1
  - operator_profile_read.v1

inputs:
  type: object
  required: [window_slug, time_of_day, areas]
  properties:
    window_slug:
      type: string
      description: >
        Time-bucket slug this recommendation set binds to.
        Convention: lowercase kebab-case
        (e.g. "evening-2026-05-24").
    window_minutes:
      type: integer
      default: 60
      description: >
        How far back to walk home_state snapshots, in minutes.
    time_of_day:
      type: string
      enum: [morning, midday, evening, night]
      description: >
        Time-of-day window the recommendation set targets.
        Drives lighting + scene defaults. Operator-provided
        rather than wall-clock-derived so the operator can
        replay a recommendation for an arbitrary window.
    areas:
      type: array
      minItems: 1
      maxItems: 100
      description: >
        Per-area current state. Each entry is the shape
        comfort_recommend.v1 expects (area_slug + label +
        current_temp_f + current_brightness_pct + current_scene).
        The skill passes them through directly; areas are
        typically composed from recent home_state_snapshot
        memory attestations.
    preferences:
      type: object
      default: {}
      description: >
        Operator preference profile overrides. Shape per
        comfort_recommend.v1. When empty the tool applies
        defaults (preferred_temp_min_f=68, max=74,
        evening_dim_threshold_pct=40, etc).
    vacation_mode:
      type: boolean
      default: false
    operator_reason:
      type: string
      default: ""
      description: >
        Audit-readable prose recorded in the recommendation
        attestation.

steps:
  - id: operator_context
    tool: operator_profile_read.v1
    args: {}

  - id: recall_state_snapshots
    tool: memory_recall.v1
    args:
      query: "home_state_snapshot"
      mode: lineage
      limit: 20

  - id: recall_prior_recommendations
    tool: memory_recall.v1
    args:
      query: "comfort_recommendation:${inputs.window_slug}"
      mode: private
      limit: 5

  - id: recall_steward_report
    tool: memory_recall.v1
    args:
      query: "home_state_report:${inputs.window_slug}"
      mode: lineage
      limit: 3

  - id: verify_chain_integrity
    tool: audit_chain_verify.v1
    args:
      max_unknown_to_report: 20

  - id: compose_recommendations
    tool: comfort_recommend.v1
    args:
      window_slug: ${inputs.window_slug}
      time_of_day: ${inputs.time_of_day}
      areas: ${inputs.areas}
      preferences: ${inputs.preferences}
      vacation_mode: ${inputs.vacation_mode}

  - id: write_recommendation_attestation
    tool: memory_write.v1
    args:
      content: |
        Comfort recommendation set for window ${inputs.window_slug}.
        Time of day: ${inputs.time_of_day}
        Vacation mode: ${inputs.vacation_mode}
        Areas: ${compose_recommendations.out.summary.area_count}
        Actions: ${compose_recommendations.out.summary.action_count}
        No-action: ${compose_recommendations.out.summary.no_action_count}
        Highest priority: ${compose_recommendations.out.summary.highest_priority}
        Chain status: ${verify_chain_integrity.out.status}
        Operator reason: ${inputs.operator_reason}
      layer: episodic
      scope: private
      tags:
        - "d5_comfort_recommendation"
        - "comfort_recommendation:${inputs.window_slug}"
        - "attestor:ComfortOptimizer-D5"

output:
  window_slug: ${inputs.window_slug}
  time_of_day: ${inputs.time_of_day}
  area_count: ${compose_recommendations.out.summary.area_count}
  action_count: ${compose_recommendations.out.summary.action_count}
  highest_priority: ${compose_recommendations.out.summary.highest_priority}
  chain_status: ${verify_chain_integrity.out.status}
  recommendation_entry_id: ${write_recommendation_attestation.out.entry_id}
