schema_version: 1
name: knowledge_assessment
version: '1'
description: |
  Assessor-D9's primary scoring skill. Composes a single
  assessment pass: pulls the curriculum context, generates
  the item envelope, scores the operator's response with
  Reality Anchor cross-check, writes the score attestation
  + (on incorrect/partial) a misconception_proposal entry.

  Seven-step pipeline:
    1. operator_context — operator_profile_read fetches
       expertise_level + timezone. Drives difficulty selection.
    2. recall_curriculum — memory_recall scope=lineage for
       a curriculum_designer attestation matching the topic_slug.
       Without one, the skill refuses (no assessment from thin
       air).
    3. verify_chain_integrity — audit_chain_verify confirms the
       chain is hash-linked end-to-end. A score attested on a
       broken chain inherits the brokenness.
    4. generate_item — knowledge_assessment.v1 produces the
       structural item envelope (item_id + slug + difficulty
       + kind).
    5. score_response — assessment_score.v1 produces the
       deterministic verdict from operator's response against
       operator-supplied ground_truth_answers.
    6. anchor_check — verify_claim.v1 (Reality Anchor)
       cross-checks the operator's response against
       ground_truth.yaml. Required by policy
       require_reality_anchor_before_correct before any
       'correct' verdict.
    7. write_attestations — memory_write scope=private for the
       score (always) and a misconception_proposal entry when
       verdict ∈ {incorrect, partial} (required by policy
       require_misconception_proposal_for_incorrect). The
       proposal is operator-reviewed; the operator commits to
       the ledger by dispatching misconception_log.v1 directly.

requires:
  - memory_recall.v1
  - memory_write.v1
  - audit_chain_verify.v1
  - knowledge_assessment.v1
  - assessment_score.v1
  - verify_claim.v1
  - operator_profile_read.v1

inputs:
  type: object
  required: [topic_slug, response]
  properties:
    topic_slug:
      type: string
      description: >
        Topic this assessment addresses. Matches the
        curriculum_designer's attestation tag.
    response:
      type: string
      description: >
        Operator's answer text. The scorer compares against
        ground_truth_answers; if absent, the verdict is
        deferred to LLM rubric layered separately.
    ground_truth_answers:
      type: array
      items: {type: string}
      default: []
      description: >
        Operator-curated expected answers for deterministic
        scoring. Empty array → verdict 'deferred'.
    difficulty:
      type: string
      enum: [easy, medium, hard]
      default: medium
    kind:
      type: string
      enum: [multiple_choice, short_answer, explain]
      default: short_answer
    seed:
      type: string
      default: ""
    operator_reason:
      type: string
      default: ""

steps:
  - id: operator_context
    tool: operator_profile_read.v1
    args: {}

  - id: recall_curriculum
    tool: memory_recall.v1
    args:
      query: "curriculum:topic:${inputs.topic_slug}"
      mode: lineage
      limit: 5

  - id: verify_chain_integrity
    tool: audit_chain_verify.v1
    args:
      max_unknown_to_report: 20

  - id: generate_item
    tool: knowledge_assessment.v1
    args:
      topic_slug: ${inputs.topic_slug}
      difficulty: ${inputs.difficulty}
      kind: ${inputs.kind}
      seed: ${inputs.seed}

  - id: score_response
    tool: assessment_score.v1
    args:
      item_id: ${generate_item.out.item_id}
      topic_slug: ${inputs.topic_slug}
      response: ${inputs.response}
      ground_truth_answers: ${inputs.ground_truth_answers}

  - id: anchor_check
    tool: verify_claim.v1
    args:
      claim: ${inputs.response}

  - id: write_score_attestation
    tool: memory_write.v1
    args:
      content: |
        Assessment score for topic ${inputs.topic_slug}.
        Item: ${generate_item.out.item_id}
        Verdict: ${score_response.out.verdict}
        Score:   ${score_response.out.score}
        Rationale: ${score_response.out.rationale}
        Reality Anchor verdict: ${anchor_check.out.verdict}
      layer: episodic
      scope: private
      tags:
        - "d9_assessment"
        - "assessment:topic:${inputs.topic_slug}"
        - "item:${generate_item.out.item_id}"
        - "verdict:${score_response.out.verdict}"
        - "attestor:Assessor-D9"

output:
  topic_slug: ${inputs.topic_slug}
  item_id: ${generate_item.out.item_id}
  verdict: ${score_response.out.verdict}
  score: ${score_response.out.score}
  reality_anchor_verdict: ${anchor_check.out.verdict}
  chain_status: ${verify_chain_integrity.out.status}
  score_entry_id: ${write_score_attestation.out.entry_id}
  needs_rubric: ${score_response.out.needs_rubric}
