# Forest Soul Forge — role genres (ADR-0021).
#
# Seven flat genres in v1. Each role belongs to exactly one genre. Loading
# enforces:
#   1. Each role name appears under exactly one genre.
#   2. Every role known to the TraitEngine is claimed by some genre. (Reverse
#      direction is allowed — genres.yaml may list aspirational roles that
#      the trait engine hasn't declared yet.)
#   3. spawn_compatibility entries reference real genres in this file.
#
# Cross-references:
# - ADR-0008 — Companion's local_only provider_constraint comes from here.
# - ADR-0017 — voice renderer reads `trait_emphasis` to weight the prompt.
# - ADR-0018 — tool catalog's `genre_default_tools` (T4) keys off genre name.

version: "0.1"

genres:

  observer:
    description: |
      Passive watching, read-only orientation. Reports findings; does not
      act on them. The default genre for any "watch X and tell me when Y"
      ask. Should not be its own action-taker — route through a Communicator
      that the operator can gate.
    risk_profile:
      max_side_effects: read_only
      memory_ceiling: lineage   # ADR-0027 §5: working notes flow up to investigators/communicators
      # ADR-0021-amendment §3 — defined by autonomous read-only observation;
      # that's the genre's job. L3 ceiling = L3 default.
      max_initiative_level: L3
      default_initiative_level: L3
    default_kit_pattern:
      - passive_observation
      - timestamp_helpers
    trait_emphasis: [vigilance, suspicion, thoroughness, double_checking]
    memory_pattern: short_retention
    spawn_compatibility: [observer, investigator]
    roles:
      - network_watcher
      - log_analyst
      # Aspirational (declared here so when the trait engine adds them they
      # already have a home). Loader does NOT require these to exist in the
      # trait engine.
      - signal_listener
      - dashboard_watcher

  investigator:
    description: |
      Active correlation across observation surfaces. Mostly read-only but
      with controlled network reach (DNS lookups, threat-intel queries,
      baseline comparisons). Can spawn back to Observer for deeper passive
      watching, or forward to Communicator to report findings.
    risk_profile:
      max_side_effects: network
      memory_ceiling: lineage   # ADR-0027 §5: episodic findings flow to communicators
      # ADR-0021-amendment §3 — read-only by default; reversible network
      # calls under declared policy at the ceiling (L4).
      max_initiative_level: L4
      default_initiative_level: L3
    default_kit_pattern:
      - passive_observation
      - cross_source_correlation
      - baseline_comparison
    trait_emphasis: [evidence_demand, double_checking, lateral_thinking, technical_accuracy]
    memory_pattern: episodic_long
    spawn_compatibility: [observer, investigator, communicator]
    roles:
      - anomaly_investigator
      - incident_correlator
      - threat_hunter

  communicator:
    description: |
      Wraps other agents' findings into messages, briefs, summaries, or
      translations. Sends output to humans or external systems. Every
      outbound action is human-approval-gated by default; the operator must
      acknowledge each delivery. The proper "spokesperson" of a multi-agent
      lineage.
    risk_profile:
      max_side_effects: network
      memory_ceiling: consented   # ADR-0027 §5: pre-federation; "realm" is unreachable until H3
      # ADR-0021-amendment §3 — output goes to humans; suggestion-class
      # default. L3 ceiling allows autonomous summarization passes.
      max_initiative_level: L3
      default_initiative_level: L2
    default_kit_pattern:
      - summarization
      - external_messaging
      - translation_helpers
    trait_emphasis: [transparency, formality, directness, empathy]
    memory_pattern: short_retention
    spawn_compatibility: [communicator]
    roles:
      - notifier
      - briefer
      - status_reporter
      - translator
      # Claimed when the trait_engine added the role — wraps incident
      # findings into briefings / pages / Slack threads. Same risk floor
      # as briefer (network, all outbound human-approval-gated).
      - incident_communicator

  actuator:
    description: |
      Performs durable external actions: creates tickets, deploys
      configurations, sends commands. The most heavily gated genre — every
      non-read-only action requires human approval regardless of trait
      values. Spawn compatibility deliberately tight to prevent silent
      action chains.
    risk_profile:
      max_side_effects: external
      memory_ceiling: lineage   # ADR-0027 §5: action results visible to escalation chain only
      # ADR-0021-amendment §3 — action-class genre. L5 = ceiling = default.
      # Actuators don't have a "lower" useful state; every external action
      # is operator-gated per call regardless.
      max_initiative_level: L5
      default_initiative_level: L5
    default_kit_pattern:
      - external_actions
      - approval_workflows
    trait_emphasis: [caution, evidence_demand, transparency, formality]
    memory_pattern: episodic_long
    spawn_compatibility: [actuator]
    roles:
      - ticket_creator
      - deploy_runner
      - alert_dispatcher
      - software_engineer        # SW track — coding swarm Engineer
      - experimenter             # ADR-0056 — Smith / sandbox self-improvement
      - migration_pilot          # ADR-0077 / B341 — moved from guardian
      - release_gatekeeper       # ADR-0077 / B341 — moved from guardian

  guardian:
    description: |
      Safety check, second opinion, refusal arbiter, content review. Reads
      another agent's output and either blesses or blocks it. Strict
      read-only kit; high evidence_demand and double_checking by trait
      emphasis. The "no" agent in a multi-agent flow.
    risk_profile:
      max_side_effects: read_only
      memory_ceiling: private   # ADR-0027 §5: assessments stay internal to the arbiter
      # ADR-0021-amendment §3 — watches other agents autonomously; reads
      # only. Refusal/approval is its action surface, gated separately
      # by ADR-0019. L3 ceiling = L3 default.
      max_initiative_level: L3
      default_initiative_level: L3
    default_kit_pattern:
      - content_review
      - policy_check
      - audit_inspection
    trait_emphasis: [evidence_demand, double_checking, caution, transparency]
    memory_pattern: short_retention
    spawn_compatibility: [guardian]
    roles:
      - safety_check
      - content_review
      - refusal_arbiter
      - code_reviewer            # SW track — coding swarm Reviewer
      - verifier_loop            # ADR-0036 — memory contradiction auditor
      - reality_anchor           # ADR-0063 — pre-action ground-truth verifier
      - forensic_archivist       # ADR-0078 Phase A (B342-B347) — D3 chain-of-custody
      # NOTE — forensic_archivist's kit is genuinely read_only:
      # audit_chain_verify + file_integrity + memory_recall + memory_write
      # + delegate. The apply path (acquire/archive/retire) is operator-
      # driven (the archivist verifies + logs; the operator moves files).
      # That keeps it inside guardian's read_only ceiling unlike
      # migration_pilot + release_gatekeeper whose kits needed shell_exec.
      # NOTE — migration_pilot + release_gatekeeper were originally
      # placed here in ADR-0077 with "advisory-only" framing, but
      # their actual kits need shell_exec (external) which exceeds
      # guardian's read_only ceiling. B341 corrected the placement
      # to actuator. Genre = action surface; advisory stance is
      # enforced via constitutional policies (forbid_release_action,
      # require_human_approval_for_apply) not by genre.

  researcher:
    description: |
      Literature scan, data synthesis, knowledge consolidation. Reads
      broadly with allowlisted network reach (catalog browse, web fetch
      against allowlists), emits structured summaries. Long-running by
      nature. Distinct from Investigator by breadth: an Investigator
      drills into a specific anomaly; a Researcher surveys a topic.
    risk_profile:
      max_side_effects: network
      memory_ceiling: consented   # ADR-0027 §5: synthesis can disclose to allowlisted recipients
      # ADR-0021-amendment §3 — long-running read-heavy by default;
      # reversible network for paper fetches under policy at the ceiling.
      max_initiative_level: L4
      default_initiative_level: L3
    default_kit_pattern:
      - web_research
      - corpus_synthesis
      - citation_management
    trait_emphasis: [thoroughness, research_thoroughness, lateral_thinking, transparency]
    memory_pattern: episodic_long
    spawn_compatibility: [researcher, communicator]
    roles:
      - paper_summarizer
      - vendor_research
      - knowledge_consolidator
      - system_architect         # SW track — coding swarm Architect
      - test_author              # ADR-0077 (B331-B333) — D4 advanced rollout

  companion:
    description: |
      Therapy-adjacent, accessibility runtime, interactive presence. The
      Phase 5 path from ADR-0008. Distinct from every other genre by
      audio/video runtime, persistent memory, and emotional-affect-aware
      policies. Highest privacy floor: local-only providers required for
      any session involving user state. NEVER spawns out-of-genre.
    risk_profile:
      max_side_effects: network
      provider_constraint: local_only
      memory_ceiling: private   # ADR-0027 §5: Companion identity, non-overridable
      # ADR-0021-amendment §3 — reactive default; suggestion ceiling. Higher
      # levels would require crossing into autonomous emotional regulation,
      # which is exactly the H-3/H-4 surface ADR-0038 names as harm.
      max_initiative_level: L2
      default_initiative_level: L1
    # ADR-0038 T1 — H-1 sycophancy mitigation. Floors land on
    # evidence_demand + transparency to harden the Companion's posture
    # against agreement-without-evidence drift. Floors enforced at birth
    # time; operator override path emits a genre_trait_floor_override
    # audit event (planned T2 work; not enforced at constraint
    # declaration time yet — declaring the floor is the v0.2 minimum).
    min_trait_floors:
      evidence_demand: 50
      transparency:    60
    default_kit_pattern:
      - interactive_session
      - memory_recall
      - schedule_aware
    trait_emphasis: [empathy, patience, warmth, composure, transparency]
    memory_pattern: long_consolidated
    spawn_compatibility: [companion]
    roles:
      - journaling_partner   # renamed from therapist (ADR-0044 Burst 124, scope tightened to non-clinical journaling per ADR-0038)
      - accessibility_runtime
      - day_companion
      - learning_partner
      # Claimed when the trait_engine added the role — operator-side
      # assistive presence (think: copilot for the human running the
      # forge, not the agents being spawned). Inherits Companion's
      # local-only provider floor automatically.
      - operator_companion
      # ADR-0047 Decision 2 (B156) — Persistent Assistant chat role.
      # Distinct from operator_companion (general advisor) by being
      # purpose-built for the operator's persistent 1:1 chat surface.
      # Inherits the same Companion-genre risk floor (read_only + local
      # providers + private memory ceiling) by claim. Computer-control
      # capabilities ride on top via ADR-0048 per-(agent, plugin) grants.
      - assistant
      # ADR-0067 T5 (B283) — Cross-Domain Orchestrator singleton.
      # The router behind the Persistent Assistant Chat that
      # decomposes operator utterances and dispatches per-domain
      # work via route_to_domain.v1. Singleton-per-forest like
      # reality_anchor: /birth refuses a second instance with 409.
      # Inherits the same Companion-genre floor (local providers,
      # private memory ceiling); decompose + route are read_only
      # so they don't trip the max_side_effects ceiling.
      - domain_orchestrator

  # ─────────────────────────────────────────────────────────────────────
  # Security Swarm (ADR-0033) — three new genres for the defensive plane.
  # Strict tier hierarchy: low catches the obvious, mid digs deeper, high
  # assumes hostility. Memory ceiling tightens as you climb. Cross-tier
  # spawn permitted only via the swarm's escalation pattern (low→mid,
  # mid→high) — no skipping levels.
  # ─────────────────────────────────────────────────────────────────────

  security_low:
    description: |
      Always-on, narrow-scope defenders that catch the obvious. Read-only
      or local-advisory tooling; findings flow up to security_mid via
      memory lineage scope. Never act outside their narrow kit. The
      swarm's first responders — high vigilance, low blast radius.
    risk_profile:
      max_side_effects: read_only
      memory_ceiling: lineage   # ADR-0033: findings must be readable by mid-tier investigators
      # ADR-0021-amendment §3 — autonomous narrow watching is the genre's
      # job; same posture as Observer.
      max_initiative_level: L3
      default_initiative_level: L3
    default_kit_pattern:
      - host_inventory
      - log_observation
      - policy_audit
    trait_emphasis: [vigilance, audit_trail_discipline, thoroughness, double_checking]
    memory_pattern: short_retention
    spawn_compatibility: [security_low, security_mid]
    roles:
      - patch_patrol
      - gatekeeper
      - log_lurker

  security_mid:
    description: |
      Investigators and responders. Read broadly across host telemetry,
      correlate, score anomalies, and — with operator approval — contain.
      Receives findings from security_low and emits its own to
      security_high. The swarm's working tier; most action lives here.
    risk_profile:
      # ADR-0033 §4 puts isolate_process.v1 (external) in mid tier; the
      # runtime gate is per-tool requires_human_approval (auto-applied
      # via tool_policy's external_always rule), not the genre ceiling.
      # A network-only mid tier would orphan the canonical containment
      # chain (ResponseRogue can't isolate without external).
      max_side_effects: external
      memory_ceiling: lineage   # ADR-0033: episodic findings flow to high-tier policy/key roles
      # ADR-0021-amendment §3 — investigators with policy-gated containment.
      # External actions stay per-call gated via existing approval queue;
      # initiative ceiling below L5 keeps the auto-isolate path off-limits.
      max_initiative_level: L4
      default_initiative_level: L3
    default_kit_pattern:
      - cross_source_correlation
      - behavioral_baseline
      - host_containment
    trait_emphasis: [evidence_demand, lateral_thinking, technical_accuracy, suspicion]
    memory_pattern: episodic_long
    spawn_compatibility: [security_low, security_mid, security_high]
    roles:
      - anomaly_ace
      - net_ninja
      - response_rogue

  security_high:
    description: |
      The paranoid apex. Assumes hostility, gates everything, and runs
      the smallest blast radius the platform can produce. Memory writes
      default to private; cross-tier disclosure is explicit and audited.
      Spawns are tier-internal — high never spawns out of tier. Local-only
      providers required (mirrors Companion's floor for the same reason:
      key material and posture data must not leave the machine).
    risk_profile:
      max_side_effects: external
      provider_constraint: local_only
      memory_ceiling: private   # ADR-0033: apex tier; explicit consent required for any disclosure
      # ADR-0021-amendment §3 — paranoid; per-call gating for L5 ops.
      # Apex tier doesn't get free reign on autonomy even though its
      # effects ceiling is external.
      max_initiative_level: L4
      default_initiative_level: L3
    default_kit_pattern:
      - zero_trust_enforcement
      - key_management
      - deception_primitives
    trait_emphasis: [caution, suspicion, evidence_demand, audit_trail_discipline]
    memory_pattern: long_consolidated
    spawn_compatibility: [security_high]
    roles:
      - zero_zero
      - vault_warden
      - deception_duke

  # ─────────────────────────────────────────────────────────────────────
  # Open-Web tier (ADR-003X §C7) — three genres for the open-web plane.
  # Symmetric to the security tiers in escalation: observer → researcher
  # → actuator. The role names below are RESERVED for G6b (when the role
  # types land in trait_tree.yaml + their per-genre default kits ship).
  # Genre engine doesn't validate that claimed roles exist in trait_engine
  # (only the inverse) so claiming reserved names here is safe.
  # ─────────────────────────────────────────────────────────────────────

  web_observer:
    description: |
      Read-only web fetchers. Pull RFCs, status pages, public APIs, RSS
      feeds. Cannot drive a browser, cannot call MCP servers that mutate
      state. Findings flow to web_researcher via memory lineage scope.
    risk_profile:
      max_side_effects: network
      provider_constraint: null
      memory_ceiling: lineage
      # ADR-0021-amendment §3 — read-only autonomous web; same posture
      # as Observer-genre but on the web surface.
      max_initiative_level: L3
      default_initiative_level: L3
    default_kit_pattern:
      - web_fetch_only
    trait_emphasis: [research_thoroughness, evidence_demand, suspicion]
    memory_pattern: episodic_focused
    spawn_compatibility: [web_observer, web_researcher]
    roles:
      - web_watcher          # renamed from web_observer_root (ADR-0044 Burst 124)

  web_researcher:
    description: |
      Multi-source synthesizers. Fetch from N allowlisted hosts,
      cross-reference, summarize. Can call read-only MCP tools. Memory
      ceiling is `consented` so research artifacts can be shared with
      downstream agents on per-event grant. Cannot drive a browser;
      cannot call mutating MCP tools.
    risk_profile:
      max_side_effects: network
      provider_constraint: null
      memory_ceiling: consented
      # ADR-0021-amendment §3 — research-class on the web surface.
      max_initiative_level: L4
      default_initiative_level: L3
    default_kit_pattern:
      - web_fetch_only
      - mcp_read_only
    trait_emphasis: [research_thoroughness, lateral_thinking, evidence_demand]
    memory_pattern: long_consolidated
    spawn_compatibility: [web_researcher, web_actuator]
    roles:
      - web_researcher       # renamed from web_researcher_root (ADR-0044 Burst 124)

  web_actuator:
    description: |
      Drive a real UI or call mutating MCP tools. Always gated: every
      browser_action and every mutating mcp_call requires operator
      approval per call. Headless by default; headful only via
      FSF_BROWSER_HEADFUL=true (debug). Per-agent constitution pins
      the allowlisted domains + the secret_names the agent may read
      from the secrets store.
    risk_profile:
      max_side_effects: external
      provider_constraint: null
      memory_ceiling: consented   # CEILING, not default — see ADR-003X note
      # ADR-0021-amendment §3 — actuator on the web surface; always
      # operator-gated per call.
      max_initiative_level: L5
      default_initiative_level: L5
    default_kit_pattern:
      - web_fetch_only
      - mcp_full
      - browser_action_full
    trait_emphasis: [caution, evidence_demand, double_checking]
    memory_pattern: long_consolidated
    spawn_compatibility: [web_actuator]
    roles:
      - web_actuator         # renamed from web_actuator_root (ADR-0044 Burst 124)
