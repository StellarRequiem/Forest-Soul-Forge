# Forest Soul Forge — role genres (ADR-0021).
#
# Seven flat genres in v1. Each role belongs to exactly one genre. Loading
# enforces:
#   1. Each role name appears under exactly one genre.
#   2. Every role known to the TraitEngine is claimed by some genre. (Reverse
#      direction is allowed — genres.yaml may list aspirational roles that
#      the trait engine hasn't declared yet.)
#   3. spawn_compatibility entries reference real genres in this file.
#
# Cross-references:
# - ADR-0008 — Companion's local_only provider_constraint comes from here.
# - ADR-0017 — voice renderer reads `trait_emphasis` to weight the prompt.
# - ADR-0018 — tool catalog's `genre_default_tools` (T4) keys off genre name.

version: "0.1"

genres:

  observer:
    description: |
      Passive watching, read-only orientation. Reports findings; does not
      act on them. The default genre for any "watch X and tell me when Y"
      ask. Should not be its own action-taker — route through a Communicator
      that the operator can gate.
    risk_profile:
      max_side_effects: read_only
      memory_ceiling: lineage   # ADR-0027 §5: working notes flow up to investigators/communicators
    default_kit_pattern:
      - passive_observation
      - timestamp_helpers
    trait_emphasis: [vigilance, suspicion, thoroughness, double_checking]
    memory_pattern: short_retention
    spawn_compatibility: [observer, investigator]
    roles:
      - network_watcher
      - log_analyst
      # Aspirational (declared here so when the trait engine adds them they
      # already have a home). Loader does NOT require these to exist in the
      # trait engine.
      - signal_listener
      - dashboard_watcher

  investigator:
    description: |
      Active correlation across observation surfaces. Mostly read-only but
      with controlled network reach (DNS lookups, threat-intel queries,
      baseline comparisons). Can spawn back to Observer for deeper passive
      watching, or forward to Communicator to report findings.
    risk_profile:
      max_side_effects: network
      memory_ceiling: lineage   # ADR-0027 §5: episodic findings flow to communicators
    default_kit_pattern:
      - passive_observation
      - cross_source_correlation
      - baseline_comparison
    trait_emphasis: [evidence_demand, double_checking, lateral_thinking, technical_accuracy]
    memory_pattern: episodic_long
    spawn_compatibility: [observer, investigator, communicator]
    roles:
      - anomaly_investigator
      - incident_correlator
      - threat_hunter

  communicator:
    description: |
      Wraps other agents' findings into messages, briefs, summaries, or
      translations. Sends output to humans or external systems. Every
      outbound action is human-approval-gated by default; the operator must
      acknowledge each delivery. The proper "spokesperson" of a multi-agent
      lineage.
    risk_profile:
      max_side_effects: network
      memory_ceiling: consented   # ADR-0027 §5: pre-federation; "realm" is unreachable until H3
    default_kit_pattern:
      - summarization
      - external_messaging
      - translation_helpers
    trait_emphasis: [transparency, formality, directness, empathy]
    memory_pattern: short_retention
    spawn_compatibility: [communicator]
    roles:
      - notifier
      - briefer
      - status_reporter
      - translator
      # Claimed when the trait_engine added the role — wraps incident
      # findings into briefings / pages / Slack threads. Same risk floor
      # as briefer (network, all outbound human-approval-gated).
      - incident_communicator

  actuator:
    description: |
      Performs durable external actions: creates tickets, deploys
      configurations, sends commands. The most heavily gated genre — every
      non-read-only action requires human approval regardless of trait
      values. Spawn compatibility deliberately tight to prevent silent
      action chains.
    risk_profile:
      max_side_effects: external
      memory_ceiling: lineage   # ADR-0027 §5: action results visible to escalation chain only
    default_kit_pattern:
      - external_actions
      - approval_workflows
    trait_emphasis: [caution, evidence_demand, transparency, formality]
    memory_pattern: episodic_long
    spawn_compatibility: [actuator]
    roles:
      - ticket_creator
      - deploy_runner
      - alert_dispatcher

  guardian:
    description: |
      Safety check, second opinion, refusal arbiter, content review. Reads
      another agent's output and either blesses or blocks it. Strict
      read-only kit; high evidence_demand and double_checking by trait
      emphasis. The "no" agent in a multi-agent flow.
    risk_profile:
      max_side_effects: read_only
      memory_ceiling: private   # ADR-0027 §5: assessments stay internal to the arbiter
    default_kit_pattern:
      - content_review
      - policy_check
      - audit_inspection
    trait_emphasis: [evidence_demand, double_checking, caution, transparency]
    memory_pattern: short_retention
    spawn_compatibility: [guardian]
    roles:
      - safety_check
      - content_review
      - refusal_arbiter

  researcher:
    description: |
      Literature scan, data synthesis, knowledge consolidation. Reads
      broadly with allowlisted network reach (catalog browse, web fetch
      against allowlists), emits structured summaries. Long-running by
      nature. Distinct from Investigator by breadth: an Investigator
      drills into a specific anomaly; a Researcher surveys a topic.
    risk_profile:
      max_side_effects: network
      memory_ceiling: consented   # ADR-0027 §5: synthesis can disclose to allowlisted recipients
    default_kit_pattern:
      - web_research
      - corpus_synthesis
      - citation_management
    trait_emphasis: [thoroughness, research_thoroughness, lateral_thinking, transparency]
    memory_pattern: episodic_long
    spawn_compatibility: [researcher, communicator]
    roles:
      - paper_summarizer
      - vendor_research
      - knowledge_consolidator

  companion:
    description: |
      Therapy-adjacent, accessibility runtime, interactive presence. The
      Phase 5 path from ADR-0008. Distinct from every other genre by
      audio/video runtime, persistent memory, and emotional-affect-aware
      policies. Highest privacy floor: local-only providers required for
      any session involving user state. NEVER spawns out-of-genre.
    risk_profile:
      max_side_effects: network
      provider_constraint: local_only
      memory_ceiling: private   # ADR-0027 §5: Companion identity, non-overridable
    default_kit_pattern:
      - interactive_session
      - memory_recall
      - schedule_aware
    trait_emphasis: [empathy, patience, warmth, composure, transparency]
    memory_pattern: long_consolidated
    spawn_compatibility: [companion]
    roles:
      - therapist
      - accessibility_runtime
      - day_companion
      - learning_partner
      # Claimed when the trait_engine added the role — operator-side
      # assistive presence (think: copilot for the human running the
      # forge, not the agents being spawned). Inherits Companion's
      # local-only provider floor automatically.
      - operator_companion

  # ─────────────────────────────────────────────────────────────────────
  # Security Swarm (ADR-0033) — three new genres for the defensive plane.
  # Strict tier hierarchy: low catches the obvious, mid digs deeper, high
  # assumes hostility. Memory ceiling tightens as you climb. Cross-tier
  # spawn permitted only via the swarm's escalation pattern (low→mid,
  # mid→high) — no skipping levels.
  # ─────────────────────────────────────────────────────────────────────

  security_low:
    description: |
      Always-on, narrow-scope defenders that catch the obvious. Read-only
      or local-advisory tooling; findings flow up to security_mid via
      memory lineage scope. Never act outside their narrow kit. The
      swarm's first responders — high vigilance, low blast radius.
    risk_profile:
      max_side_effects: read_only
      memory_ceiling: lineage   # ADR-0033: findings must be readable by mid-tier investigators
    default_kit_pattern:
      - host_inventory
      - log_observation
      - policy_audit
    trait_emphasis: [vigilance, audit_trail_discipline, thoroughness, double_checking]
    memory_pattern: short_retention
    spawn_compatibility: [security_low, security_mid]
    roles:
      - patch_patrol
      - gatekeeper
      - log_lurker

  security_mid:
    description: |
      Investigators and responders. Read broadly across host telemetry,
      correlate, score anomalies, and — with operator approval — contain.
      Receives findings from security_low and emits its own to
      security_high. The swarm's working tier; most action lives here.
    risk_profile:
      # ADR-0033 §4 puts isolate_process.v1 (external) in mid tier; the
      # runtime gate is per-tool requires_human_approval (auto-applied
      # via tool_policy's external_always rule), not the genre ceiling.
      # A network-only mid tier would orphan the canonical containment
      # chain (ResponseRogue can't isolate without external).
      max_side_effects: external
      memory_ceiling: lineage   # ADR-0033: episodic findings flow to high-tier policy/key roles
    default_kit_pattern:
      - cross_source_correlation
      - behavioral_baseline
      - host_containment
    trait_emphasis: [evidence_demand, lateral_thinking, technical_accuracy, suspicion]
    memory_pattern: episodic_long
    spawn_compatibility: [security_low, security_mid, security_high]
    roles:
      - anomaly_ace
      - net_ninja
      - response_rogue

  security_high:
    description: |
      The paranoid apex. Assumes hostility, gates everything, and runs
      the smallest blast radius the platform can produce. Memory writes
      default to private; cross-tier disclosure is explicit and audited.
      Spawns are tier-internal — high never spawns out of tier. Local-only
      providers required (mirrors Companion's floor for the same reason:
      key material and posture data must not leave the machine).
    risk_profile:
      max_side_effects: external
      provider_constraint: local_only
      memory_ceiling: private   # ADR-0033: apex tier; explicit consent required for any disclosure
    default_kit_pattern:
      - zero_trust_enforcement
      - key_management
      - deception_primitives
    trait_emphasis: [caution, suspicion, evidence_demand, audit_trail_discipline]
    memory_pattern: long_consolidated
    spawn_compatibility: [security_high]
    roles:
      - zero_zero
      - vault_warden
      - deception_duke
