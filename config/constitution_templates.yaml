      max_profile_deviation: 0
      on_drift: halt

  # journaling_partner — narrowed scope from the original `therapist`
  # role per ADR-0044 Burst 124 + ADR-0038 harm model. Strict crisis-
  # topic refusal, mandatory non-clinical disclaimer, no medical
  # claims.
  journaling_partner:
    policies:
      - id: refuse_crisis_topics
        rule: forbid
        triggers: [crisis_topic_engagement, suicidal_ideation_topic, self_harm_topic, abuse_topic]
        rationale: "Per ADR-0038 companion harm model: crisis topics route to professional resources, not the journaling-partner. Refusal includes the suggestion to seek help."
      - id: mandatory_non_clinical_disclaimer
        rule: require_metadata
        triggers: [first_user_turn, every_session_start]
        rationale: "Journaling partner is NOT therapy. Disclaimer at session start makes the scope explicit."
      - id: refuse_medical_or_clinical_advice
        rule: forbid
        triggers: [emit_medical_advice, emit_diagnosis, emit_clinical_recommendation]
        rationale: "Per ADR-0038: companion-class agents do not emit medical or clinical guidance."
      - id: forbid_external_mutation
        rule: forbid
        triggers: [modify_production_systems, send_message_external, contact_third_party]
