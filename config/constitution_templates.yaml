      - send_message_external
    operator_duties:
      - "Audit status-report cadence weekly."
      - "Verify constitution_hash weekly."
    drift_monitoring:
      profile_hash_check: per_turn
      max_profile_deviation: 0
      on_drift: halt

  translator:
    policies:
      - id: forbid_external_send
        rule: forbid
        triggers: [send_message_external]
        rationale: "Translator transforms text in-system; external delivery is downstream concern."
      - id: forbid_unsupported_target_domain
        rule: forbid
        triggers: [translate_to_unsupported_domain]
        rationale: "Translation outside trained domains produces hallucinated outputs; refuse."
    risk_thresholds:
      auto_halt_risk: 0.80
      escalate_risk: 0.50
      min_confidence_to_act: 0.55
    out_of_scope:
      - modify_production_systems
      - send_message_external
    operator_duties:
      - "Spot-check translation accuracy on critical domains weekly."
      - "Verify constitution_hash weekly."
    drift_monitoring:
      profile_hash_check: per_turn
      max_profile_deviation: 0
      on_drift: halt

  # ---- Tranche 4: actuator extensions ----------------------------------
  alert_dispatcher:
    policies:
      - id: approval_per_send
        rule: require_human_approval
        triggers: [send_alert, send_message_external, dispatch_email, post_to_channel]
        rationale: "Every external alert send is gated. Volume + content + recipient all reviewed."
      - id: rate_limit_alerts
        rule: rate_limit
        triggers: [send_alert]
        rationale: "Alert flooding masks signal in noise; rate-limit per channel."
    risk_thresholds:
      auto_halt_risk: 0.80
      escalate_risk: 0.40
      min_confidence_to_act: 0.65
    out_of_scope:
      - modify_production_systems
      - exfiltrate_data
    operator_duties:
      - "Audit alert dispatch log weekly."
      - "Verify constitution_hash weekly."
      - "Review rate-limit thresholds monthly."
    drift_monitoring:
      profile_hash_check: per_turn
      max_profile_deviation: 0
      on_drift: halt

  deploy_runner:
    policies:
      - id: approval_per_deploy
        rule: require_human_approval
        triggers: [deploy, run_deployment_script, shell_exec_outside_test_runner]
        rationale: "Every deploy is approval-gated. Even rollbacks."
      - id: forbid_arbitrary_shell
        rule: forbid
        triggers: [shell_exec_arbitrary, sudo, exec_with_modified_env]
        rationale: "Deploy runner has tightly-scoped allowed_commands; arbitrary shell is out-of-scope."
    risk_thresholds:
      auto_halt_risk: 0.80
      escalate_risk: 0.35
      min_confidence_to_act: 0.70
    out_of_scope:
      - shell_exec_arbitrary
      - sudo
      - modify_production_systems_directly
    operator_duties:
      - "Review every deploy's audit chain entry within SLA."
      - "Audit allowed_commands list quarterly."
      - "Verify constitution_hash weekly."
    drift_monitoring:
      profile_hash_check: per_turn
      max_profile_deviation: 0
      on_drift: halt

  ticket_creator:
    policies:
      - id: approval_per_ticket
        rule: require_human_approval
        triggers: [create_ticket, create_issue, mcp_call_jira_create, mcp_call_linear_create]
        rationale: "Every external ticket creation is approval-gated to prevent ticket-spam attacks."
      - id: rate_limit_tickets
        rule: rate_limit
        triggers: [create_ticket]
        rationale: "Ticket flooding spams the operator's queue; rate-limit per service."
    risk_thresholds:
      auto_halt_risk: 0.80
      escalate_risk: 0.45
      min_confidence_to_act: 0.65
    out_of_scope:
      - delete_ticket
      - modify_production_systems
    operator_duties:
      - "Audit ticket-creation log weekly."
      - "Verify constitution_hash weekly."
    drift_monitoring:
      profile_hash_check: per_turn
      max_profile_deviation: 0
      on_drift: halt

  # ---- Tranche 5: guardian extensions ----------------------------------
  content_review:
    policies:
      - id: forbid_content_mutation
        rule: forbid
        triggers: [modify_content, edit_content, redact_content_unauthorized]
        rationale: "Reviewer flags; only authorized operators redact. Separation of duties."
