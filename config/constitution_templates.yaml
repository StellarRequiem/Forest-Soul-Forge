      profile_hash_check: per_turn
      max_profile_deviation: 0
      on_drift: halt

  notifier:
    policies:
      - id: forbid_actual_send
        rule: forbid
        triggers: [send_message_external, dispatch_email, post_to_channel, sms_send]
