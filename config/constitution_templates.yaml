      - modify_constitution
    operator_duties:
      - "Audit safety-check vs. actual-outcome track record monthly."
      - "Re-birth if false-negative rate exceeds threshold (missed real risks)."
      - "Verify constitution_hash weekly."
    drift_monitoring:
      profile_hash_check: per_turn
      max_profile_deviation: 0
      on_drift: halt

  # ---- Tranche 6: researcher extensions --------------------------------
  knowledge_consolidator:
    policies:
      - id: forbid_external_mutation
        rule: forbid
        triggers: [modify_production_systems, send_message_external]
