# long enough to detect operator-behavior baselines worth
# anomaly-flagging. D5, D6, D7 are downstream of D2 in the
# rollout order, so the receiving roles don't exist yet.
#
# Pending cascades, declared inert:
#   d2.task_prioritization     → d5.routine_management  (ACTIVATED in ADR-0091 Phase D)
#   d2.morning_briefing        → d5.home_orchestration  (ACTIVATED in ADR-0091 Phase D)
#   d2.reminder                → d6.bill_reminder
#   d2.daily_reflection        → d7.content_seed
#   d2.morning_briefing        → d3.anomaly_baseline   (deferred)
#
# As of ADR-0091 Phase D the two d2→d5 cascades are live;
# remaining d2→d6/d7 cascades land when their target domains
# ship.

# ADR-0091 Phase D — INERT d5→downstream cascades.
#
# The D5 manifest at config/domains/d5_smart_home.yaml names
# four handoff_targets:
#   d2_daily_life_os    # routines (vacation mode, etc.)         — handled via d5→d2 active cascade above
#   d3_local_soc        # posture changes based on home state    — handled via d5→d3 active cascade above
#   d1_knowledge_forge  # routines indexed for "when did I last…" queries
#   d6_finance          # power-bill anomaly hand-off
#
# d1 + d6 cascades stay inert:
#   - d5 → d1 (routines_index): d1 has no `routines_index`
#     capability; "when did I last X" queries can already be
#     answered against the routine_queued attestations in
#     memory via memory_recall, so there's no D1-side capability
#     to add. If a future operator wants explicit routine
#     indexing in the catalog, librarian-D1 can subscribe via a
#     separate cascade rule.
#   - d5 → d6 (power_bill_anomaly): D6 doesn't ship yet (final
#     domain in the rollout order). The energy_warden's
#     spike/drift attestations are ready for D6 to consume when
#     it lands.
#
# Pending cascades, declared inert:
#   d5.energy_optimization    → d6.power_bill_anomaly   (deferred until D6 ships)
#   d5.routine_management     → d1.routines_index       (deferred; capability TBD)
#
# Each pending cascade will land as a real cascade_rules entry
# when its target capability exists. Until then they are
# documentation, not configuration — same INERT pattern as
# ADR-0086's downstream-cascade notes.

# ADR-0088 Phase D — INERT cascades involving D7.
#
# The D7 manifest at config/domains/d7_content_studio.yaml names
# four handoff_targets:
#   d1_knowledge_forge   # source material for drafts (handled via d1→d7 active cascade above)
#   d2_daily_life_os     # weekly retro → content seeds (handled via d2→d7 active cascade above)
#   d4_code_review       # PR → changelog → public release notes
#   d9_learning_coach    # drafts → curriculum
#
# d4 → d7 (release notes from PR signoff) is an attractive cascade
# but the d4 side ships release_check.v1 + safe_migration.v1; a
# "release-notes-from-pr" capability doesn't yet exist on the d4
# side. Adding the cascade would require either:
#   - a new d4 capability (release_notes_draft) wired to a new
#     skill, OR
#   - reusing the existing release_signoff capability + a new
#     d7-side skill that consumes the signoff as content seed.
# Either path is bigger than one phase's scope. Declare inert.
#
# d7 → d9 is straightforward — every approved d7 draft is a
# candidate curriculum module — but D9 Learning Coach hasn't
# shipped yet. The receiving capability doesn't exist; declare
# inert until D9 lands.
#
# Pending cascades, declared inert:
#   d4.release_signoff         → d7.release_notes_draft  (d7 side needs new skill)
#   d7.editing                 → d9.curriculum_module    (d9 not yet shipped)
#   d7.format_adaptation       → d9.curriculum_format    (d9 not yet shipped)
#
# Each pending cascade will land as a real cascade_rules entry
# when its target capability ships. Until then they are
# documentation, not configuration — same INERT pattern as
# ADR-0086 + ADR-0087's downstream-cascade notes.

# ADR-0089 Phase D — INERT d9→downstream cascades.
#
# The D9 manifest at config/domains/d9_learning_coach.yaml names
# four handoff_targets:
#   d1_knowledge_forge   # gaps → catalog (assessment feedback path)
#   d10_research_lab     # deep dives (D10 not yet shipped)
#   d7_content_studio    # drafts operator can refine (certification → public draft)
#   d2_daily_life_os     # scheduled study blocks (handled via d9→d2 active cascades above)
#
# d9 → d10 is straightforward — every operator-curiosity-driven
# topic the assessor flags as "needs deeper than the curriculum can
# offer" is a candidate D10 deep-research task — but D10 hasn't
# shipped. Receiving capability doesn't exist; declare inert.
#
# d9 → d1 (assessment feedback → catalog) is an attractive cascade
# — "the assessor's signed-off masteries become catalog confirmations
# in the librarian's corpus" — but the d1 side ships
# knowledge_curation expecting source-claim provenance from external
# fetches (prospector / web_fetch). A "mastery-confirmation seed"
# is a different shape; adding the cascade would require either:
#   - a new d1 capability (mastery_seed_curation) wired to a new
#     skill, OR
#   - reusing knowledge_curation with a new content-type marker
#     the librarian doesn't currently distinguish.
# Either path is bigger than this phase's scope. Declare inert.
#
# d9 → d7 (certification → public draft) is similar — "the operator
# certified mastery on diffusion models, so D7 can draft the
# 'what I learned' blog post" — but it requires a new d7 capability
# (certification_to_draft) the writer's draft_writing skill
# doesn't currently distinguish from operator-authored outlines.
# Declare inert.
#
# Pending cascades, declared inert:
#   d9.assessment_feedback     → d1.knowledge_curation     (d1 side needs new content-type)
#   d9.skill_certification     → d7.content_drafting       (d7 side needs new capability)
#   d9.deep_research_request   → d10.research              (declared INERT in ADR-0090 below; d10 ships but d9 lacks deep_research_request capability)
#
# Each pending cascade will land as a real cascade_rules entry
# when its target capability ships. Until then they are
# documentation, not configuration — same INERT pattern as
# ADR-0086 + ADR-0087 + ADR-0088's downstream-cascade notes.

# ADR-0090 Phase D — INERT cascades involving D10.
#
# The D10 manifest at config/domains/d10_research_lab.yaml names
# four handoff_targets:
#   d1_knowledge_forge   # archives the report (handled via d10→d1 active cascade above)
#   d9_learning_coach    # research → curriculum (handled via d10→d9 active cascade above)
#   d7_content_studio    # research → publishable content (handled via d10→d7 active cascade above)
#   d4_code_review       # research as input to ADR proposals
#
# Three remaining INERT declarations after Phase D:
#
# d9 → d10 (deep_research_request → research): the D9 manifest
# notes that "operator-curiosity-driven topics the assessor flags
# as needs-deeper-than-curriculum" should cascade into D10. The
# D10 side ships (research capability resolves to research_synthesis),
# but the D9 side does NOT ship a deep_research_request capability —
# the assessor's flag attestations live in lineage memory but there
# is no dedicated assessor → deep-research-request emitter. Adding
# the cascade would require either:
#   - a new D9 capability (deep_research_request) wired to a new
#     skill on the assessor's side, OR
#   - rewiring assessor's existing assessment skill to emit a
#     route-eligible event when low-mastery is detected.
# Either path is bigger than this phase's scope; the operator can
# opt in manually by dispatching source_gathering directly.
#
# d10 → d4 (adr_proposal → review_signoff): the D10 manifest's
# handoff_targets named d4 for "research as input to ADR proposals".
# The cascade would have the lab synthesis seed an ADR proposal
# draft the code_reviewer can pick up. But neither side ships the
# adr_proposal capability today — D10's lab_synthesizer produces a
# research synthesis (not an ADR shape), and D4's reviewer expects
# PR-diff input (not a synthesis). Adding the cascade would require
# a new D7-style drafting capability that converts synthesis →
# ADR template. Declare inert; the operator can manually compose
# an ADR proposal from the synthesis output.
#
# verifier_loop → d10 (contradiction → deep_research): the
# verifier_loop role (ADR-0036) flags memory contradictions; a
# cascade would seed a D10 deep-research pass to resolve the
# contradiction with external sources. But verifier_loop is a
# substrate role, not a domain capability, so the
# (source_domain, source_capability) shape doesn't fit the
# cascade_rules table. The cascade is operator-triggered: when
# verifier_loop's flag attestation lands, the operator can
# dispatch source_gathering or the full research_synthesis skill
# directly. Declare inert; this is structural, not pending.
#
# Pending cascades, declared inert:
#   d9.deep_research_request   → d10.research          (d9 side needs new capability)
#   d10.adr_proposal           → d4.review_signoff     (both sides need adr_proposal capability)
#   verifier_loop → d10                                (structural — substrate role, not a domain capability)
#
# Each pending cascade will land as a real cascade_rules entry
# when its prerequisite capability ships. Until then they are
# documentation, not configuration — same INERT pattern as
# ADR-0086 + ADR-0087 + ADR-0088 + ADR-0089's downstream-cascade
# notes.

# ADR-0078 Phase A — NO new cascade rules from forensic_archive.
# Deliberate. The ADR's Decision 4 named three cascades on the
# D3 side (one pre-existing d3→d8, two pending Phase D for
# anomaly_detection and detection_authoring). A
# d3.incident_response → d3.forensic_archive cascade would be
# attractive — "every incident response auto-preserves evidence" —
# but it would also make the archivist's read_only attestation
# fire on every SOC alert, inflating the audit chain with
# attestations of artifacts that the operator may never consult.
# Phase D (SOAR playbooks, ADR-0066) is the right home for that
# cascade: a playbook step can decide WHICH incidents need
# auto-archive based on severity + classification rather than
# blanket-cascading every response. Until then, forensic_archive
# is operator-triggered.
