# Cascade rules — engineer-defined, code-reviewed via PR.
#
# Each rule: when a route to (source_domain, source_capability)
# succeeds, a follow-on route fires to (target_domain,
# target_capability). The follow-on inherits the original intent
# + confidence; the audit chain joins them via cascade_source_*
# fields on the ResolvedRoute.
#
# Cascades don't recurse: A→B fires, but B→C doesn't auto-chain.
# Operators who want recursive cascades write them explicitly.
cascade_rules:
  - source_domain: d4_code_review
    source_capability: review_signoff
    target_domain: d8_compliance
    target_capability: compliance_scan
    reason: |
      Every PR review fires a compliance scan. Continuous
      compliance discipline — drift caught at minute zero, not at
      audit time. ADR-0067 T4 hardcoded rail.

  - source_domain: d3_local_soc
    source_capability: incident_response
    target_domain: d8_compliance
    target_capability: compliance_scan
    reason: |
      Every incident response triggers a compliance evidence
      capture — the SOC event becomes part of the audit packet.

  # ADR-0086 Phase D — D1 Knowledge Forge cascades.
  #
  # ACTIVE cascade: d8 compliance regulation updates flow into
  # the librarian's catalog so the operator's personal knowledge
  # corpus stays current with the framework rules the operator
  # is bound by. Mirrors the d4→d8 rail's "continuous discipline,
  # not annual sweep" framing.
  - source_domain: d8_compliance
    source_capability: compliance_scan
    target_domain: d1_knowledge_forge
    target_capability: knowledge_curation
    reason: |
      Every compliance scan that surfaces a framework-rule
      change or a control delta cascades into the librarian's
      catalog. The operator's personal knowledge corpus stays
      synced with the framework rules they're actually bound
      by — no "we missed the SOC2 amendment" gaps.

  # ADR-0088 Phase D — D7 Content Pipeline cascades.
  #
  # ACTIVATING the two cascades that were declared INERT in
  # ADR-0086 + ADR-0087's downstream-cascade notes: D1's
  # knowledge_curation now flows into D7's content_drafting so
  # the Writer-D7 can draw on the librarian's catalog as source
  # material; D2's daily_reflection now flows into D7's
  # content_seed so the Reflector-D2's evening sweep surfaces
  # blog-post seeds the writer can pick up.
  - source_domain: d1_knowledge_forge
    source_capability: knowledge_curation
    target_domain: d7_content_studio
    target_capability: content_drafting
    reason: |
      Every D1 librarian catalog write cascades into a D7 content
      drafting trigger. Writer-D7's draft_writing skill reads
      recent topic:<slug> catalog entries from lineage memory +
      surfaces yesterday's knowledge work into today's draft
      pipeline. This was declared INERT in ADR-0086 Decision 4's
      downstream-cascade notes; activating now that D7 ships.

  - source_domain: d2_daily_life_os
    source_capability: daily_reflection
    target_domain: d7_content_studio
    target_capability: content_seed
    reason: |
      Every D2 evening reflection cascades into a D7 content seed
      trigger. Reflector-D2's daily_reflection digest surfaces
      decisions + patterns the operator may want to write about;
      Writer-D7's draft_writing skill picks the digest up via
      lineage memory as candidate content seeds. This was
      declared INERT in ADR-0087 Decision 4's downstream-cascade
      notes; activating now that D7 ships.

  # ADR-0089 Phase D — D9 Learning Coach cascades.
  #
  # ACTIVATING the four cascades that were declared INERT in
  # ADR-0086 + ADR-0088's downstream-cascade notes: D1's
  # knowledge_contradiction_flag now flows into D9's curriculum_design
  # so contradictions surface curriculum gaps the designer can fill;
  # D7's editing now flows into D9's curriculum_module so polished
  # drafts seed curriculum modules; D9's spaced_repetition now flows
  # into D2's reminder so the operator's review queue gets reminder
  # delivery; D9's curriculum_design now flows into D2's
  # task_prioritization so curriculum study blocks land in the daily
  # task ranking.
  - source_domain: d1_knowledge_forge
    source_capability: knowledge_contradiction_flag
    target_domain: d9_learning_coach
    target_capability: curriculum_design
    reason: |
      Every D1 contradiction flag cascades into a D9 curriculum
      design trigger. CurriculumDesigner-D9 reads recent
      knowledge_verifier flag attestations from lineage memory +
      surfaces the contradiction as a curriculum gap (an unmet
      prereq the catalog hasn't filled). This was declared INERT
      in ADR-0086 Decision 4's downstream-cascade notes; activating
      now that D9 ships.

  - source_domain: d7_content_studio
    source_capability: editing
    target_domain: d9_learning_coach
    target_capability: curriculum_module
    reason: |
      Every D7 editor approve verdict cascades into a D9 curriculum
      module trigger. CurriculumDesigner-D9 reads recent editor-
      approved drafts from lineage memory + surfaces them as
      candidate curriculum entries (the operator's own polished
      writing becomes their own learning material). This was
      declared INERT in ADR-0088 Decision 4's downstream-cascade
      notes; activating now that D9 ships.

  - source_domain: d9_learning_coach
    source_capability: spaced_repetition
    target_domain: d2_daily_life_os
    target_capability: reminder
    reason: |
      Every D9 spaced-repetition queue update cascades into a D2
      reminder trigger. SpacedRepetitionPilot-D9's queue record
      includes fire_at; Time-Steward-D2's schedule_reminder skill
      picks the queue entry up + creates a reminder for the
      operator. This is the composition the ADR-0089 design specs:
      D9 schedules, D2 delivers.

  - source_domain: d9_learning_coach
    source_capability: curriculum_design
    target_domain: d2_daily_life_os
    target_capability: task_prioritization
    reason: |
      Every D9 curriculum attestation cascades into a D2 task
      prioritization trigger. TaskPrioritizer-D2 reads recent
      curriculum attestations from lineage memory + ranks the
      next-N study blocks against the operator's other tasks.
      Surfaces "study diffusion-forward today" alongside the
      operator's other obligations rather than as a separate
      stream.

  # ADR-0087 Phase D — D2 Daily Life OS cascades.
  #
  # ACTIVATING the cascade that was declared INERT in
  # ADR-0086's downstream-cascade notes: D1's daily knowledge
  # delta now flows into D2's morning briefing so the
  # Coordinator-D2 has yesterday's knowledge activity visible
  # when it composes the brief. This is the "morning briefing
  # surfaces knowledge work" arc the D2 manifest's value-prop
  # named.
  - source_domain: d1_knowledge_forge
    source_capability: daily_knowledge_delta
    target_domain: d2_daily_life_os
    target_capability: morning_briefing
    reason: |
      Every D1 daily knowledge delta cascades into a D2 morning
      briefing trigger. Coordinator-D2's daily_orchestration
      skill reads recent daily_delta_built memory entries +
      surfaces yesterday's catalog activity into today's brief.
      This was declared INERT in ADR-0086 Decision 4's
      downstream-cascade notes; activating now that D2 ships.

# ADR-0086 Phase D — INERT d1→downstream cascades.
#
# The D1 manifest at config/domains/d1_knowledge_forge.yaml
# names four handoff_targets:
#   d9_learning_coach   # gaps → curriculum
#   d10_research_lab    # deep dives
#   d7_content_studio   # source material for drafts
#   d2_daily_life_os    # surfaces into morning briefing
#
# All four downstream domains are UPSTREAM of D1 in the rollout
# order (D4→D3→D8→D1→D2→D7→D9→D10→D5→D6 per ADR-0067), so the
# receiving roles don't exist yet. We DECLARE the cascade
# intent here (so a future operator + a future maintainer can
# see the planned wiring at a glance), but the cascade rules
# themselves stay un-codified until the downstream rollouts
# land. This mirrors the ADR-0078 Phase A pattern where the
# d3 → forensic_archive cascade was deliberately deferred to
# Phase D (SOAR playbooks).
#
# Pending cascades, declared inert:
#   d1.knowledge_contradiction_flag → d9.curriculum_design
#   d1.knowledge_summarize          → d10.deep_research
#   d1.knowledge_curation           → d7.content_drafting
#   d1.daily_knowledge_delta        → d2.morning_briefing
#
# Each pending cascade will land as a real cascade_rules entry
# when its target domain ships. Until then they are
# documentation, not configuration — the operator who wants
# them earlier can opt in manually.

# ADR-0087 Phase D — INERT d2→downstream cascades.
#
# The D2 manifest at config/domains/d2_daily_life_os.yaml
# names five handoff_targets:
#   d1_knowledge_forge  # surface relevant knowledge in briefings (handled via d1→d2 active cascade above)
#   d3_local_soc        # behavior-change anomalies flag here
#   d5_smart_home       # routines (vacation mode, etc.)
#   d6_finance          # bill due-date reminders
#   d7_content_studio   # weekly retro → content seeds
#
# d3 is upstream of d2 in the rollout order but the d2→d3
# direction (D2 surfacing behavior-change anomalies to D3's
# anomaly_ace) is conceptually deferred until D2 has lived
# long enough to detect operator-behavior baselines worth
# anomaly-flagging. D5, D6, D7 are downstream of D2 in the
# rollout order, so the receiving roles don't exist yet.
#
# Pending cascades, declared inert:
#   d2.task_prioritization     → d5.routines
#   d2.reminder                → d6.bill_reminder
#   d2.daily_reflection        → d7.content_seed
#   d2.morning_briefing        → d3.anomaly_baseline   (deferred)
#
# Each pending cascade will land as a real cascade_rules entry
# when its target domain ships. Until then they are
# documentation, not configuration — same INERT pattern as
# ADR-0086's downstream-cascade notes.

# ADR-0088 Phase D — INERT cascades involving D7.
#
# The D7 manifest at config/domains/d7_content_studio.yaml names
# four handoff_targets:
#   d1_knowledge_forge   # source material for drafts (handled via d1→d7 active cascade above)
#   d2_daily_life_os     # weekly retro → content seeds (handled via d2→d7 active cascade above)
#   d4_code_review       # PR → changelog → public release notes
#   d9_learning_coach    # drafts → curriculum
#
# d4 → d7 (release notes from PR signoff) is an attractive cascade
# but the d4 side ships release_check.v1 + safe_migration.v1; a
# "release-notes-from-pr" capability doesn't yet exist on the d4
# side. Adding the cascade would require either:
#   - a new d4 capability (release_notes_draft) wired to a new
#     skill, OR
#   - reusing the existing release_signoff capability + a new
#     d7-side skill that consumes the signoff as content seed.
# Either path is bigger than one phase's scope. Declare inert.
#
# d7 → d9 is straightforward — every approved d7 draft is a
# candidate curriculum module — but D9 Learning Coach hasn't
# shipped yet. The receiving capability doesn't exist; declare
# inert until D9 lands.
#
# Pending cascades, declared inert:
#   d4.release_signoff         → d7.release_notes_draft  (d7 side needs new skill)
#   d7.editing                 → d9.curriculum_module    (d9 not yet shipped)
#   d7.format_adaptation       → d9.curriculum_format    (d9 not yet shipped)
#
# Each pending cascade will land as a real cascade_rules entry
# when its target capability ships. Until then they are
# documentation, not configuration — same INERT pattern as
# ADR-0086 + ADR-0087's downstream-cascade notes.

# ADR-0089 Phase D — INERT d9→downstream cascades.
#
# The D9 manifest at config/domains/d9_learning_coach.yaml names
# four handoff_targets:
#   d1_knowledge_forge   # gaps → catalog (assessment feedback path)
#   d10_research_lab     # deep dives (D10 not yet shipped)
#   d7_content_studio    # drafts operator can refine (certification → public draft)
#   d2_daily_life_os     # scheduled study blocks (handled via d9→d2 active cascades above)
#
# d9 → d10 is straightforward — every operator-curiosity-driven
# topic the assessor flags as "needs deeper than the curriculum can
# offer" is a candidate D10 deep-research task — but D10 hasn't
# shipped. Receiving capability doesn't exist; declare inert.
#
# d9 → d1 (assessment feedback → catalog) is an attractive cascade
# — "the assessor's signed-off masteries become catalog confirmations
# in the librarian's corpus" — but the d1 side ships
# knowledge_curation expecting source-claim provenance from external
# fetches (prospector / web_fetch). A "mastery-confirmation seed"
# is a different shape; adding the cascade would require either:
#   - a new d1 capability (mastery_seed_curation) wired to a new
#     skill, OR
#   - reusing knowledge_curation with a new content-type marker
#     the librarian doesn't currently distinguish.
# Either path is bigger than this phase's scope. Declare inert.
#
# d9 → d7 (certification → public draft) is similar — "the operator
# certified mastery on diffusion models, so D7 can draft the
# 'what I learned' blog post" — but it requires a new d7 capability
# (certification_to_draft) the writer's draft_writing skill
# doesn't currently distinguish from operator-authored outlines.
# Declare inert.
#
# Pending cascades, declared inert:
#   d9.assessment_feedback     → d1.knowledge_curation     (d1 side needs new content-type)
#   d9.skill_certification     → d7.content_drafting       (d7 side needs new capability)
#   d9.deep_research_request   → d10.research              (d10 not yet shipped)
#
# Each pending cascade will land as a real cascade_rules entry
# when its target capability ships. Until then they are
# documentation, not configuration — same INERT pattern as
# ADR-0086 + ADR-0087 + ADR-0088's downstream-cascade notes.

# ADR-0078 Phase A — NO new cascade rules from forensic_archive.
# Deliberate. The ADR's Decision 4 named three cascades on the
# D3 side (one pre-existing d3→d8, two pending Phase D for
# anomaly_detection and detection_authoring). A
# d3.incident_response → d3.forensic_archive cascade would be
# attractive — "every incident response auto-preserves evidence" —
# but it would also make the archivist's read_only attestation
# fire on every SOC alert, inflating the audit chain with
# attestations of artifacts that the operator may never consult.
# Phase D (SOAR playbooks, ADR-0066) is the right home for that
# cascade: a playbook step can decide WHICH incidents need
# auto-archive based on severity + classification rather than
# blanket-cascading every response. Until then, forensic_archive
# is operator-triggered.
