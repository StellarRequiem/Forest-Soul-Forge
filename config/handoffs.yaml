# ADR-0067 T4 — Hardcoded handoff registry.
#
# This file IS the operator's load-bearing cross-domain handoff
# discipline. Engineer-edited via PR; code-reviewed before merge.
# Learned routes (operator-preference adaptation) live elsewhere
# and never override entries here.
#
# Two sections:
#
# 1. default_skill_per_capability — map (domain_id, capability) →
#    (skill_name, skill_version). When the orchestrator routes a
#    sub-intent to (domain, capability), the resolver uses this
#    table to fill in the skill_name + skill_version that
#    route_to_domain.v1 needs.
#
# 2. cascade_rules — hardcoded follow-on routes. A rule like
#    "every successful d4_code_review route also fires a
#    d8_compliance route" goes here. Cascades fire after the
#    initial route succeeds; the audit chain captures the
#    provenance via cascade_source_* fields.

schema_version: 1

default_skill_per_capability:
  # B415: `future_skill: true` marks a route as intentionally
  # declared ahead of the skill artifact. The dispatcher returns
  # a clean 'skill not found' error until the skill lands. ADR-0081
  # section-15 surfaces these as INFO not FAIL; without the marker
  # the cross-check can't distinguish 'forward intent' from
  # 'missing-and-forgotten' wiring.
  #
  # D2 Daily Life OS
  - domain: d2_daily_life_os
    capability: reminder
    skill_name: schedule_reminder
    skill_version: "1"
    future_skill: true
  - domain: d2_daily_life_os
    capability: morning_briefing
    skill_name: generate_briefing
    skill_version: "1"
    future_skill: true

  # D3 Local SOC
  - domain: d3_local_soc
    capability: incident_summary
    skill_name: summarize_recent_incidents
    skill_version: "1"
    future_skill: true
  - domain: d3_local_soc
    capability: incident_response
    skill_name: respond_to_incident
    skill_version: "1"
    future_skill: true
  # ADR-0078 Phase A — forensic_archive maps to archive_evidence.v1.
  # The skill itself ships in B346 (T4); this mapping declares intent
  # so route_to_domain.v1 can resolve the (domain, capability) pair
  # the moment the skill lands. Pre-skill-install dispatches return a
  # clean "skill not found" error from the dispatcher, which is the
  # operator-visible signal that the wiring is ahead of the artifact.
  - domain: d3_local_soc
    capability: forensic_archive
    skill_name: archive_evidence
    skill_version: "1"
  # ADR-0064 T4 (B379) — telemetry_oversight capability maps to
  # telemetry_steward_brief.v1. The skill summarizes recent batch
  # ingestion health; the steward is the only role that runs it.
  - domain: d3_local_soc
    capability: telemetry_oversight
    skill_name: telemetry_steward_brief
    skill_version: "1"
  # ADR-0064 T6 (B385) — threat_intel_curation capability maps to
  # threat_intel_refresh.v1. The skill pulls operator-configured
  # intel sources, verifies provenance, writes to local cache.
  - domain: d3_local_soc
    capability: threat_intel_curation
    skill_name: threat_intel_refresh
    skill_version: "1"
  # ADR-0065 T3 (B391) — detection_authoring capability maps to
  # propose_detection.v1. The engineer proposes new rules / tunes
  # existing rules; operator commits accepted proposals.
  - domain: d3_local_soc
    capability: detection_authoring
    skill_name: propose_detection
    skill_version: "1"
  # ADR-0066 Phase D (B456) — playbook_orchestration maps to
  # playbook_run_review.v1. The pilot's operator-facing surface is
  # a read-only review of recent playbook_executed events; the
  # response actions themselves are playbook-driven, not handoff-
  # driven (ADR-0066 D1: composition over nesting — the playbook IS
  # the codified cascade, which is why no blanket d3 cascade_rules
  # are added for Phase D).
  - domain: d3_local_soc
    capability: playbook_orchestration
    skill_name: playbook_run_review
    skill_version: "1"
  # ADR-0066 Phase D (B457) — adversary_emulation maps to
  # purple_team_brief.v1. purple_pete runs synthetic scenarios
  # against the SOC's rule set; the brief summarizes coverage gaps
  # for the operator (parallel to telemetry_steward_brief).
  - domain: d3_local_soc
    capability: adversary_emulation
    skill_name: purple_team_brief
    skill_version: "1"

  # D4 Code Review
  - domain: d4_code_review
    capability: review_signoff
    skill_name: review_pr
    skill_version: "1"
    future_skill: true
  - domain: d4_code_review
    capability: implementation
    skill_name: implement_feature
    skill_version: "1"
    future_skill: true
  # ADR-0077 advanced rollout — three new capabilities. The skills
  # themselves (propose_tests.v1 / safe_migration.v1 /
  # release_check.v1) ship in T4 (B335-B337); these mappings define
  # the routing target. The dispatcher discovers the missing skill
  # at execute time and returns a clean "skill not found" error,
  # which is what we want during the T2b → T4 window.
  - domain: d4_code_review
    capability: test_proposal
    skill_name: propose_tests
    skill_version: "1"
  - domain: d4_code_review
    capability: migration_safety
    skill_name: safe_migration
    skill_version: "1"
  - domain: d4_code_review
    capability: release_gating
    skill_name: release_check
    skill_version: "1"

  # D8 Compliance Auditor — ADR-0085 Phase D (2026-05-22).
  # All 5 entry capabilities now have live skills:
  - domain: d8_compliance
    capability: compliance_scan
    skill_name: compliance_scan
    skill_version: "1"
  - domain: d8_compliance
    capability: policy_enforcement
    skill_name: policy_enforcement
    skill_version: "1"
  - domain: d8_compliance
    capability: compliance_reporting
    skill_name: compliance_reporting
    skill_version: "1"
  - domain: d8_compliance
    capability: evidence_collection
    skill_name: evidence_collection
    skill_version: "1"
  - domain: d8_compliance
    capability: long_term_archival
    skill_name: long_term_archival
    skill_version: "1"

  # D1 Personal Knowledge Forge — ADR-0086 Phase D (2026-05-23).
  # All 6 entry capabilities now have live skills:
  - domain: d1_knowledge_forge
    capability: knowledge_curation
    skill_name: knowledge_curation
    skill_version: "1"
  - domain: d1_knowledge_forge
    capability: research_gathering
    skill_name: research_gathering
    skill_version: "1"
  - domain: d1_knowledge_forge
    capability: knowledge_summarize
    skill_name: knowledge_summarize
    skill_version: "1"
  - domain: d1_knowledge_forge
    capability: topic_genealogy
    skill_name: topic_genealogy
    skill_version: "1"
  - domain: d1_knowledge_forge
    capability: knowledge_contradiction_flag
    skill_name: knowledge_contradiction_flag
    skill_version: "1"
  - domain: d1_knowledge_forge
    capability: daily_knowledge_delta
    skill_name: daily_knowledge_delta
    skill_version: "1"

# Cascade rules — engineer-defined, code-reviewed via PR.
#
# Each rule: when a route to (source_domain, source_capability)
# succeeds, a follow-on route fires to (target_domain,
# target_capability). The follow-on inherits the original intent
# + confidence; the audit chain joins them via cascade_source_*
# fields on the ResolvedRoute.
#
# Cascades don't recurse: A→B fires, but B→C doesn't auto-chain.
# Operators who want recursive cascades write them explicitly.
cascade_rules:
  - source_domain: d4_code_review
    source_capability: review_signoff
    target_domain: d8_compliance
    target_capability: compliance_scan
    reason: |
      Every PR review fires a compliance scan. Continuous
      compliance discipline — drift caught at minute zero, not at
      audit time. ADR-0067 T4 hardcoded rail.

  - source_domain: d3_local_soc
    source_capability: incident_response
    target_domain: d8_compliance
    target_capability: compliance_scan
    reason: |
      Every incident response triggers a compliance evidence
      capture — the SOC event becomes part of the audit packet.

  # ADR-0086 Phase D — D1 Knowledge Forge cascades.
  #
  # ACTIVE cascade: d8 compliance regulation updates flow into
  # the librarian's catalog so the operator's personal knowledge
  # corpus stays current with the framework rules the operator
  # is bound by. Mirrors the d4→d8 rail's "continuous discipline,
  # not annual sweep" framing.
  - source_domain: d8_compliance
    source_capability: compliance_scan
    target_domain: d1_knowledge_forge
    target_capability: knowledge_curation
    reason: |
      Every compliance scan that surfaces a framework-rule
      change or a control delta cascades into the librarian's
      catalog. The operator's personal knowledge corpus stays
      synced with the framework rules they're actually bound
      by — no "we missed the SOC2 amendment" gaps.

# ADR-0086 Phase D — INERT d1→downstream cascades.
#
# The D1 manifest at config/domains/d1_knowledge_forge.yaml
# names four handoff_targets:
#   d9_learning_coach   # gaps → curriculum
#   d10_research_lab    # deep dives
#   d7_content_studio   # source material for drafts
#   d2_daily_life_os    # surfaces into morning briefing
#
# All four downstream domains are UPSTREAM of D1 in the rollout
# order (D4→D3→D8→D1→D2→D7→D9→D10→D5→D6 per ADR-0067), so the
# receiving roles don't exist yet. We DECLARE the cascade
# intent here (so a future operator + a future maintainer can
# see the planned wiring at a glance), but the cascade rules
# themselves stay un-codified until the downstream rollouts
# land. This mirrors the ADR-0078 Phase A pattern where the
# d3 → forensic_archive cascade was deliberately deferred to
# Phase D (SOAR playbooks).
#
# Pending cascades, declared inert:
#   d1.knowledge_contradiction_flag → d9.curriculum_design
#   d1.knowledge_summarize          → d10.deep_research
#   d1.knowledge_curation           → d7.content_drafting
#   d1.daily_knowledge_delta        → d2.morning_briefing
#
# Each pending cascade will land as a real cascade_rules entry
# when its target domain ships. Until then they are
# documentation, not configuration — the operator who wants
# them earlier can opt in manually.

# ADR-0078 Phase A — NO new cascade rules from forensic_archive.
# Deliberate. The ADR's Decision 4 named three cascades on the
# D3 side (one pre-existing d3→d8, two pending Phase D for
# anomaly_detection and detection_authoring). A
# d3.incident_response → d3.forensic_archive cascade would be
# attractive — "every incident response auto-preserves evidence" —
# but it would also make the archivist's read_only attestation
# fire on every SOC alert, inflating the audit chain with
# attestations of artifacts that the operator may never consult.
# Phase D (SOAR playbooks, ADR-0066) is the right home for that
# cascade: a playbook step can decide WHICH incidents need
# auto-archive based on severity + classification rather than
# blanket-cascading every response. Until then, forensic_archive
# is operator-triggered.
