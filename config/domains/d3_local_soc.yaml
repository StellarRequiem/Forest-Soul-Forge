# Domain D3 — Local SOC (Security Operations Center)
# ADR-0067 T1 manifest. Status: live (2026-05-22) — the full
# 15-agent SOC is alive. The 9-agent blue team (log_lurker,
# anomaly_ace, response_rogue, vault_warden, patch_patrol,
# gatekeeper, net_ninja, zero_zero, deception_duke) handles
# baseline monitoring + triage; the 6-agent advanced rollout
# (ADR-0078) adds forensic_archivist (Phase A), telemetry_steward +
# threat_intel_curator (Phase B), detection_engineer (Phase C), and
# playbook_pilot + purple_pete (Phase D). The full Detect → Respond
# → Test loop ships across ADR-0064 / 0065 / 0066.
domain_id: d3_local_soc
name: Local Security Operations Center
status: live

description: |
  Single-host, audit-grade, sovereign SOC. Continuous monitoring +
  detection engineering + threat hunting + incident response +
  vulnerability management + active deception. Built on existing
  9-agent blue team (Security Swarm, ADR-0033). Advanced version
  ships telemetry pipeline (ADR-0064), detection-as-code with
  Sigma rules + MITRE ATT&CK tagging (ADR-0065), and SOAR playbook
  DSL (ADR-0066). 6 new agents in advanced rollout: telemetry_steward,
  detection_engineer, playbook_pilot, threat_intel_curator,
  forensic_archivist, purple_pete.

entry_agents:
  - role: response_rogue
    capability: incident_response
  - role: log_lurker
    capability: log_monitoring
  - role: anomaly_ace
    capability: anomaly_detection
  - role: vault_warden
    capability: forensic_cleanup
  - role: patch_patrol
    capability: vulnerability_check
  - role: gatekeeper
    capability: access_audit
  - role: deception_duke
    capability: deception_management
  # ADR-0078 Phase A (B342-B347) — chain-of-custody guardian.
  # Read-only kit; the apply path is operator-driven. Distinct
  # from vault_warden's forensic_cleanup: vault_warden DISPOSES,
  # forensic_archivist PRESERVES + ATTESTS.
  - role: forensic_archivist
    capability: forensic_archive
  # ADR-0064 T4 (B379) — Phase B telemetry steward. Read-only kit;
  # oversees the T2 adapter substrate's batch anchors. Distinct
  # from anomaly_ace's anomaly_detection: the steward reviews
  # BATCH metadata (volume/freshness/integrity_root); anomaly_ace
  # reviews event CONTENT.
  - role: telemetry_steward
    capability: telemetry_oversight
  # ADR-0064 T6 (B385) — Phase B threat intel curator. Read-only
  # kit; pulls + tags external intel feeds. Distinct from
  # patch_patrol's vulnerability_check: curator handles
  # FEED CONTENT; patch_patrol handles SYSTEM STATE.
  - role: threat_intel_curator
    capability: threat_intel_curation
  # ADR-0065 T3 (B391) — Phase C detection engineer. Researcher
  # kit; authors rules + reviews matches. Distinct from
  # anomaly_ace's anomaly_detection: engineer AUTHORS detection
  # CONTENT (rules); anomaly_ace consumes detection_fired events
  # for LLM-grade follow-up. Distinct from telemetry_steward:
  # steward sees BATCH metadata; engineer sees DETECTION matches
  # + proposes rules.
  - role: detection_engineer
    capability: detection_authoring
  # ADR-0066 Phase D (B456) — SOAR playbook pilot. Actuator kit;
  # consumes detection_fired events, runs operator-authored
  # playbooks under approval governance. Distinct from
  # response_rogue's incident_response: response_rogue runs ad-hoc
  # coded response paths; playbook_pilot runs codified,
  # version-controlled, operator-reviewed playbooks.
  - role: playbook_pilot
    capability: playbook_orchestration
  # ADR-0066 Phase D (B457) — purple-team adversary simulator.
  # Researcher kit; runs synthetic scenarios against the SOC's
  # detection coverage. Distinct from deception_duke's
  # deception_management: deception_duke lays canaries + watches
  # the red rail continuously; purple_pete runs scheduled,
  # measured, synthetic exercises and reports coverage gaps.
  - role: purple_pete
    capability: adversary_emulation

capabilities:
  - incident_response
  - log_monitoring
  - anomaly_detection
  - forensic_cleanup
  - forensic_archive       # ADR-0078 Phase A
  - telemetry_oversight    # ADR-0064 T4 (B379) — D3 Phase B
  - threat_intel_curation  # ADR-0064 T6 (B385) — D3 Phase B
  - detection_authoring    # ADR-0065 T3 (B391) — D3 Phase C
  - playbook_orchestration # ADR-0066 (B456) — D3 Phase D
  - adversary_emulation    # ADR-0066 (B457) — D3 Phase D
  - vulnerability_check
  - access_audit
  - deception_management
  - threat_hunting
  - incident_summary
  - canary_status

example_intents:
  - "is there anything weird happening on my machine?"
  - "what did the SOC see overnight?"
  - "are my patches up to date?"
  - "show me canary status"
  - "investigate this suspicious log entry"
  - "run a threat hunt for lateral movement"

depends_on_substrate:
  - ADR-0033  # Security Swarm (shipped)
  - ADR-0049  # per-event signatures (shipped — tamper-PROOF chain)
  - ADR-0050  # encryption-at-rest (shipped 8/8 — telemetry encrypted)
  - ADR-0051  # per-tool subprocess sandbox (shipped)
  - ADR-0062  # supply-chain scanner (shipped)
  - ADR-0064  # telemetry pipeline (queued)
  - ADR-0065  # detection-as-code (queued)
  - ADR-0066  # SOAR playbooks (queued)

depends_on_connectors:
  - forest-files            # for file integrity + log access
  - forest-home-assistant   # for IoT anomaly correlation

handoff_targets:
  - d8_compliance       # SOC events → compliance evidence
  - d4_code_review      # detection rules contributed back as code
  - d2_daily_life_os    # behavior-change anomalies flag through here

notes: |
  This is the domain Forest is MOST architecturally suited for —
  audit chain + signatures + encryption + sandbox + IoC catalog
  + Reality Anchor are ALL load-bearing for production SOC work.
  Three-ADR arc 0064/0065/0066 ships across ~23 bursts to take
  this from partial → live.
