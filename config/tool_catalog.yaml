# Forest Soul Forge — tool catalog (ADR-0018).
#
# Canonical source of MCP-style tool descriptors. Each tool is keyed by
# {name}.{version}. Versions are pinned in soul.md frontmatter at birth
# time so old agents stay reasonable-about even after newer versions of
# a tool land in this file.
#
# When you add a new version of an existing tool:
#   - DO add a new entry (e.g. packet_query.v2) alongside the old one.
#   - DO update the relevant archetype's standard_tools list to point at
#     the new version IF you want fresh births to pick it up by default.
#   - DO NOT edit an existing v1 entry's schema. v1 is frozen — any
#     committed agent that references it relies on its bytes being
#     stable. The catalog-integrity check at daemon startup catches
#     this and refuses to boot.
#
# When you add a new tool:
#   - Pick a clear, verb-or-noun-phrase name (snake_case).
#   - Always start at version "1".
#   - Tag with archetype_tags so the resolver knows which archetype
#     bundles can take it as a default.
#   - side_effects must be one of: read_only, network, filesystem,
#     external. The constitution constraint policy keys off this — a
#     non-read_only tool gets requires_human_approval bumped per
#     trait policy.

version: "0.1"

tools:
  # ----- network_watcher kit ----------------------------------------------
  # NOTE: packet_query.v1 and flow_summary.v1 were specced in ADR-0018
  # but never implemented at v0.1 (catalog vs impl drift caught in the
  # 2026-04-30 audit, Finding C-1).
  #   - packet_query.v1    DEFERRED — supersedeed by Phase G's planned
  #                         tshark_pcap_query.v1 (libpcap-free wrapper
  #                         around Wireshark's tshark CLI). Removed
  #                         from catalog + kits.
  #   - flow_summary.v1    SUBSTITUTED with traffic_flow_local.v1
  #                         (already implemented). Same conceptual
  #                         surface — flow records, 5-tuple aggregation.
  #                         Removed from catalog + kits.
  # See docs/audits/2026-04-30-c1-zombie-tool-dissection.md for the
  # per-tool §0 verdict, and ADR-0018 for the tool-catalog contract.
  dns_lookup.v1:
    name: dns_lookup
    version: "1"
    description: |
      Forward or reverse DNS lookup via the OS resolver (stdlib socket).
      Single A or PTR record only — multi-record-type support
      (MX, TXT, AAAA, NS, CNAME) deferred to dns_lookup.v2 once we
      decide whether to take a dnspython dep.

      Implemented 2026-04-30 under C-1 zombie-tool dissection.
      See docs/audits/2026-04-30-c1-zombie-tool-dissection.md.
    input_schema:
      type: object
      properties:
        hostname:
          type: string
          description: "Hostname to resolve forward (A record). Mutex with ip."
        ip:
          type: string
          description: "IP to resolve reverse (PTR record). Mutex with hostname."
        timeout:
          type: integer
          minimum: 1
          maximum: 30
          default: 5
      oneOf:
        - {required: [hostname]}
        - {required: [ip]}
    side_effects: network
    archetype_tags: [network_watcher]

  # ----- log_analyst kit --------------------------------------------------
  # NOTE: log_grep.v1 was specced in ADR-0018 but never implemented at
  # v0.1. C-1 dissection (2026-04-30) verdict: SUBSTITUTED with
  # log_scan.v1 (already implemented at src/.../tools/builtin/log_scan.py,
  # tested in test_b1_tools.py, ships in security_low log_lurker kit).
  # Functionally equivalent — regex/pattern scan over file or directory.
  # Removed from catalog + archetype kits.
  log_aggregate.v1:
    name: log_aggregate
    version: "1"
    description: |
      Aggregate log events by a field over a time window. Returns a
      bucketed count distribution. Useful for spotting spikes, finding
      top sources, or detecting absence-of-signal. Read-only.
    input_schema:
      type: object
      required: [group_by, start_ts, end_ts]
      properties:
        group_by:
          type: string
          description: "Field name to group by (e.g. 'source_ip', 'level')."
        start_ts: { type: string, format: date-time }
        end_ts: { type: string, format: date-time }
        bucket_seconds:
          type: integer
          minimum: 1
          maximum: 86400
          default: 60
        filter:
          type: string
          description: "Optional regex to pre-filter events before grouping."
        top_n:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    side_effects: read_only
    archetype_tags: [log_analyst, anomaly_investigator]

  timestamp_window.v1:
    name: timestamp_window
    version: "1"
    description: |
      Convert a relative time expression to absolute ISO-8601 UTC
      timestamps. Examples: 'last 15 minutes' → (start, end), 'past 24h'
      → (start, end). Pure helper, no I/O.
    input_schema:
      type: object
      required: [expression]
      properties:
        expression:
          type: string
          description: "Natural-language relative window (e.g. 'last 15 minutes')."
        anchor:
          type: string
          format: date-time
          description: "Reference point. Defaults to current UTC if omitted."
    side_effects: read_only
    archetype_tags: [log_analyst, network_watcher, anomaly_investigator]

  # ----- anomaly_investigator kit -----------------------------------------
  # NOTE: baseline_compare.v1 and correlation_window.v1 were specced
  # in ADR-0018 but never implemented at v0.1. C-1 dissection
  # (2026-04-30) verdicts:
  #   - baseline_compare.v1   SUBSTITUTED with the pair behavioral_baseline.v1
  #                            + anomaly_score.v1 (already implemented).
  #                            Together they cover the same surface
  #                            (summary stats over event stream + z-score
  #                            deviation) with cleaner separation of
  #                            concerns. Removed from catalog + kits.
  #   - correlation_window.v1 SUBSTITUTED with log_correlate.v1 (already
  #                            implemented in security_mid swarm kits,
  #                            tested in test_b2_tools.py). Identical
  #                            conceptual surface — temporal cross-source
  #                            joins. Removed from catalog + kits.
  # See docs/audits/2026-04-30-c1-zombie-tool-dissection.md.

  # ----- memory subsystem (ADR-0022 v0.1+v0.2) ----------------------------
  memory_recall.v1:
    name: memory_recall
    version: "1"
    description: |
      Read memory the calling agent can see, scoped by `mode`.
      ADR-0022 v0.1+v0.2 + ADR-0027 §1 + ADR-0033.

      mode='private' (default) — owner-only, scope='private'.
      mode='lineage'           — own private+lineage rows + lineage
                                  chain peers' lineage rows. The
                                  chain is auto-computed from
                                  agent_ancestry (ancestors+descendants);
                                  caller can override via lineage_chain.
      mode='consented'         — lineage's set + scope='consented' rows
                                  the reader has an active grant for.
      mode='realm'             — refused; reserved for H3 federation.

      Cross-agent reads (modes other than 'private') count as
      information-flow boundary crossings; the runtime emits
      memory_read on the audit chain when the result includes rows
      owned by an instance other than the caller.
    input_schema:
      type: object
      properties:
        query: {type: string}
        layer:
          type: string
          enum: [episodic, semantic, procedural]
        limit:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
        mode:
          type: string
          enum: [private, lineage, consented]
          default: private
        lineage_chain:
          type: array
          items: {type: string}
          description: |
            Optional override. When omitted in lineage/consented mode,
            the tool walks agent_ancestry to compute the chain.
    side_effects: read_only
    archetype_tags: [companion, researcher, investigator, communicator, security_low, security_mid, security_high]

  memory_write.v1:
    name: memory_write
    version: "1"
    description: |
      Append an entry to the calling agent's own memory store.
      Same-agent self-writes only — cross-agent disclosure is a
      separate tool (memory_disclose.v1). The genre's privacy
      ceiling caps the scope: a Companion-genre agent cannot
      write past `private`. side_effects=read_only because the
      write is local-only (registry SQLite) — no network, no host
      filesystem outside the registry, no external service.
    input_schema:
      type: object
      required: [content, layer]
      properties:
        content: {type: string}
        layer:
          type: string
          enum: [episodic, semantic, procedural]
        scope:
          type: string
          enum: [private, lineage, realm, consented]
          default: private
        tags:
          type: array
          items: {type: string}
    side_effects: read_only
    archetype_tags: [companion, researcher, investigator, communicator]

  memory_disclose.v1:
    name: memory_disclose
    version: "1"
    description: |
      Disclose one of the calling agent's `scope='consented'` memory
      entries to another agent's store. ADR-0022 v0.2 + ADR-0027 §4
      data-minimization rule: the recipient gets a summary string
      and a back-reference to the source entry — NOT the original
      content. Refuses if the source is not owned by the caller, is
      deleted, is at a non-consented scope, or if no active consent
      grant exists for the (source, recipient) pair. Used by the
      Security Swarm (ADR-0033) to escalate findings across tier
      boundaries. side_effects=read_only because the disclosed copy
      lands in the local registry; no network or external system.
    input_schema:
      type: object
      required: [source_entry_id, recipient_instance, summary]
      properties:
        source_entry_id:    {type: string}
        recipient_instance: {type: string}
        summary:            {type: string}
    side_effects: read_only
    archetype_tags: [investigator, communicator, security_low, security_mid, security_high]

  delegate.v1:
    name: delegate
    version: "1"
    description: |
      Invoke another agent's skill. ADR-0033 A3 — the swarm
      escalation primitive. Routes the request through the
      pre-bound ctx.delegate callable which loads the target's
      skill manifest, runs it under the target's identity, and
      returns the outcome. Refuses if the target is missing, equals
      the caller, or is not in the caller's lineage chain (unless
      allow_out_of_lineage=true is set, which records the override
      in the audit chain). Each successful delegation appends one
      agent_delegated audit event BEFORE the target's skill runs,
      so a crash mid-skill still leaves the delegation visible.
      side_effects=read_only for the dispatch itself; the target's
      skill may include privileged steps that go through the
      approval queue under the target's own constraints.
    input_schema:
      type: object
      required: [target_instance_id, skill_name, skill_version, reason]
      properties:
        target_instance_id:   {type: string}
        skill_name:           {type: string}
        skill_version:        {type: string}
        inputs:               {type: object}
        reason:               {type: string}
        session_id:           {type: string}
        allow_out_of_lineage: {type: boolean, default: false}
    side_effects: read_only
    archetype_tags: [investigator, communicator, security_low, security_mid, security_high]

  # ----- security_low tier (ADR-0033 Phase B1) ----------------------------
  audit_chain_verify.v1:
    name: audit_chain_verify
    version: "1"
    description: |
      Walk the daemon's audit chain JSONL and verify hash links
      end-to-end. Returns ok/broken-at + reason; surfaces unknown
      event types as a forward-compat warning (not a failure).
      Wraps AuditChain.verify; LogLurker's reason to exist.
    input_schema:
      type: object
      properties:
        max_unknown_to_report:
          type: integer
          minimum: 1
          maximum: 1000
          default: 20
    side_effects: read_only
    archetype_tags: [security_low, guardian, observer]

  file_integrity.v1:
    name: file_integrity
    version: "1"
    description: |
      sha256 a list of operator-named paths (files or directories);
      optionally diff against a baseline {path: digest} dict.
      Symlinks are NOT followed — they're recorded as
      'symlink:<target>' so the algorithm doesn't get tricked by
      planted symlinks. Capped at 5000 files / 256 MiB per file
      per call. Used by PatchPatrol + LogLurker for daily sweeps.
    input_schema:
      type: object
      required: [paths]
      properties:
        paths:
          type: array
          items: {type: string}
          minItems: 1
          maxItems: 200
        mode:
          type: string
          enum: [snapshot, diff]
          default: snapshot
        baseline:
          type: object
          description: "Required when mode='diff'; ignored otherwise."
    side_effects: read_only
    archetype_tags: [security_low, security_high, guardian]

  log_scan.v1:
    name: log_scan
    version: "1"
    description: |
      Regex/pattern scan over a list of files or directories. Walks
      directories recursively; never follows symlinks. Refuses
      catastrophic-backtracking patterns at validation time.
      Returns matches with optional surrounding context lines, capped
      at max_matches (default 500). LogLurker's primary surface.
    input_schema:
      type: object
      required: [paths, pattern]
      properties:
        paths:
          type: array
          items: {type: string}
          minItems: 1
          maxItems: 200
        pattern:
          type: string
          maxLength: 256
        flags:
          type: array
          items:
            type: string
            enum: [IGNORECASE, DOTALL, MULTILINE, VERBOSE]
        context_lines:
          type: integer
          minimum: 0
          maximum: 5
          default: 0
        max_matches:
          type: integer
          minimum: 1
          maximum: 5000
          default: 500
    side_effects: read_only
    archetype_tags: [security_low, observer, investigator]

  log_aggregate.v1:
    name: log_aggregate
    version: "1"
    description: |
      Combine multiple log files into one timestamp-sorted view,
      normalizing common timestamp formats (ISO 8601, syslog,
      apache-common, unix epoch) to ISO 8601 UTC. Untimestamped
      lines float to the head of the output rather than being
      silently dropped. Caps: 50 files, 64 MiB per file, 10000
      lines out (operator-tunable up to 50000). Feeds AnomalyAce.
    input_schema:
      type: object
      required: [paths]
      properties:
        paths:
          type: array
          items: {type: string}
          minItems: 1
          maxItems: 50
        max_lines_out:
          type: integer
          minimum: 1
          maximum: 50000
          default: 10000
    side_effects: read_only
    archetype_tags: [security_low, observer, investigator]

  # ----- security_low OS-shellout tools (ADR-0033 Phase B1) ---------------
  patch_check.v1:
    name: patch_check
    version: "1"
    description: |
      Probe installed package managers (brew, softwareupdate, apt,
      dnf) for pending updates. Each backend runs only if its
      binary exists on PATH; missing ones surface in
      backends_skipped. Per-backend timeout 30s; query-only
      subcommands. PatchPatrol's daily sweep.
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [brew, softwareupdate, apt, dnf]
    side_effects: read_only
    archetype_tags: [security_low, guardian]

  software_inventory.v1:
    name: software_inventory
    version: "1"
    description: |
      Inventory installed apps + packages via macos_apps (walk
      /Applications), brew (formulae+casks), dpkg (Debian), rpm
      (RPM). Each backend conditional on binary availability.
      Cap: 5000 entries. PatchPatrol baselines with this so
      file_integrity has a known surface to diff.
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [macos_apps, brew, dpkg, rpm]
    side_effects: read_only
    archetype_tags: [security_low, guardian]

  port_policy_audit.v1:
    name: port_policy_audit
    version: "1"
    description: |
      Read-only enumeration of listening TCP+UDP ports via lsof
      (macOS/BSD), ss (Linux preferred), or netstat (Linux fallback).
      Tries backends in order; first one whose binary exists wins.
      Cap: 1000 listeners. Gatekeeper's primary surface for
      "what's accepting inbound on this machine?"
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [lsof, ss, netstat]
    side_effects: read_only
    archetype_tags: [security_low, observer]

  usb_device_audit.v1:
    name: usb_device_audit
    version: "1"
    description: |
      Snapshot the USB device tree via system_profiler (macOS
      JSON tree) or lsusb (Linux text). Vendor/product IDs
      normalized to 0xXXXX so baseline diffs don't trigger on
      format drift. Cap: 500 devices. Gatekeeper diffs against
      a known-good baseline to catch unauthorized inserts.
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [system_profiler, lsusb]
    side_effects: read_only
    archetype_tags: [security_low, observer]

  # ----- security_mid analytics (ADR-0033 Phase B2) -----------------------
  behavioral_baseline.v1:
    name: behavioral_baseline
    version: "1"
    description: |
      Compute summary stats (categorical frequency tables, numeric
      mean/stddev/min/max, timestamp bucket distributions) over a
      list of events. Output shape is consumed directly by
      anomaly_score.v1 — they're a designed pair. AnomalyAce calls
      this on a healthy window and persists the result via
      memory_write at scope='lineage' so the next sweep can score
      against it.
    input_schema:
      type: object
      required: [events, fields]
      properties:
        events:
          type: array
          items: {type: object}
          maxItems: 100000
        fields:
          type: object
          description: |
            map of {field_name: {type: categorical|numeric|timestamp,
            top_n?, buckets?}}
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  anomaly_score.v1:
    name: anomaly_score
    version: "1"
    description: |
      Score a window of events against a baseline emitted by
      behavioral_baseline.v1. Per-field: categorical → novelty
      score (1.0 if value never seen, else 1/(1+log10(1+count))) +
      max-per-row aggregate; numeric → max |z-score| against
      baseline mean+stddev (cap at 100 when stddev=0); timestamp →
      chi-square-ish divergence between bucket distributions.
      Returns a single overall score (max of per-field) for skills
      that need one number to threshold against.
    input_schema:
      type: object
      required: [events, baseline]
      properties:
        events:
          type: array
          items: {type: object}
          maxItems: 100000
        baseline: {type: object}
        fields:
          type: array
          items: {type: string}
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  log_correlate.v1:
    name: log_correlate
    version: "1"
    description: |
      Cross-source join over normalized log streams. Group events
      by an extracted key — either a dict field (key.field) or the
      first capturing group of a regex against a text field
      (key.regex + key.field). Returns groups sorted by event
      count, each with earliest/latest timestamps, distinct sources,
      and a capped sample of the matched events. Caps: 500 groups,
      50 events per group (operator-tunable up to 10000 each).
    input_schema:
      type: object
      required: [events, key]
      properties:
        events:
          type: array
          items: {type: object}
          maxItems: 100000
        key:
          type: object
          description: |
            {field: <name>} OR {regex: <pat>, field: <text-field>}
        max_groups:
          type: integer
          minimum: 1
          maximum: 10000
          default: 500
        max_per_group:
          type: integer
          minimum: 1
          maximum: 10000
          default: 50
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  lateral_movement_detect.v1:
    name: lateral_movement_detect
    version: "1"
    description: |
      Graph analysis over connection tuples. Given a list of
      (src, dst[, port]) records, surface lateral-movement-shaped
      patterns: fan_out (sources reaching many dsts), fan_in
      (dsts receiving from many srcs), new_edges (against an
      optional baseline_edges list), distinct_ports (a single
      src→dst pair touching many ports = port scan signature).
      Each pattern reports triggering nodes/edges with capped
      examples. Used by NetNinja over flow records.
    input_schema:
      type: object
      required: [edges]
      properties:
        edges:
          type: array
          items: {type: object}
          maxItems: 100000
        baseline_edges:
          type: array
          items: {type: object}
          maxItems: 100000
        thresholds:
          type: object
          properties:
            fan_out_min:        {type: integer, minimum: 1, default: 10}
            fan_in_min:         {type: integer, minimum: 1, default: 10}
            distinct_ports_min: {type: integer, minimum: 1, default: 20}
        max_examples:
          type: integer
          minimum: 1
          maximum: 1000
          default: 25
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  ueba_track.v1:
    name: ueba_track
    version: "1"
    description: |
      Per-user behavioral fingerprint over time. Partition events
      by (user, sliding-window) and emit per-user stats: event
      count, top values per feature, distinct-value counts. Window
      sizes: hour | day | week. Pairs with anomaly_score for
      "compare last hour to rolling N-hours baseline" detection.
      Used by AnomalyAce + Investigator.
    input_schema:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items: {type: object}
          maxItems: 100000
        features:
          type: array
          items: {type: string}
        window:
          type: string
          enum: [hour, day, week]
          default: hour
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  port_scan_local.v1:
    name: port_scan_local
    version: "1"
    description: |
      Active TCP/UDP probe against the loopback interface ONLY
      (127.0.0.1, ::1, localhost). Non-loopback targets refused at
      validation time. Caps: 1024 ports per call, 0.5s per-port
      timeout, 100 ports/sec sweep rate. Useful for finding
      services that listen but weren't surfaced by read-only
      port_policy_audit (different namespace, restricted /proc
      visibility). UDP results are inherently ambiguous —
      "filtered_or_open" is the standard UDP-scan caveat.
    input_schema:
      type: object
      properties:
        target:
          type: string
          enum: ["127.0.0.1", "::1", "localhost"]
          default: "127.0.0.1"
        ports:
          type: array
          items: {type: integer, minimum: 1, maximum: 65535}
          maxItems: 1024
        port_range:
          type: object
          properties:
            start: {type: integer, minimum: 1, maximum: 65535}
            end:   {type: integer, minimum: 1, maximum: 65535}
        proto:
          type: string
          enum: [tcp, udp]
          default: tcp
    side_effects: network
    archetype_tags: [security_mid, investigator]

  traffic_flow_local.v1:
    name: traffic_flow_local
    version: "1"
    description: |
      Snapshot the OS connection table (all states, not just LISTEN).
      Backends: lsof (macOS/BSD) or ss (Linux); first available wins.
      Output records {src, dst, src_port, dst_port, proto, state, pid,
      command, user} feed lateral_movement_detect directly. TIME_WAIT
      entries dropped by default (operator-tunable via include_timewait).
      Cap: 5000 flows.
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [lsof, ss]
        include_timewait:
          type: boolean
          default: false
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  evidence_collect.v1:
    name: evidence_collect
    version: "1"
    description: |
      Forensic snapshot to a tar.gz archive. Captures: ps output,
      listening ports, current flow table, and per-PID detail
      (cmdline, environ, status, cwd, open FDs on Linux; ps + lsof
      on macOS) for each PID the operator names. Manifest.json
      indexes the archive. Tarball lands in the daemon's
      evidence_dir; output returns path + sha256 + file list.
      ResponseRogue runs this BEFORE isolate_process so the
      process state is captured while still alive.
    input_schema:
      type: object
      properties:
        pids:
          type: array
          items: {type: integer, minimum: 2}
          maxItems: 50
        label:
          type: string
          maxLength: 64
    side_effects: read_only
    archetype_tags: [security_mid, guardian]

  triage.v1:
    name: triage
    version: "1"
    description: |
      LLM-driven structured triage of an alert. Operator supplies
      the alert + a list of {label, prompt} diagnostic questions
      (e.g. "is_lateral", "is_known_actor"); the tool calls the
      bound provider once per question, then runs a final
      classification call returning {severity, summary,
      recommended_action} as JSON. Severity scored 0..1
      (low=0.25, medium=0.5, high=0.75, critical=1.0). Falls back
      to medium severity (with a fallback flag) when no provider
      is wired or the model output can't be parsed — caller
      always gets a usable verdict. Caps: 10 questions, 600 chars
      per prompt, 60s total timeout.
    input_schema:
      type: object
      required: [alert, questions]
      properties:
        alert:
          type: string
          maxLength: 4000
        questions:
          type: array
          maxItems: 10
          items:
            type: object
            required: [label, prompt]
            properties:
              label:  {type: string}
              prompt: {type: string, maxLength: 600}
        context:
          type: object
    side_effects: network
    archetype_tags: [security_mid, investigator]

  isolate_process.v1:
    name: isolate_process
    version: "1"
    description: |
      ResponseRogue's containment primitive — kill a PID via the
      privileged sudo helper at /usr/local/sbin/fsf-priv (Phase A6).
      The helper sends SIGTERM, waits 2s, then SIGKILL if the
      process is still alive. Refuses pid ≤ 1 (kernel/init); reason
      is recorded in the audit chain so operators can review why
      the kill was attempted. side_effects=external means
      security_high gates this regardless of tool config; for
      security_mid agents (ResponseRogue's tier) it gates per the
      tool's own requires_human_approval. Refuses cleanly with
      "PrivClient not wired" when the helper isn't installed —
      operator runs docs/runbooks/sudo-helper-install.md to enable.
    input_schema:
      type: object
      required: [pid, reason]
      properties:
        pid:
          type: integer
          minimum: 2
        reason:
          type: string
          maxLength: 256
    side_effects: external
    # Note: side_effects=external automatically gates requires_human_approval
    # via tool_policy.py's external_always_human_approval rule — no extra
    # constraint needed in YAML. The constitution build process picks it up.
    archetype_tags: [security_mid, guardian]

  # ----- security_high posture + verification (ADR-0033 Phase B3) ---------
  posture_check.v1:
    name: posture_check
    version: "1"
    description: |
      Read-only host security posture probe. Runs a list of OS-
      specific queries (macOS: csrutil, fdesetup, spctl, pfctl,
      defaults read alf; Linux: getenforce, aa-status, ufw,
      cryptsetup) and aggregates per-check {state, severity}
      records into one overall_severity. Probes that hit a
      missing binary land in checks_skipped — operators can
      tell "no info" from "bad info." Per-check warn-state
      severities are operator-tunable via severity_overrides.
      Used by SecOpsSentinel as the ground-truth probe before
      JIT access grants and by ContinuousVerify as the input
      snapshot for drift detection. Timeout: 10s per probe.
    input_schema:
      type: object
      properties:
        checks:
          type: array
          items: {type: string}
          maxItems: 20
        severity_overrides:
          type: object
          description: |
            map of {check_name: severity}; severity is one of
            low/medium/high/critical
    side_effects: read_only
    archetype_tags: [security_high, guardian]

  continuous_verify.v1:
    name: continuous_verify
    version: "1"
    description: |
      Pure-Python composer: diffs a current posture snapshot
      against a baseline (typically the prior call written to
      memory at scope='lineage') and emits drift records:
      checks_added (new probes), checks_removed (vanished
      probes), checks_changed (state or severity flip), and
      checks_steady (identical between runs). Verdict is the
      max severity across flagged items — empty diff → low.
      No I/O — caller drives posture_check + memory before
      handing the snapshots in. Used by SecOpsSentinel on a
      cadence to surface posture drift between sweeps.
    input_schema:
      type: object
      required: [current]
      properties:
        current:  {type: object}
        baseline: {type: object}
        escalate_on_missing:
          type: boolean
          default: false
    side_effects: read_only
    archetype_tags: [security_high, investigator]

  jit_access.v1:
    name: jit_access
    version: "1"
    description: |
      Issue a time-bounded access grant — the grant IS the
      audit event. The runtime hashes (principal, scope,
      ttl_seconds, reason, granted_at, expires_at) into the
      tool_invoked chain entry; downstream skills query the
      chain (or memory snapshot) for the latest grant matching
      (principal, scope) and compare expires_at to now.
      side_effects=external auto-triggers human approval per
      tool_policy's external_always_human_approval rule —
      every grant goes through the operator queue. Caps:
      ttl_seconds ≤ 86400 (24h), reason ≤ 256 chars, scope is
      URL-safe-ish. One grant per call (no batch issuance —
      operator approval per grant is the design intent).
    input_schema:
      type: object
      required: [principal, scope, ttl_seconds, reason]
      properties:
        principal:   {type: string, maxLength: 64}
        scope:       {type: string, maxLength: 64}
        ttl_seconds: {type: integer, minimum: 1, maximum: 86400}
        reason:      {type: string, maxLength: 256}
    side_effects: external
    archetype_tags: [security_high, guardian]

  key_inventory.v1:
    name: key_inventory
    version: "1"
    description: |
      Enumerate cryptographic key material on the host —
      paths + sizes + mtimes + counts ONLY, never the bytes.
      Categories: keychain (macOS, file paths via ``security
      list-keychains``; never dump-keychain), ssh (~/.ssh
      private keys with perms-warning, public keys, line
      counts for authorized_keys + known_hosts), signing
      (~/.gnupg file enumeration without invoking gpg).
      Drift between successive runs is the high-value signal
      — KeyKeeper composes this with memory_recall +
      continuous_verify to surface a new private key that
      wasn't there yesterday. Refuses paths outside the
      caller's HOME + standard system keychain locations.
      Timeout: 10s for shellouts.
    input_schema:
      type: object
      properties:
        categories:
          type: array
          items: {type: string, enum: [keychain, ssh, signing]}
          maxItems: 3
        home_dir:
          type: string
    side_effects: read_only
    archetype_tags: [security_high, observer]

  dynamic_policy.v1:
    name: dynamic_policy
    version: "1"
    description: |
      Apply or revoke a transient firewall rule via the
      Phase A6 sudo helper (PrivClient.pf_add / pf_drop).
      Operations: add (anchor + rule body) and drop (anchor
      only). Refuses op=drop with a rule arg to keep the
      audit log unambiguous. Refuses cleanly with "no
      PrivClient wired" when the helper isn't installed or
      FSF_ENABLE_PRIV_CLIENT is false. side_effects=external
      auto-triggers human approval per tool_policy. The TTL
      is operator-promised — the tool does NOT schedule a
      teardown; the playbook is to record the grant in the
      audit chain and call again with op=drop when the timer
      fires, keeping every change as one tool call → one
      audit entry. Used by ResponseRogue + SecOpsSentinel.
    input_schema:
      type: object
      required: [op, anchor, reason]
      properties:
        op:
          type: string
          enum: [add, drop]
        anchor: {type: string, maxLength: 64}
        rule:   {type: string, maxLength: 256}
        reason: {type: string, maxLength: 256}
    side_effects: external
    archetype_tags: [security_high, guardian]

  tamper_detect.v1:
    name: tamper_detect
    version: "1"
    description: |
      Two complementary integrity signals: (1) canary file
      digests vs an operator-supplied baseline, classified
      ok / mismatch / new / vanished / error per file —
      vanished is the highest-severity signal because it
      implies attempted cleanup; (2) optional macOS SIP probe
      via the helper's read-protected op, which answers "can
      the helper still read this SIP-protected file?". The
      canary scan is filesystem (read-only); SIP probe is
      privileged. Both refuse cleanly when their preconditions
      aren't met (SIP on Linux → skipped; SIP without
      PrivClient → skipped). Verdict: vanished or failed SIP
      probe → critical; mismatch → warn; otherwise ok. Output
      composes with continuous_verify so a skill can persist
      the digest map to memory and detect drift across sweeps.
      Cap: 50 canaries per call, 10 MiB per file.
    input_schema:
      type: object
      required: [canaries]
      properties:
        canaries:
          type: array
          items: {type: string}
          maxItems: 50
        baseline_digests: {type: object}
        probe_sip:        {type: boolean, default: false}
        sip_paths:
          type: array
          items: {type: string}
    side_effects: filesystem
    archetype_tags: [security_high, investigator]

  canary_token.v1:
    name: canary_token
    version: "1"
    description: |
      Plant + check honeytokens with dual signals — atime
      drift (read access) AND content-hash (modification).
      Either signal is a finding; together they cover the
      full set of "someone interacted with this token" cases.
      Operations: plant (write decoy files, record baseline
      hash + atime + size) and check (re-stat + re-hash
      against baseline; classify untouched / accessed /
      modified / vanished / error per token). atime tracking
      degraded? per-token atime_capability='unavailable' so
      operator knows the token falls back to hash-only
      detection. Default token body is a recognisable
      FSF-CANARY-DO-NOT-USE banner + random ID so analysts
      seeing it in egress immediately know it's a planted
      decoy. Verdict: vanished or modified → critical;
      accessed → warn. Caps: 50 tokens, 4 KiB content per
      token, 4 MiB re-hash cap.
    input_schema:
      type: object
      required: [op, tokens]
      properties:
        op:
          type: string
          enum: [plant, check]
        tokens:
          type: array
          maxItems: 50
          items:
            type: object
            required: [path]
            properties:
              path:    {type: string}
              content: {type: string}
              label:   {type: string}
        baseline:
          type: object
          description: "required for op=check; map of path → {hash, atime_unix, size}"
        atime_drift_seconds:
          type: integer
          minimum: 0
          default: 0
    side_effects: filesystem
    archetype_tags: [security_high, guardian]

  honeypot_local.v1:
    name: honeypot_local
    version: "1"
    description: |
      Bind a TCP listener on a chosen high port (default
      loopback-only); accept connections for a bounded
      duration; capture {timestamp, src_ip, src_port,
      banner_sent, bytes_received_preview[:128]} per attempt.
      Any connection to a port that should have nothing on it
      is by definition suspicious — this is the active-recon
      signal. side_effects=network because binding holds the
      port for the window AND the optional banner emits bytes
      to whoever connects. Banner is operator-controlled (no
      default — refuses to mislead operators into thinking
      they have a real service running). Caps: port range
      1024..65535, duration 1..300s, max_connections 1..1000,
      banner ≤ 256 bytes, payload preview truncated at 128
      bytes per connection. Bind to non-loopback host flagged
      in 'skipped' as a confirmation hint to operator.
    input_schema:
      type: object
      required: [port, duration_seconds]
      properties:
        port:
          type: integer
          minimum: 1024
          maximum: 65535
        duration_seconds:
          type: integer
          minimum: 1
          maximum: 300
        banner:    {type: string, maxLength: 256}
        bind_host:
          type: string
          default: "127.0.0.1"
        max_connections:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
    side_effects: network
    archetype_tags: [security_high, observer]

  # ----- ADR-003X open-web tool family --------------------------------------
  web_fetch.v1:
    name: web_fetch
    version: "1"
    description: |
      HTTP GET/POST against a per-agent host allowlist. Optional
      auth via the per-agent secrets store (pass auth_secret_name;
      tool reads via ctx.secrets.get and attaches as Authorization:
      Bearer). The agent's constitution must list allowed_hosts;
      hosts NOT on the list are refused before any network activity.
      Each redirect re-checks the allowlist so a 302 to an off-list
      host fails cleanly. Body is truncated to 32 KB; the metadata
      flags whether truncation happened. Audit captures host +
      method + status — never the body (privacy + noise). Future
      web_researcher / web_actuator genres pull this tool by default.
    input_schema:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: "http or https URL. Host must be in allowed_hosts."
        method:
          type: string
          enum: [GET, POST, HEAD]
          default: GET
        body:
          type: string
          description: "Request body for POST. JSON content gets application/json."
        auth_secret_name:
          type: string
          description: "Name in agent's secrets store; sent as Bearer token."
        timeout_s:
          type: number
          minimum: 0.1
          maximum: 60
          default: 15
    side_effects: network
    archetype_tags: [web_observer, web_researcher, web_actuator]

  suggest_agent.v1:
    name: suggest_agent
    version: "1"
    description: |
      Operator-facing agent matcher. Given a natural-language task
      description, returns the top-K agents whose role + name fit best.
      v1 ranks via BM25 over (role, agent_name, genre). Future v2 adds
      skill-history weighting once that telemetry is queryable.
      Critical for catalog scaling once Phase I lands ~30 new role
      types — operators can't keep them all in their head.
      Reads from ctx.agent_registry; refuses cleanly if the dispatcher
      wasn't given a registry handle. Read-only side effects.
    input_schema:
      type: object
      required: [task]
      properties:
        task:
          type: string
          description: "Natural-language task description."
        top_k:
          type: integer
          minimum: 1
          maximum: 50
          default: 5
        filter:
          type: object
          properties:
            genre:
              type: string
              description: "Restrict to agents in this genre (e.g. 'observer')."
            status:
              type: string
              description: "Restrict to agents with this status. Default 'active'."
              default: active
    side_effects: read_only
    archetype_tags: [operator_companion, web_researcher]

  mcp_call.v1:
    name: mcp_call
    version: "1"
    description: |
      Call an operator-registered MCP server via stdio JSON-RPC.
      Server registry lives in config/mcp_servers.yaml — operator
      pre-registers each server with binary path + sha256 + allowed
      tool list + side-effect classification. SHA256 verified before
      each launch (typosquat / supply-chain-swap defense). Per-agent
      constitution lists allowed_mcp_servers; per-server config lists
      allowlisted_tools. Optional auth via the per-agent secrets
      store (auth_secret_name → FSF_MCP_AUTH env var on the server
      subprocess). v1 supports stdio: transport only; ws:// + http://
      are future additions. Auto-discovery is explicitly out of scope
      (operator types the config). Result is passthrough from the MCP
      server; isError indicates JSON-RPC-level error vs success.
    input_schema:
      type: object
      required: [server_name, tool_name]
      properties:
        server_name:
          type: string
          description: "Name from config/mcp_servers.yaml; must be in agent's allowed_mcp_servers."
        tool_name:
          type: string
          description: "Tool to call; must be in server's allowlisted_tools."
        args:
          type: object
          description: "Tool-specific arguments. Empty if omitted."
        auth_secret_name:
          type: string
          description: "Name in agent's secrets store; passed as FSF_MCP_AUTH env var."
        timeout_s:
          type: number
          minimum: 0.1
          maximum: 300
          default: 30
    side_effects: external
    archetype_tags: [web_actuator, web_researcher]

  browser_action.v1:
    name: browser_action
    version: "1"
    description: |
      Drive a chromium browser via Playwright through a sequence of
      UI actions (click, type, wait, press, hover, select_option).
      Per-agent host allowlist enforced before navigation AND
      re-checked on every framenavigated event so a redirect to an
      off-list host fails cleanly. Ephemeral browser context per
      call — cookies, localStorage, cache do NOT bleed across
      calls. Headless by default; FSF_BROWSER_HEADFUL=true makes
      it headful for debugging. Optional screenshot saved to
      data/browser_screenshots/<uuid>.png; the path is returned in
      the output. Console messages from the page are captured and
      surfaced. Heaviest of the open-web primitives — requires
      Playwright + chromium (~150 MB binary). Always gated:
      side_effects=external triggers requires_human_approval per
      the constraint resolver. Per-agent constitution must list
      allowed_hosts.
    input_schema:
      type: object
      required: [url]
      properties:
        url: {type: string, format: uri}
        actions:
          type: array
          items:
            type: object
            required: [type]
            properties:
              type: {enum: [click, type, wait, press, hover, select_option]}
              selector: {type: string}
              text: {type: string}
              key: {type: string}
              ms: {type: integer, minimum: 0}
              value: {type: string}
        screenshot: {type: boolean, default: true}
        timeout_ms: {type: integer, minimum: 100, maximum: 60000, default: 5000}
        headful: {type: boolean, default: false}
    side_effects: external
    archetype_tags: [web_actuator]

  memory_verify.v1:
    name: memory_verify
    version: "1"
    description: |
      Promote a memory entry to verified status via an external
      human verifier (Iron Gate equivalent — ADR-003X K1). Layered
      on the existing consent-grant table via the
      'operator:verified' sentinel recipient — no schema bump.
      Verifier_id is the human's identifier (operator handle, public
      key, signing key); recorded in granted_by on the consent row
      and in the memory_verified audit event. Re-verification
      updates the timestamp and clears any prior revocation.
      Verification can be queried via Memory.is_verified(entry_id)
      and revoked via Memory.unmark_verified(entry_id).
      Refuses to verify entries the calling agent can't see (private
      to a different agent).
    input_schema:
      type: object
      required: [entry_id, verifier_id]
      properties:
        entry_id:
          type: string
          description: "ID of the memory entry to verify."
        verifier_id:
          type: string
          description: "Identifier of the human verifier (operator handle, key fingerprint)."
        seal_note:
          type: string
          maxLength: 500
          description: "Optional free-text reason for verification."
    side_effects: filesystem
    archetype_tags: [observer, guardian, security_high]

  pytest_run.v1:
    name: pytest_run
    version: "1"
    description: |
      Run pytest against the agent's allowed_paths. Filesystem-tier
      side_effects (pytest writes .pytest_cache + test fixtures may
      mutate). required_initiative_level L4 — reversible-with-policy
      class per ADR-0021-am §5; SW-track Engineer (Actuator default
      L5) reaches; Reviewer at default L3 must be birthed at ceiling
      L4 to use this tool. Subprocess invocation of `python3 -m
      pytest` (or `pytest` PATH fallback). Default 5-minute timeout
      (test suites take time); max 30 minutes. Output: structured
      pass/fail/skip/error counts + per-failure traceback (capped at
      max_failures_reported with max_failure_lines per failure).
      Selectors arg accepts pytest's full selector syntax.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path to test (file or dir)."
        selectors:
          type: array
          items: {type: string}
          description: "Optional pytest selectors (e.g., '-k expr', '-m mark', test_id)."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 1800
          description: "Subprocess timeout. Default 300 (5 min)."
        max_failures_reported:
          type: integer
          minimum: 0
          maximum: 1000
          description: "Cap on failures with traceback details. Default 50."
        max_failure_lines:
          type: integer
          minimum: 1
          maximum: 500
          description: "Cap on lines per failure traceback. Default 50."
    side_effects: filesystem
    archetype_tags: [actuator, software_engineer]

  ruff_lint.v1:
    name: ruff_lint
    version: "1"
    description: |
      Run the `ruff` linter against the agent's allowed_paths.
      Read-only: lint reports findings; never modifies files. Subprocess
      invocation of `ruff check --output-format json --no-cache`. Pure
      Phase G.1.A programming primitive — gives SW-track agents
      (Architect, Engineer, Reviewer) a stable lint surface for their
      work. Agent-claimed tags include the SW-track triune; other
      genres can include via tools_add. Cap on findings (max_findings,
      default 500) prevents pathological output. 30-second default
      timeout (configurable up to 120s for large monorepos).
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path to lint (file or dir)."
        max_findings:
          type: integer
          minimum: 1
          maximum: 100000
          description: "Cap on findings returned. Default 500."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
          description: "Subprocess timeout. Default 30."
    side_effects: read_only
    archetype_tags: [observer, guardian, researcher, security_low]

  git_log_read.v1:
    name: git_log_read
    version: "1"
    description: |
      Read commit history via `git log`. Read-only: inspects refs and
      commit objects; nothing in the repo is mutated. Subprocess
      invocation of `git -C <path> log --pretty=format:<delim>` with
      ASCII US/RS field+record separators (robust against any
      commit-message content). Per-agent allowed_paths constraint
      gates both the repo path and any paths_filter entries. Output
      includes sha/author/dates/parents/subject/body for each commit;
      capped at max_count (default 50, hard ceiling 500). Phase G.1.A
      programming primitive — gives SW-track Architect / Engineer /
      Reviewer a structured read of repo history before suggesting
      edits.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Path inside a git repo (root or subdir); invoked via `git -C`."
        max_count:
          type: integer
          minimum: 1
          maximum: 500
          description: "Cap on commits returned. Default 50."
        ref:
          type: string
          description: "Ref to start the log from (default HEAD). Must not start with '-'."
        since:
          type: string
          description: "Forwarded as --since=<value> (approxidate accepted)."
        until:
          type: string
          description: "Forwarded as --until=<value> (approxidate accepted)."
        author:
          type: string
          description: "Forwarded as --author=<value> (regex; substring match works)."
        paths_filter:
          type: array
          items: {type: string}
          description: "Path filters (after `--`); each must resolve within allowed_paths."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
          description: "Subprocess timeout. Default 30."
    side_effects: read_only
    archetype_tags: [observer, guardian, researcher, software_engineer]

  git_diff_read.v1:
    name: git_diff_read
    version: "1"
    description: |
      Read structured diffs via `git diff`. Read-only: inspects
      tree/index/working-copy state; never mutates the repo. Three
      modes: `refs` (between two refs), `staged` (--cached), and
      `working` (default; unstaged changes). Subprocess invocation
      of `git -C <path> diff --no-color -M -p [--cached] [refs] [-- paths]`,
      parsed into per-file structures with hunk metadata
      (old_start/new_start/old_count/new_count + body). A second
      invocation with `--numstat` overlays accurate additions/
      deletions and detects binary files. Per-agent allowed_paths
      gates the repo path AND each paths_filter entry. Phase G.1.A
      programming primitive — SW-track Reviewer is the primary
      consumer (diffing a feature branch against main is the
      canonical code-review entry point). Truncation: max_files
      (default 100, ceiling 1000) and max_lines_per_file
      (default 500, ceiling 5000).
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Path inside a git repo (root or subdir); invoked via `git -C`."
        mode:
          type: string
          enum: [refs, staged, working]
          description: "Diff mode. Default 'working'."
        ref_a:
          type: string
          description: "Required when mode='refs'. The 'from' ref. Must not start with '-'."
        ref_b:
          type: string
          description: "Required when mode='refs'. The 'to' ref. Must not start with '-'."
        paths_filter:
          type: array
          items: {type: string}
          description: "Path filters (after `--`); each must resolve within allowed_paths."
        max_files:
          type: integer
          minimum: 1
          maximum: 1000
          description: "Cap on files in output. Default 100."
        max_lines_per_file:
          type: integer
          minimum: 1
          maximum: 5000
          description: "Cap on hunk-body lines per file. Default 500."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
          description: "Subprocess timeout. Default 30."
    side_effects: read_only
    archetype_tags: [observer, guardian, researcher, software_engineer]

  git_blame_read.v1:
    name: git_blame_read
    version: "1"
    description: |
      Per-line blame via `git blame --porcelain`. Read-only: inspects
      commit objects + the file at the requested ref; nothing is
      mutated. Subprocess invocation of `git -C <parent> blame
      --porcelain [-L start,end] <ref> -- <basename>`. The porcelain
      stream is parsed into a flat per-line list (line_no /
      original_line_no / sha / author_name / author_email /
      author_date / summary / content). Per-agent allowed_paths
      gates the file path. Optional line_range narrows the scan
      upstream of max_lines for a precise read of a hot section.
      Phase G.1.A programming primitive — answers 'who last touched
      this specific line, when, in what commit?' for SW-track
      Reviewer + Architect.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path to a file inside a git repo."
        ref:
          type: string
          description: "Commit/branch/tag to blame at. Default HEAD. Must not start with '-'."
        line_range:
          type: array
          items: {type: integer, minimum: 1}
          minItems: 2
          maxItems: 2
          description: "[start, end] (inclusive, 1-indexed). Forwarded as -L start,end."
        max_lines:
          type: integer
          minimum: 1
          maximum: 5000
          description: "Cap on entries returned. Default 500."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
          description: "Subprocess timeout. Default 30."
    side_effects: read_only
    archetype_tags: [observer, guardian, researcher, software_engineer]

  mypy_typecheck.v1:
    name: mypy_typecheck
    version: "1"
    description: |
      Run mypy against the agent's allowed_paths. Read-only: type
      errors are reported; nothing is mutated. Subprocess invocation
      of `python3 -m mypy --no-incremental --show-column-numbers
      --show-error-codes --no-error-summary --no-color-output` so
      no `.mypy_cache` is written (honors the read_only contract).
      Output parsed from mypy's stable text format into structured
      findings (filename / line / column / severity / code /
      message). Optional config_file path (must be within
      allowed_paths). Optional `strict` flag toggles `--strict`.
      60-second default timeout (mypy is slower than ruff because
      whole-program inference). Phase G.1.A primitive — where ruff
      catches style + simple logic, mypy catches the class of bugs
      that come from 'I thought this was a string'. SW-track
      Engineer + Reviewer.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path to typecheck (file or dir)."
        config_file:
          type: string
          description: "Optional mypy config file path; must resolve within allowed_paths."
        strict:
          type: boolean
          description: "Forward --strict. Default false."
        max_findings:
          type: integer
          minimum: 1
          maximum: 10000
          description: "Cap on findings returned. Default 500."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 300
          description: "Subprocess timeout. Default 60."
    side_effects: read_only
    archetype_tags: [actuator, guardian, software_engineer]

  semgrep_scan.v1:
    name: semgrep_scan
    version: "1"
    description: |
      Run semgrep against the agent's allowed_paths. Read-only:
      semgrep reports findings; nothing is mutated. Subprocess
      invocation of semgrep with --json --quiet --no-rewrite-rule-ids
      --disable-version-check --metrics=off. Output parsed from
      semgrep's JSON shape into structured findings (rule_id /
      severity / message / filename / start_line / end_line /
      start_column / end_column / code_snippet). Config can be a
      registry ref ("auto", "p/python", "p/security-audit") or a
      local yaml ruleset path (must resolve within allowed_paths).
      Optional severity_filter narrows to subset of
      {ERROR, WARNING, INFO}. Phase G.1.A primitive — catches the
      class of bugs that come from 'this looks like it could be
      exploited'. SW-track Reviewer (Guardian L3) primary consumer.
    input_schema:
      type: object
      required: [path, config]
      properties:
        path:
          type: string
          description: "File or directory to scan."
        config:
          type: string
          description: "Registry ref ('auto', 'p/python') or yaml path. Must not start with '-'."
        max_findings:
          type: integer
          minimum: 1
          maximum: 10000
          description: "Cap on findings returned. Default 500."
        severity_filter:
          type: array
          items:
            type: string
            enum: [ERROR, WARNING, INFO]
          description: "Subset of severities to keep. Default: all."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 600
          description: "Subprocess timeout. Default 60."
    side_effects: read_only
    archetype_tags: [guardian, security_low, software_engineer]

  tree_sitter_query.v1:
    name: tree_sitter_query
    version: "1"
    description: |
      AST-level structural queries via tree-sitter S-expressions.
      Read-only: parses source files into syntax trees and runs
      queries; nothing is mutated. Where the previous primitives
      operate at line-and-token level, tree_sitter operates at the
      syntax-tree level — answering questions like 'find every
      function definition that calls deprecated_func' or 'find all
      class methods missing docstrings' that are awkward in regex.
      Lazy-imports tree_sitter + tree_sitter_languages so daemon
      boots without the optional dep. Per-agent allowed_paths gates
      both the target path and the file walk in directory mode.
      Languages supported (v1):
      python/javascript/typescript/rust/go/java/c/cpp/ruby/yaml/
      json/bash. SW-track Architect's primary structural-search tool.
    input_schema:
      type: object
      required: [path, query, language]
      properties:
        path:
          type: string
          description: "File or directory to query."
        query:
          type: string
          description: "Tree-sitter S-expression query string."
        language:
          type: string
          enum: [python, javascript, typescript, rust, go, java, c, cpp, ruby, yaml, json, bash]
          description: "Source language."
        max_matches:
          type: integer
          minimum: 1
          maximum: 1000
          description: "Cap on matches returned. Default 100."
        max_files:
          type: integer
          minimum: 1
          maximum: 2000
          description: "Cap on files scanned in directory mode. Default 200."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 300
          description: "Wall-clock budget. Default 30."
    side_effects: read_only
    archetype_tags: [observer, researcher, software_engineer]

  memory_challenge.v1:
    name: memory_challenge
    version: "1"
    description: |
      Stamp a memory entry as challenged (ADR-0027-amendment §7.4).
      Distinct from a contradiction: a challenge is operator scrutiny
      WITHOUT a competing later entry. Updates last_challenged_at to
      NOW; surfaces through memory_recall.v1's staleness threshold
      check. Operator-driven by convention — gated via constitutional
      kit (operator deliberately includes this tool only on agents
      that should surface the signal on their behalf). Mirrors
      memory_verify.v1's challenger_id pattern: the human's
      identifier lands in the audit-event payload. Refuses to
      challenge entries the calling agent can't see (private to a
      different agent). The note (if any) lands in audit only — the
      entry's content + claim_type stay unchanged.
    input_schema:
      type: object
      required: [entry_id, challenger_id]
      properties:
        entry_id:
          type: string
          description: "ID of the memory entry to challenge."
        challenger_id:
          type: string
          description: "Identifier of the human challenger (operator handle, key fingerprint)."
        note:
          type: string
          maxLength: 500
          description: "Optional free-text reason for the challenge."
    side_effects: filesystem
    archetype_tags: [observer, guardian]

  llm_think.v1:
    name: llm_think
    version: "1"
    description: |
      Audited LLM completion as a dispatchable tool. The bridge tool
      that lets Forest agents actually use the active LLM provider —
      every call goes through the governance pipeline (constitution
      constraints, genre kit-tier ceiling, per-task task_caps,
      hardware quarantine) and lands in the audit chain as
      tool_call_dispatched → tool_call_succeeded/failed with token
      counts reported. Side_effects=read_only because the LLM call
      itself produces no external mutation; this lets Guardian-genre
      agents (e.g. code_reviewer in a coding triune) think out loud
      without per-call human approval. Honors T2.2b usage_cap_tokens
      task_cap. Default system prompt derives agent identity from
      role + genre; operators can override with `system`. Default
      task_kind="conversation"; pass "generate" for heavier reasoning
      to route to the FSF_LOCAL_MODEL_GENERATE override.
    input_schema:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 32000
          description: "The user/operator question or instruction."
        system:
          type: string
          description: "System prompt override. Defaults to a minimal one derived from agent role + genre."
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          default: 800
        task_kind:
          type: string
          enum: [classify, generate, safety_check, conversation, tool_use]
          default: conversation
          description: "Routes to the model the operator picked for this task_kind via FSF_LOCAL_MODEL_<KIND>."
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: "Provider passthrough; default left to provider."
    side_effects: read_only
    archetype_tags: [system_architect, software_engineer, code_reviewer, companion, researcher, investigator, guardian]

  code_read.v1:
    name: code_read
    version: "1"
    description: |
      Read a file from the local filesystem. Side_effects=read_only,
      so runnable inside Guardian-genre agents without per-call human
      approval. Per-agent constitution must populate
      constraints.allowed_paths (list of absolute roots); the agent
      cannot read files outside those roots even via symlink or
      relative-path tricks (Path.resolve() applied before allowlist
      check). Output is utf-8 text only; binary files refuse cleanly.
      Cap on returned bytes (default 100 KB, max 2 MB) keeps a single
      tool result from sucking the whole repo into the audit chain.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path; resolved before allowlist check."
        max_bytes:
          type: integer
          minimum: 1
          maximum: 2000000
          default: 100000
    side_effects: read_only
    archetype_tags: [system_architect, software_engineer, code_reviewer]

  code_edit.v1:
    name: code_edit
    version: "1"
    description: |
      Write a file to the local filesystem. Side_effects=filesystem,
      so the constraint resolver lands requires_human_approval=true on
      Engineer's actuator-genre kit (every dispatch gates through the
      operator queue). Per-agent constitution must populate
      constraints.allowed_paths; same Path.resolve() defense as
      code_read.v1. Modes: "write" (default — replaces content,
      atomic via temp+rename) or "append". Refuses if parent
      directory doesn't exist (won't create dirs; use shell_exec for
      mkdir). Content cap 5 MB.
    input_schema:
      type: object
      required: [path, content]
      properties:
        path: {type: string}
        content: {type: string, maxLength: 5000000}
        mode:
          type: string
          enum: [write, append]
          default: write
    side_effects: filesystem
    archetype_tags: [software_engineer]

  shell_exec.v1:
    name: shell_exec
    version: "1"
    description: |
      Run a command via argv-list (NEVER shell=True). Side_effects=
      external, so this gates through human approval on every call
      for Engineer (actuator genre). Strict safety: argv must be a
      list of strings; argv[0] must be a bare command name (no
      slashes — absolute paths refused) and must be in
      constraints.allowed_commands; cwd (if supplied) must be inside
      constraints.allowed_paths; mandatory subprocess timeout
      (default 30s, max 300s). Stdout/stderr captured + truncated
      (100 KB / 50 KB) so verbose tools don't blow the audit chain.
      Subprocess inherits the daemon's environment — operators
      should run the daemon under a restricted user account if env-
      leakage is a concern.
    input_schema:
      type: object
      required: [argv]
      properties:
        argv:
          type: array
          minItems: 1
          items: {type: string}
        cwd:
          type: string
          description: "Working directory; defaults to first allowed_path."
        timeout_s:
          type: integer
          minimum: 1
          maximum: 300
          default: 30
    side_effects: external
    archetype_tags: [software_engineer]

# Per-archetype standard kits. Each role's kit is the default tool
# surface for a freshly-birthed agent of that role; per-request
# tools_add / tools_remove on /birth or /spawn override it.
archetypes:
  # ---- Original 5 archetype kits (post C-1 dissection 2026-04-30) -------
  # The 6 zombie tools that lived in these kits at v0.1 were either
  # newly implemented (dns_lookup.v1) or substituted with existing
  # equivalent v0.2 tools. See docs/audits/2026-04-30-c1-zombie-tool-
  # dissection.md for per-tool §0 verdicts.
  network_watcher:
    # network_watcher is in genre observer (max_side_effects=read_only).
    # dns_lookup.v1 is a network side-effect tool; keeping it in the
    # standard kit would trip the genre kit-tier ceiling at birth time.
    # The original kit had this latent bug — it never tripped because
    # dns_lookup wasn't implemented (dispatcher refused with
    # unknown_tool before the kit-tier check fired). Now that
    # dns_lookup exists, we leave it OUT of the standard kit and
    # operators who genuinely want network_watcher to do DNS lookups
    # either:
    #   (a) birth with tools_add: [{name: dns_lookup, version: 1}], or
    #   (b) use the investigator-genre roles (anomaly_investigator),
    #       which already get dns_lookup-equivalent capability.
    standard_tools:
      # packet_query.v1 deferred to Phase G tshark_pcap_query.v1
      # dns_lookup.v1 NOT included — see comment above (genre ceiling)
      - traffic_flow_local.v1   # was flow_summary.v1; read_only — fits observer
      - timestamp_window.v1
  log_analyst:
    standard_tools:
      - log_scan.v1              # was log_grep.v1
      - log_aggregate.v1
      - timestamp_window.v1
  anomaly_investigator:
    standard_tools:
      # packet_query.v1 deferred to Phase G tshark_pcap_query.v1
      - traffic_flow_local.v1    # was flow_summary.v1 (shared with network_watcher)
      - log_scan.v1              # was log_grep.v1
      - behavioral_baseline.v1   # half of was baseline_compare.v1
      - anomaly_score.v1         # half of was baseline_compare.v1
      - log_correlate.v1         # was correlation_window.v1
      - timestamp_window.v1

  # ---- ADR-0033 Phase D — Security Swarm role kits (9) -------------------
  # Every Swarm role gets memory_recall + memory_write so they can read and
  # write at scope='lineage' for inter-tier handoff. Mid + high tier also
  # get delegate.v1 so they can initiate cross-agent chains.
  #
  # NOTE: three tools called out in ADR-0033 §4 are NOT in the kit because
  # they're deferred: config_audit (B1 follow-on), mfa_check (B1 deferred
  # pending operator scoping of MFA posture target), decoy_file (functionally
  # absorbed by canary_token.v1). When those land, add them to the
  # corresponding role.
  patch_patrol:
    standard_tools:
      - patch_check.v1
      - software_inventory.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1

  gatekeeper:
    standard_tools:
      - port_policy_audit.v1
      - usb_device_audit.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1

  log_lurker:
    standard_tools:
      - log_scan.v1
      - log_aggregate.v1
      - audit_chain_verify.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - delegate.v1

  anomaly_ace:
    standard_tools:
      - behavioral_baseline.v1
      - log_correlate.v1
      - anomaly_score.v1
      - ueba_track.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - delegate.v1

  net_ninja:
    standard_tools:
      - traffic_flow_local.v1
      - lateral_movement_detect.v1
      - port_scan_local.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - delegate.v1

  response_rogue:
    standard_tools:
      - triage.v1
      - isolate_process.v1
      - evidence_collect.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - delegate.v1

  zero_zero:
    standard_tools:
      - jit_access.v1
      - continuous_verify.v1
      - posture_check.v1
      - dynamic_policy.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - memory_disclose.v1
      - delegate.v1

  vault_warden:
    standard_tools:
      - key_inventory.v1
      - tamper_detect.v1
      - file_integrity.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - memory_disclose.v1
      - delegate.v1

  deception_duke:
    standard_tools:
      - canary_token.v1
      - honeypot_local.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - memory_disclose.v1
      - delegate.v1

  # ---- SW-track coding swarm kits ---------------------------------------
  # The 3 specialists in the coding triune. Architect designs (researcher
  # genre), Engineer builds (actuator), Reviewer gates (guardian). All
  # three get llm_think for reasoning, memory_write/recall for the
  # shared notebook, and delegate for triune-bonded handoff.
  #
  # Engineer is the only one with a genre-tier ceiling that admits
  # heavier tools (actuator → external) — when code_edit.v1 / shell_exec.v1
  # land in the SW.7+ tranche, they go in Engineer's kit only.
  system_architect:
    standard_tools:
      - llm_think.v1
      - memory_write.v1
      - memory_recall.v1
      - delegate.v1
      - code_read.v1            # SW.A.5 — read code to design against it

  software_engineer:
    standard_tools:
      - llm_think.v1
      - memory_write.v1
      - memory_recall.v1
      - delegate.v1
      - code_read.v1            # SW.A.5 — read what's there
      - code_edit.v1            # SW.A.5 — write changes (gated by genre)
      - shell_exec.v1           # SW.A.5 — run tests / git (gated by genre)

  code_reviewer:
    standard_tools:
      - llm_think.v1
      - memory_write.v1
      - memory_recall.v1
      - delegate.v1
      - code_read.v1            # SW.A.5 — read diffs to review them

# Per-genre fallback kits (ADR-0021 T4). Used by the kit resolver as
# the LAST step in the chain when a role has no archetype-specific
# standard_tools entry above. Lets a freshly-declared role inherit a
# sensible default just by being claimed by a genre — operators don't
# have to copy-paste the same standard_tools into every new role.
#
# Resolution order (per ADR-0018 + T4):
#   1. tools_remove (per-request)
#   2. tools_add    (per-request)
#   3. archetypes[role].standard_tools  (per-role)
#   4. genre_default_tools[genre]       (per-genre fallback)
#
# Existing roles with an archetype kit are unchanged — the genre
# fallback only fires when (3) is empty. That preserves byte-for-byte
# behavior for every agent already born.
#
# Each list must reference a real tool key from the `tools:` mapping
# above; the loader rejects unknowns at startup.
genre_default_tools:
  observer:
    # post C-1 dissection 2026-04-30: packet_query → deferred (Phase G);
    # flow_summary → traffic_flow_local
    - traffic_flow_local.v1
    - timestamp_window.v1
  investigator:
    # post C-1 dissection 2026-04-30:
    # - packet_query     → deferred (Phase G tshark_pcap_query.v1)
    # - log_grep         → log_scan.v1
    # - baseline_compare → behavioral_baseline.v1 + anomaly_score.v1
    # - correlation_window → log_correlate.v1
    - log_scan.v1
    - behavioral_baseline.v1
    - anomaly_score.v1
    - log_correlate.v1
    - timestamp_window.v1
  communicator:
    - timestamp_window.v1
  guardian:
    - timestamp_window.v1
  researcher:
    - timestamp_window.v1
  # actuator and companion intentionally have NO genre defaults — those
  # genres have outsized risk profiles, and silently giving them tools
  # by genre claim alone would short-circuit the operator's intent.
  # Operators MUST declare standard_tools per-role for these genres or
  # supply tools_add explicitly on each request.
