  deception_duke:
    standard_tools:
      - canary_token.v1
      - honeypot_local.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - memory_disclose.v1
      - delegate.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392

  # ---- SW-track coding swarm kits ---------------------------------------
  # The 3 specialists in the coding triune. Architect designs (researcher
  # genre), Engineer builds (actuator), Reviewer gates (guardian). All
  # three get llm_think for reasoning, memory_write/recall for the
  # shared notebook, and delegate for triune-bonded handoff.
  #
  # Engineer is the only one with a genre-tier ceiling that admits
  # heavier tools (actuator → external) — when code_edit.v1 / shell_exec.v1
  # land in the SW.7+ tranche, they go in Engineer's kit only.
  system_architect:
    standard_tools:
      - llm_think.v1
      - memory_write.v1
      - memory_recall.v1
      - delegate.v1
      - code_read.v1            # SW.A.5 — read code to design against it

  software_engineer:
    standard_tools:
      - llm_think.v1
      - memory_write.v1
      - memory_recall.v1
      - delegate.v1
      - code_read.v1            # SW.A.5 — read what's there
      - code_edit.v1            # SW.A.5 — write changes (gated by genre)
      - shell_exec.v1           # SW.A.5 — run tests / git (gated by genre)
      - text_summarize.v1       # B392 — commit_changelog/release_notes skills
      - code_explain.v1         # B392 — code_review_quick/bug_report_polish skills
      - commit_message.v1       # B392 — commit_changelog/release_notes skills
      - email_draft.v1          # B392 — bug_report_polish skill

  # ADR-0056 — Experimenter (Smith). Maximally permissive legal
  # kit: every tool that doesn't touch identity-immutable
  # surfaces (audit chain, registry DB, secrets dir). Branch
  # isolation + path constraints are enforced at the
  # constitutional-policy layer (constitution_templates.yaml
  # 'experimenter' block) rather than by removing tools — Smith
  # has shell_exec.v1 but its allowed_commands forbid
  # `git push origin main`. Per ADR-0056 D1 the design is
  # 'broad kit + tight per-tool constraints' rather than 'narrow
  # kit'. Constraints land at birth via the post-birth
  # constitutional patch (E1.5) since tool_catalog only
  # configures membership.
  experimenter:
    standard_tools:
      # --- core cognition + memory ---
      - llm_think.v1            # routes to frontier per ADR-0056 D4
      - memory_write.v1
      - memory_recall.v1
      - memory_tag_outcome.v1   # ADR-0054 T5 reinforcement on cycle
      - memory_flag_contradiction.v1
      - memory_disclose.v1
      - memory_challenge.v1
      - memory_verify.v1
      # --- code + repo + analysis ---
      - code_read.v1
      - code_edit.v1
      - shell_exec.v1
      - pytest_run.v1
      - ruff_lint.v1
      - mypy_typecheck.v1
      - semgrep_scan.v1
      - bandit_security_scan.v1
      - tree_sitter_query.v1
      - git_log_read.v1
      - git_diff_read.v1
      - git_blame_read.v1
      - pip_install_isolated.v1
      - patch_check.v1
      # --- system inspection (read-only, defensible) ---
      - audit_chain_verify.v1
      - file_integrity.v1
      - log_scan.v1
      - log_aggregate.v1
      - software_inventory.v1
      - posture_check.v1
      - continuous_verify.v1
      - timestamp_window.v1
      # --- network + external (gated by genre + posture) ---
      - dns_lookup.v1
      - web_fetch.v1
      - browser_action.v1
      - mcp_call.v1
      # --- delegation + agent introspection ---
      - delegate.v1
      - suggest_agent.v1

  code_reviewer:
    standard_tools:
      - llm_think.v1
      - memory_write.v1
      - memory_recall.v1
      - delegate.v1
      - code_read.v1            # SW.A.5 — read diffs to review them
      - text_summarize.v1       # B392 — commit_changelog/release_notes/memory_consolidate
      - code_explain.v1         # B392 — code_review_quick/bug_report_polish skills
      - commit_message.v1       # B392 — commit_changelog/release_notes skills
      - email_draft.v1          # B392 — bug_report_polish skill
      - tone_shift.v1           # B392 — release_notes skill (audience adapt)

  # ---- ADR-0077 (B331-B336) D4 advanced rollout per-role kits -----------
  # Phase α closure caught that birthing a `test_author` agent landed
  # only `timestamp_window.v1` in its kit — the researcher genre's
  # default_kit_pattern is research-oriented (web_research +
  # corpus_synthesis + citation_management) and test_author needs to
  # actually write test files + run pytest. The per-role override is
  # the idiomatic fix: a role with an entry here gets the explicit kit
  # regardless of genre default. See ADR-0077 §"Tool kit" tables for
  # the per-role rationale.
  test_author:
    # Researcher genre + tests-only kit. forbid_production_code_edit
    # constitutional policy + code_edit's allowed_paths constraint
    # (patched post-birth) together enforce the tests-only invariant.
    standard_tools:
      - llm_think.v1            # reason about edge cases
      - memory_write.v1
      - memory_recall.v1
      - delegate.v1             # hand back to software_engineer
      - code_read.v1            # read the spec + existing tests
      - code_edit.v1            # write test files (allowed_paths=[tests/])
      - shell_exec.v1           # pytest invocation (allowed_commands=[pytest, python3])
      - web_fetch.v1            # framework docs (allowed_hosts patched at birth)
      - pytest_run.v1           # canonical test runner if available

  migration_pilot:
    # Guardian genre + migration-owner kit. require_dry_run_before_apply
    # + require_human_approval_for_apply constitutional policies are
    # the load-bearing gates; the tool kit just provides the surface.
    standard_tools:
      - llm_think.v1            # FK-cascade reasoning
      - memory_write.v1
      - memory_recall.v1
      - delegate.v1             # escalate to operator via approval queue
      - code_read.v1            # read the registry schema + migration files
      - code_edit.v1            # write migration files (allowed_paths patched)
      - shell_exec.v1           # sqlite3 dry-run + pytest (allowed_commands patched)
      - audit_chain_verify.v1   # post-apply chain integrity check

  release_gatekeeper:
    # Guardian genre + advisory-only kit. forbid_release_action policy
    # blocks every release-acting tool at the kit layer regardless of
    # posture. shell_exec is allowed but constrained to pytest + fsf.
    standard_tools:
      - llm_think.v1            # borderline-case judgment (min_confidence 0.80)
      - memory_write.v1
      - memory_recall.v1
      - delegate.v1
      - code_read.v1            # walk the changelog + diff stat
      - audit_chain_verify.v1   # chain integrity for the release tag's parent
      - shell_exec.v1           # pytest conformance suite + fsf drift sentinel
      - pytest_run.v1           # canonical conformance runner

  # ---- ADR-0078 (B342-B347) D3 Local SOC advanced rollout Phase A ------
  # forensic_archivist is genuinely read_only — every tool in the kit
  # has side_effects: read_only EXCEPT memory_write (which writes to the
  # archivist's own private memory scope, not the filesystem). The
  # physical artifact moves (acquire/archive/retire) are operator-driven;
  # the archivist's contribution is the chain-of-custody attestation
  # written to the audit chain via the underlying tools. This is why
  # forensic_archivist STAYS in guardian (read_only ceiling) unlike
  # migration_pilot + release_gatekeeper which B341 had to move to
  # actuator for kit-tier compliance.
  forensic_archivist:
    standard_tools:
      - llm_think.v1            # judgment when prior_hash ≠ current_hash
      - memory_write.v1         # custody log in private memory
      - memory_recall.v1        # look up prior custody chain for an artifact
      - delegate.v1             # escalate tamper_suspected to operator
      - audit_chain_verify.v1   # verify the chain itself before attesting
      - file_integrity.v1       # sha256 the artifact + compare to prior_hash
      - code_read.v1            # read attached metadata files (.sha256, .manifest)
      # No shell_exec. No code_edit. No external network. Read-only by
      # construction; that's the genre invariant.

  # ---- ADR-0085 Phase A — D8 Compliance Auditor -------------------------
  # audit_archivist + evidence_collector kits. Both genuinely read_only:
  # capture / attest via memory_write, verify via audit_chain_verify +
  # file_integrity, never shell_exec / code_edit. Same construction as
  # forensic_archivist for the D3 side; D8 mirrors the pattern for the
  # compliance side of the house.
  audit_archivist:
    standard_tools:
      - llm_think.v1            # retention-policy judgment + chain-trend reasoning
      - memory_write.v1         # archival attestations in private memory
      - memory_recall.v1        # look up prior attestations for an archive id
      - delegate.v1             # escalate retention-floor violations to operator
      - audit_chain_verify.v1   # confirm chain integrity before attesting
      - file_integrity.v1       # sha256 archive bytes + compare to prior attestation
      - code_read.v1            # read framework yaml + retention policy + manifests
      - text_summarize.v1       # condense long archival histories for operator review
      # No shell_exec. No code_edit. No external network. Read-only by
      # construction — same posture as forensic_archivist.

  evidence_collector:
    standard_tools:
      - llm_think.v1            # scope-selection judgment (what to capture per framework)
      - memory_write.v1         # evidence_captured attestations in private memory
      - memory_recall.v1        # walk prior captures to avoid duplicates
      - delegate.v1             # escalate capture-failure or scope-gap to operator
      - audit_chain_verify.v1   # confirm chain integrity before capturing windows
      - file_integrity.v1       # sha256 captured sources at capture time
      - code_read.v1            # read source configs + audit chain entries + framework yaml
      - text_summarize.v1       # produce capture-summary briefs
      # No shell_exec. No code_edit. No web_fetch. Passive evidence
      # capture; the corpus is local + private.

  # ---- ADR-0085 Phase D — D8 Compliance report generator ----------------
  # report_generator kit: audit_packet_generate.v1 + the standard
  # researcher read-only support set. Reads chain + evidence +
  # scan reports + framework yamls; writes packet attestations to
  # private memory. NO shell_exec / code_edit / web_fetch — the
  # report stays inside the audit chain's locality.
  report_generator:
    standard_tools:
      - llm_think.v1            # packet narrative + per-control summary
      - memory_write.v1         # packet attestations + audit-packet entries in private memory
      - memory_recall.v1        # walk prior packets for trending + cross-period comparison
      - delegate.v1             # route the finished packet to the operator for review
      - audit_chain_verify.v1   # chain integrity attestation embedded in the packet
      - text_summarize.v1       # condense long packets into operator-readable digests
      - audit_packet_generate.v1 # ADR-0085 Phase D — the wrap-and-attest packet builder
      - code_read.v1            # read framework yaml + evidence corpus

  # ---- ADR-0085 Phase C — D8 Compliance policy enforcer ----------------
  # policy_enforcer kit: policy_lint.v1 + the standard actuator
  # support set, MINUS code_edit / shell_exec. The enforcer
  # surfaces remediations as proposals via memory_write +
  # delegate; it does NOT apply them. forbid_silent_remediation
  # policy + YELLOW posture default enforce that at the
  # governance layer; the kit composition enforces it at the
  # tool-availability layer (no tool the enforcer has access to
  # can apply a remediation to disk).
  policy_enforcer:
    standard_tools:
      - llm_think.v1            # remediation reasoning + impact analysis
      - memory_write.v1         # proposal attestations in private memory
      - memory_recall.v1        # walk prior proposals for trending
      - delegate.v1             # route proposals to operator approval queue
      - audit_chain_verify.v1   # chain integrity before escalating proposals
      - text_summarize.v1       # condense lint findings into proposal text
      - policy_lint.v1          # ADR-0085 Phase C — the lint evaluator
      - code_read.v1            # read source configs targeted for lint

  # ---- ADR-0086 Phase A — D1 Knowledge Forge intake ---------------------
  # librarian + prospector kits. Mirror the existing
  # knowledge_consolidator (researcher) / paper_summarizer (researcher)
  # pattern but for sustained-curation + sustained-sourcing roles.
  # librarian is guardian (read_only + catalog discipline);
  # prospector is researcher (network ceiling for source pulls).
  # NEVER shell_exec / code_edit on either — D1 stays read-from-
  # source + write-to-memory only.
  librarian:
    standard_tools:
      - llm_think.v1            # catalog reasoning + topic categorization
      - memory_recall.v1        # walk prior catalog entries + private memory
      - memory_write.v1         # catalog attestations + topic-tagged entries
      - delegate.v1             # hand off to prospector / synthesizer / knowledge_verifier
      - audit_chain_verify.v1   # chain integrity before catalog writes
      - text_summarize.v1       # condense source briefs for catalog entries
      - personal_recall.v1      # ADR-0076 T4 hybrid retrieval over the personal index
      - operator_profile_read.v1 # ADR-0068 — operator areas-of-focus inform catalog scope
      - code_read.v1            # read operator-stored notes when forest-files connector absent (graceful degradation per ADR-0086 Decision 4)
      # No shell_exec. No code_edit. No web_fetch (prospector's lane).
      # Read-only catalog discipline + memory writes.

  prospector:
    standard_tools:
      - llm_think.v1            # source relevance judgment + brief synthesis
      - memory_recall.v1        # check for prior fetches against this topic
      - memory_write.v1         # fetch attestations + raw excerpts for librarian pickup
      - delegate.v1             # hand off to librarian for catalog discipline
      - audit_chain_verify.v1   # chain integrity before publishing fetch attestations
      - text_summarize.v1       # condense fetched material into briefs
      - web_fetch.v1            # source pulls (gated by per-agent allowlist; sources from config/knowledge_sources.yaml when that ships, otherwise operator-allowlisted at constitution patch time)
      - operator_profile_read.v1 # ADR-0068 — areas-of-focus drive source-selection
      # No file_integrity (prospector pulls live sources; integrity
      # is the librarian + audit-chain combination's job).
      # No shell_exec. No code_edit. No catalog writes (librarian's lane).

  # ---- ADR-0086 Phase C — D1 Knowledge Forge verification --------------
  # knowledge_verifier kit: knowledge_contradiction_scan.v1 +
  # memory_flag_contradiction.v1 (ADR-0036 T2) + the standard
  # guardian read-only support set. YELLOW posture by default
  # (operator-gated). Reads memory + chain; flags via
  # memory_flag_contradiction.v1 substrate (the only write tool
  # in the kit; flag-not-rewrite invariant enforced at the
  # substrate level). NO shell_exec / code_edit / web_fetch —
  # verification is catalog-internal.
  knowledge_verifier:
    standard_tools:
      - llm_think.v1                       # contradiction reasoning + evidence comparison
      - memory_recall.v1                   # walk the agent's own memory
      - delegate.v1                        # escalate confirmed contradictions to operator
      - audit_chain_verify.v1              # chain integrity before flagging
      - text_summarize.v1                  # condense contradiction evidence for operator review
      - knowledge_contradiction_scan.v1    # ADR-0086 Phase C — the candidate detector (read_only)
      - verify_claim.v1                    # ADR-0063 — Reality Anchor cross-check before escalation (read_only)
      # memory_flag_contradiction.v1 (side_effects=filesystem)
      # would exceed guardian's read_only ceiling and is NOT in
      # this kit. The actual flag-write is operator-dispatched
      # post-YELLOW-review, NOT in-agent — same separation as
      # policy_enforcer (which surfaces remediations via memory
      # writes but never applies them). This keeps the verifier's
      # surface aligned with its flag-not-rewrite invariant
      # (ADR-0036 §flag-not-rewrite) at the kit-composition layer,
      # not just at the constitution-policy layer.

  # ---- ADR-0086 Phase B — D1 Knowledge Forge synthesis -----------------
  # synthesizer kit: topic_genealogy_build.v1 +
  # daily_knowledge_delta.v1 (Phase D) + the standard researcher
  # read-only support set. Reads the librarian's catalog, builds
  # topic graphs + daily deltas, writes synthesis attestations
  # to private memory. NO shell_exec / code_edit / web_fetch —
  # synthesis is catalog-internal.
  synthesizer:
    standard_tools:
      - llm_think.v1                  # topic-graph reasoning + delta narrative
      - memory_recall.v1              # walk the librarian's catalog entries
      - memory_write.v1               # synthesis attestations in private memory
      - delegate.v1                   # hand off to operator or to knowledge_verifier
      - audit_chain_verify.v1         # chain integrity before publishing synthesis
      - text_summarize.v1             # condense topic graphs into operator-readable digests
      - topic_genealogy_build.v1      # ADR-0086 Phase B — the topic-graph builder
      - daily_knowledge_delta.v1      # ADR-0086 Phase D — the daily-sweep delta builder
      - personal_recall.v1            # ADR-0076 T4 hybrid retrieval over the personal index
      - operator_profile_read.v1      # ADR-0068 — areas-of-focus inform synthesis scope

  # ---- ADR-0087 Phase A — D2 Daily Life OS intake + orchestration -------
  # coordinator + inbox_triager kits. Both reuse the existing
  # builtin set — no new tools land in Phase A. coordinator is
  # researcher-genre (network ceiling for downstream delegation +
  # operator-profile reads); inbox_triager is communicator-genre
  # (drafts only; never sends — the draft is the deliverable).
  coordinator:
    standard_tools:
      - llm_think.v1                  # briefing composition + prioritization reasoning
      - memory_recall.v1              # walk prior briefings + sibling-role handoff inputs
      - memory_write.v1               # write briefing attestations to private memory
      - delegate.v1                   # route downstream (D1 deltas, sibling D2 roles)
      - audit_chain_verify.v1         # chain integrity before publishing briefing
      - text_summarize.v1             # condense long handoff inputs into briefing bullets
      - operator_profile_read.v1      # ADR-0068 — work_hours, areas_of_focus, timezone
      - personal_recall.v1            # ADR-0076 T4 — hybrid retrieval over the personal index
      # No web_fetch. No shell_exec. No code_edit. No calendar / inbox
      # tools (siblings own those surfaces). Pure orchestration kit.

  inbox_triager:
    standard_tools:
      - llm_think.v1                  # classification + ranking + draft tone reasoning
      - memory_recall.v1              # walk inbox snapshots in private memory
      - memory_write.v1               # write draft attestations to private memory
      - audit_chain_verify.v1         # chain integrity before publishing drafts
      - text_summarize.v1             # condense long threads into draft context
      - email_draft.v1                # the deliverable — drafts only, never sends
      - action_items_extract.v1      # pull action items out of triaged threads
      - operator_profile_read.v1      # ADR-0068 — operator preferences inform tone + selection
      - delegate.v1                   # escalate ambiguous threads to operator-companion
      # No mcp_call. No web_fetch. No browser_action. The triager
      # produces drafts; the operator (or a future outbound-actuator
      # role) handles real sends.

  # ---- ADR-0087 Phase D — D2 Daily Life OS reflection ----------
  # reflector kit. Researcher genre, read_only synthesis.
  # decision_journal_compile.v1 produces the digest; llm_think
  # produces the operator-facing narrative.
  reflector:
    standard_tools:
      - llm_think.v1                      # evening-sweep narrative
      - memory_recall.v1                  # walk prior reflections + daily_briefing carryforward
      - memory_write.v1                   # write reflection attestations to private memory
      - delegate.v1                       # route lingering open items back to coordinator
      - audit_chain_verify.v1             # chain integrity before publishing reflection
      - text_summarize.v1                 # condense long decision lists into operator-readable digests
      - operator_profile_read.v1          # ADR-0068 — operator context for the framing
      - decision_journal_compile.v1       # ADR-0087 Phase D — the chain-walking digest builder
      # No web_fetch. No shell_exec. No mutation tools — read-only
      # evening synthesis end-to-end.

  # ---- ADR-0087 Phase C — D2 Daily Life OS prioritization ------
  # task_prioritizer kit. Researcher genre, read_only synthesis.
  # task_rank.v1 produces the deterministic ranking; llm_think
  # produces the operator-facing narrative.
  task_prioritizer:
    standard_tools:
      - llm_think.v1                  # narrative wrapping the deterministic ranking
      - memory_recall.v1              # walk prior prioritizations + operator-supplied task lists
      - memory_write.v1               # write ranking attestations to private memory
      - delegate.v1                   # route ambiguous items back to coordinator
      - audit_chain_verify.v1         # chain integrity before publishing rankings
      - text_summarize.v1             # condense long task lists into operator briefs
      - operator_profile_read.v1      # ADR-0068 — areas_of_focus drive the focus_bonus
      - task_rank.v1                  # ADR-0087 Phase C — the deterministic ranker
      # No web_fetch. No shell_exec. No mutation tools — the role
      # never changes the task store; it ranks operator-provided lists.

  # ---- ADR-0087 Phase B — D2 Daily Life OS scheduling + calendar ------
  # time_steward kit. Actuator genre; the only acting role in D2.
  # YELLOW posture default. The two new builtin tools land here:
  # schedule_reminder.v1 (filesystem) + calendar_block.v1 (external).
  # Per-call approval gating + YELLOW posture + actuator genre
  # ceiling together enforce the discipline.
  time_steward:
    standard_tools:
      - llm_think.v1                  # reasoning over work_hours + meeting density
      - memory_recall.v1              # walk prior reminders + queued calendar events
      - memory_write.v1               # write attestations of scheduled / declined actions
      - delegate.v1                   # route ambiguous scheduling decisions back to coordinator
      - audit_chain_verify.v1         # chain integrity before queueing actions
      - text_summarize.v1             # condense meeting-density into operator briefs
      - operator_profile_read.v1      # ADR-0068 — work_hours + timezone drive scheduling
      - schedule_reminder.v1          # ADR-0087 Phase B — reminder ledger
      - calendar_block.v1             # ADR-0087 Phase B — calendar queue
      # No web_fetch. No shell_exec. No code_edit. Pure scheduling
      # action surface.

  # ---- ADR-0088 Phase A — D7 Content Studio drafting foundation -------
  # writer + content_researcher kits. Both reuse the existing builtin
  # set — no new tools land in Phase A. writer is researcher-genre
  # (read_only ceiling — drafts to private memory only; the editor +
  # style_steward + distribution_pilot handle downstream); content_researcher
  # is researcher-genre (network ceiling — operator-allowlisted source
  # pulls). The pair pattern mirrors D1's prospector + librarian split
  # but scoped to content production rather than personal knowledge.
  writer:
    standard_tools:
      - llm_think.v1                  # the load-bearing tool — long-form composition
      - memory_recall.v1              # walk research briefs + lineage drafts + voice samples
      - memory_write.v1               # write draft attestations to private memory
      - delegate.v1                   # hand off to editor / style_steward / content_researcher
      - audit_chain_verify.v1         # chain integrity before publishing draft
      - text_summarize.v1             # condense long research briefs into draft sections
      - operator_profile_read.v1      # ADR-0068 — areas_of_focus + timezone inform tone
      - personal_recall.v1            # ADR-0076 T4 — hybrid retrieval over the personal index
      # No web_fetch (content_researcher's lane). No publish tools
      # (distribution_pilot's lane). No format_adapt (editor's lane).
      # Pure long-form composition kit.

  content_researcher:
    standard_tools:
      - llm_think.v1                  # source synthesis + brief composition
      - memory_recall.v1              # check for prior briefs against this topic
      - memory_write.v1               # brief attestations tagged for writer pickup
      - delegate.v1                   # hand off to writer / D1 librarian for catalog reads
      - audit_chain_verify.v1         # chain integrity before publishing briefs
      - text_summarize.v1             # condense fetched material into briefs
      - web_fetch.v1                  # source pulls (gated by per-agent allowlist; ADR-0088 Phase A operator-allowlists arxiv / github / wikipedia / RFC editor by default)
      - operator_profile_read.v1      # ADR-0068 — areas_of_focus drive source-selection
      - personal_recall.v1            # ADR-0076 T4 — hybrid retrieval to surface D1 catalog reads
      # No file_integrity. No shell_exec. No code_edit. No drafting
      # tools (writer's lane). Sourcing + brief composition only.

  # ---- ADR-0085 Phase B — D8 Compliance scanner -------------------------
  # compliance_scanner kit: framework_check.v1 + the standard
  # guardian read-only support set. The scanner reads framework
  # yamls, runs the rule evaluator, writes gap reports to private
  # memory, escalates to operator via delegate. NO shell_exec /
  # code_edit / file_integrity (the rule evaluator handles its own
  # filesystem reads internally).
  compliance_scanner:
    standard_tools:
      - llm_think.v1            # gap analysis + remediation reasoning
      - memory_write.v1         # gap reports in private memory
      - memory_recall.v1        # walk prior reports for trending
      - delegate.v1             # escalate failing controls to operator
      - audit_chain_verify.v1   # chain integrity before publishing report
      - text_summarize.v1       # condense long rule_results into digests
      - framework_check.v1      # ADR-0085 Phase B — the rule evaluator
      - code_read.v1            # read framework yaml + evidence corpus

  # ADR-0064 T4 (B379) — telemetry_steward archetype kit.
  # All read_only. Steward reviews batch anchors + summarizes; never
  # touches raw events (anomaly_ace's lane) and never acts on findings
  # (response_rogue's lane). Adapter lifecycle is T2 substrate's job;
  # the steward doesn't spawn or pause adapters either.
  telemetry_steward:
    standard_tools:
      - llm_think.v1            # summarization + judgment on batch metadata
      - memory_recall.v1        # look up prior steward briefs for trending
      - memory_write.v1         # record briefs in private memory
      - delegate.v1             # escalate MISMATCH / CHAIN_ENTRY_MISSING to operator
      - audit_chain_verify.v1   # chain-level integrity (load-bearing per policy require_batch_anchor_verification)
      - text_summarize.v1       # curated summarization of batch-metadata digests
      # No shell_exec. No file_integrity (raw events aren't files — they're
      # in SQLite, integrity_root is the batch-level anchor). No code_read
      # (steward doesn't read source code / configs). Strict read_only.

  # ADR-0065 T3 (B391) — detection_engineer archetype kit.
  # Researcher genre; allowed network reach for ATT&CK reference
  # pulls. No filesystem write (engineer proposes via memory_write;
  # operator commits the actual rule file). No shell_exec / code_edit.
  detection_engineer:
    standard_tools:
      - llm_think.v1            # rule synthesis + false-positive analysis
      - memory_recall.v1        # walk prior detection_fired + prior proposals
      - memory_write.v1         # record proposed rules + review notes
      - delegate.v1             # escalate ambiguous rule cases
      - audit_chain_verify.v1   # chain-level integrity before drawing trend
      - text_summarize.v1       # condense ATT&CK references
      - web_fetch.v1            # ATT&CK technique catalog (operator-allowlisted)
      # Explicitly NO code_edit / shell_exec / file_integrity. The
      # engineer's surface is read + propose; the rule file commit
      # is operator-driven.

  # ADR-0066 Phase D (B456) — playbook_pilot archetype kit.
  # Actuator genre, but the kit shipped in Phase D is the review-
  # and-oversight surface: the PlaybookEngine substrate is the
  # resolve-and-record action layer (live step dispatch is deferred,
  # exactly as DetectionEngine's daemon-lifespan wiring is deferred).
  # The pilot's signature skill playbook_run_review.v1 is read-only —
  # it summarizes recent playbook_executed events for the operator.
  # NO shell_exec / code_edit: the pilot never authors playbooks
  # (forbid_playbook_authorship) and never edits source.
  playbook_pilot:
    standard_tools:
      - llm_think.v1            # judgment over recent playbook runs
      - memory_recall.v1        # walk prior run reviews for trending
      - memory_write.v1         # record run reviews in private memory
      - delegate.v1             # escalate approval-pending runs to operator
      - audit_chain_verify.v1   # chain integrity before drawing run trends
      - text_summarize.v1       # condense playbook_executed step histories

  # ADR-0066 Phase D (B457) — purple_pete archetype kit.
  # Researcher genre; allowed network reach for ATT&CK reference
  # pulls when designing scenarios (operator-allowlisted, same as
  # detection_engineer). No production-state mutation: the
  # ScenarioRunner writes synthetic events only to the simulation
  # telemetry store, and the purple_team_brief.v1 skill is read-only.
  # NO shell_exec / code_edit / isolate_process — purple_pete
  # measures coverage, it never dispatches a real response.
  purple_pete:
    standard_tools:
      - llm_think.v1            # scenario-coverage judgment + brief synthesis
      - memory_recall.v1        # walk prior purple-team briefs for trending
      - memory_write.v1         # record briefs in private memory
      - delegate.v1             # route coverage gaps to detection_engineer
      - audit_chain_verify.v1   # chain integrity before drawing coverage trends
      - text_summarize.v1       # condense purple_team_run_completed histories
      - web_fetch.v1            # ATT&CK technique catalog (operator-allowlisted)

  # ADR-0064 T6 (B385) — threat_intel_curator archetype kit.
  # All read_only. Curator pulls intel via web_fetch (allowlisted
  # to operator-configured intel sources), verifies + tags +
  # writes to memory cache. Never acts on intel.
  threat_intel_curator:
    standard_tools:
      - llm_think.v1            # judgment on feed content / dedupe heuristics
      - memory_recall.v1        # query the local intel cache
      - memory_write.v1         # write curated intel rows
      - delegate.v1             # escalate signature-verification failures
      - audit_chain_verify.v1   # confirm chain before publishing intel summaries
      - text_summarize.v1       # condense long advisory feeds
      - web_fetch.v1            # pull external intel (gated by per-agent allowlist; sources from config/threat_intel_sources.yaml when that ships)
      - file_integrity.v1       # verify downloaded intel artifacts (sha256)
      # No shell_exec. No code_edit. No browser_action. The curator
      # uses web_fetch with a tight allowlist; richer feed-pull paths
      # (Playwright, MCP-driven, etc.) would land in a follow-on ADR.

  # ---- ADR-0036 verification track --------------------------------------
  # Backfilled in Burst 126 after Phase A audit (2026-04-30) flagged the
  # missing archetype. verifier_loop was previously falling through to
  # the verification genre's genre_default_tools — functional but the
  # operator surface (character sheet "kit" view) showed an empty
  # standard_tools list. Explicit archetype matches the established
  # pattern for every other named role.
  verifier_loop:
    standard_tools:
      - memory_recall.v1        # walk lineage memory for contradictions
      - memory_verify.v1        # ADR-0036 T1 epistemic verification
      - memory_flag_contradiction.v1  # ADR-0036 T2 flag-not-rewrite
      - audit_chain_verify.v1   # tamper-evidence check on the chain
      - llm_think.v1            # reasoning over verification candidates
      - delegate.v1             # cross-tier escalation when contradictions surface

  reality_anchor:
    # ADR-0063 T4 (Burst 253) — singleton-per-forest pre-action
    # verifier. Substrate-layer gate (RealityAnchorStep) runs
    # pattern-match verification on every dispatch; this role is
    # the OPTIONAL deep-pass agent other agents delegate to when
    # they want an LLM-grade semantic verification beyond what
    # the regex catalog can catch. Guardian-genre / read-only
    # ceiling. Singleton enforced at /birth time.
    standard_tools:
      - verify_claim.v1         # ADR-0063 T2 pattern-match verifier
      - memory_recall.v1        # walk verified-tier memory (ADR-0049 K1)
      - audit_chain_verify.v1   # cross-check the chain itself
      - llm_think.v1            # deep semantic pass when pattern is unknown
      - delegate.v1             # escalate to other guardians if needed

  wiring_sentinel:
    # ADR-0081 T3 (B396) — substrate wiring coverage sentinel.
    # Guardian-genre singleton; same pattern as reality_anchor and
    # verifier_loop. Runs wiring_audit.v1 on a 4-hour schedule
    # against section-15's coverage.json, escalates medium+ gaps
    # to the operator queue via delegate.v1, records audit outcomes
    # via memory_write.v1, and verifies the chain via
    # audit_chain_verify.v1 before reporting.
    #
    # READ_ONLY ceiling per guardian genre — the sentinel finds
    # gaps, the operator fixes them. Per ADR-0081 D5: substrate
    # mutation is operator-owned; auto-fix would invert every
    # other constitution-immutability invariant.
    #
    # Singleton-per-forest. /birth refuses a second wiring_sentinel
    # with 409 (same pattern as reality_anchor / verifier_loop).
    standard_tools:
      - memory_recall.v1        # look up prior audits + remediation queue
      - memory_write.v1         # record each audit run's outcome
      - audit_chain_verify.v1   # verify the chain before auditing
      - llm_think.v1            # summarize gap severity + draft punch list
      - delegate.v1             # escalate medium+ gaps to operator queue
      - text_summarize.v1       # compact long coverage.json into operator-readable summary
      - git_local_scan.v1       # ADR-0084 / B432 — local-git posture telemetry (secrets / signing / sync / gitignore). Read-only; designed for this exact 4-hour scheduled-task pattern per its catalog description.
      - security_scan.v1        # ADR-0062 supply-chain IoC scanner. Sibling to git_local_scan.v1 — same WiringSentinel read-only IoC pattern. Reads config/security_iocs.yaml (the v2 catalog with 21 rules covering Shai-Hulud / MCP-STDIO-RCE / LiteLLM / Axios / Grafana / MoneyForward / TeamPCP).

  # ---- v0.6 role expansion (Burst 124, ADR-0044 §"role inventory") ------
  # 24 roles fleshing out the 8 remaining genre buckets with kits sized
  # to each role's purpose. Tool selection respects each role's genre
  # tier (observer=read_only, investigator=read_only, communicator=read_only,
  # actuator=external w/ approval, guardian=read_only, researcher=memory_write,
  # companion=memory_write, web_*=read_only/external w/ approval per ADR-003X).
  #
  # Roles bound to ADR-0038 companion safeguards (journaling_partner,
  # day_companion, learning_partner, accessibility_runtime) get
  # memory_write but no memory_disclose — they can journal, not leak.
  #
  # Web roles (ADR-003X open-web posture) start with web_fetch + dns_lookup
  # only; web_actuator additionally gets browser_action + mcp_call (both
  # approval-gated by constitution policy).

  # -- Tranche 1 — observer extension --------------------------------------
  dashboard_watcher:
    standard_tools:
      # web_fetch.v1 removed 2026-05-05 (B140 follow-on): it's
      # network-class, but dashboard_watcher is in the observer
      # genre (max_side_effects=read_only). Kit-tier validation
      # refused birth with "tools that exceed that ceiling: web_fetch
      # (network)". The role description says "passively monitors
      # operator dashboards + status panels" — that's local-resource
      # observation, no web reach needed. If a future variant needs
      # web reach, move that role to the web_observer genre instead
      # of widening the observer-genre ceiling.
      - timestamp_window.v1
      - posture_check.v1
      - log_scan.v1
      - llm_think.v1
      - memory_recall.v1

  signal_listener:
    standard_tools:
      - log_scan.v1
      - log_aggregate.v1
      - anomaly_score.v1
      - behavioral_baseline.v1
      - timestamp_window.v1
      - llm_think.v1
      - memory_recall.v1

  # -- Tranche 2 — investigator extension ----------------------------------
  incident_correlator:
    standard_tools:
      - log_correlate.v1
      - log_scan.v1
      - anomaly_score.v1
      - behavioral_baseline.v1
      - timestamp_window.v1
      - memory_recall.v1
      - llm_think.v1

  threat_hunter:
    standard_tools:
      - log_scan.v1
      - log_correlate.v1
      - lateral_movement_detect.v1
      - ueba_track.v1
      - behavioral_baseline.v1
      - timestamp_window.v1
      - memory_recall.v1
      - llm_think.v1
      - web_fetch.v1

  # -- Tranche 3 — communicator extension ----------------------------------
  # Communicator genre is read_only; these roles compose summaries, not
  # external sends. mcp_call belongs to actuator-tier roles (alert_dispatcher
  # etc.) where the genre admits side effects.
  briefer:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - timestamp_window.v1

  notifier:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - timestamp_window.v1

  status_reporter:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - timestamp_window.v1
      - log_aggregate.v1

  translator:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1

  # -- Tranche 4 — actuator extension --------------------------------------
  # Actuator genre admits external side effects. Constitution policies
  # gate per-action approval (approval_per_action) so birth-time grant
  # of mcp_call/shell_exec is safe — the runtime layer enforces consent.
  alert_dispatcher:
    standard_tools:
      - mcp_call.v1
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1
      - timestamp_window.v1

  deploy_runner:
    standard_tools:
      - shell_exec.v1
      - code_read.v1
      - git_log_read.v1
      - pytest_run.v1
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1

  ticket_creator:
    standard_tools:
      - mcp_call.v1
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1

  # -- Tranche 5 — guardian extension --------------------------------------
  # Guardian genre is read_only — these roles review and flag, never
  # mutate. memory_flag_contradiction lets refusal_arbiter mark a
  # contradiction without rewriting the original entry.
  content_review:
    standard_tools:
      - code_read.v1
      - llm_think.v1
      - memory_recall.v1
      - semgrep_scan.v1
      - bandit_security_scan.v1

  refusal_arbiter:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - memory_flag_contradiction.v1
      - posture_check.v1

  safety_check:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - memory_verify.v1
      - posture_check.v1
      - audit_chain_verify.v1

  # -- Tranche 6 — researcher extension ------------------------------------
  # Researcher genre admits memory_write at scope='lineage'; constitutions
  # may further constrain via allowed_paths.
  knowledge_consolidator:
    standard_tools:
      - web_fetch.v1
      - code_read.v1
      - memory_recall.v1
      - memory_write.v1
      - llm_think.v1

  paper_summarizer:
    standard_tools:
      - web_fetch.v1
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1

  vendor_research:
    standard_tools:
      - web_fetch.v1
      - dns_lookup.v1
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1

  # -- Tranche 7 — companion extension (ADR-0038 strict) -------------------
  # Companion genre admits memory_write but NOT memory_disclose — these
  # agents can journal but cannot exfiltrate. Constitutions add the
  # non-clinical disclaimer + crisis-topic refusal policies.
  accessibility_runtime:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1

  day_companion:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1
      - timestamp_window.v1

  # ADR-0047 Decision 2 (B156) — Persistent Assistant role kit. Mirrors
  # day_companion (think + memory r/w + timestamp) — the assistant's
  # constitutional kit is read-heavy + memory-anchored. Per ADR-0047
  # T6 description: "defaults to read-heavy + memory". Computer-control
  # tools (ADR-0048) layer on top via per-(agent, plugin) grants — they
  # are NOT in this constitutional baseline because grants are revocable
  # at any time without rebirthing the agent.
  assistant:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1
      - timestamp_window.v1
      - personal_recall.v1      # ADR-0076 T4 — hybrid (BM25+cosine) retrieval over operator's personal_index. Genre-gated to {companion, assistant, operator_steward, domain_orchestrator}; assistant is the first kit on that gate-list to land in catalog.

  operator_companion:
    # B438 (2026-05-20) — kit for the operator_companion role.
    # The live operator_companion agent already exists with
    # constitution-direct tool grants; this kit codifies the
    # canonical surface for FUTURE births. Existing agents keep
    # their current tools per ADR-0044 layered-config semantics.
    #
    # operator_profile_write.v1 lives here (not in assistant) because
    # operator_companion is the role that owns operator-truth mutation.
    # The tool's requires_human_approval=True gate is the per-call
    # safety regardless of kit placement; the kit decision is about
    # which role IS responsible for mutating operator identity facts,
    # not whether the call is safe. See
    # docs/audits/2026-05-20-orphan-tool-disposition.md.
    #
    # Companion genre ceiling: max_side_effects=filesystem,
    # provider_constraint=local_only, memory_ceiling=private.
    # operator_profile_write.v1 is side_effects=filesystem — it sits
    # AT the ceiling, not under it. The companion ceiling was raised
    # network → filesystem precisely so operator_companion can host
    # operator-truth mutation; see config/genres.yaml companion
    # risk_profile for the rationale. No genre violation.
    standard_tools:
      - llm_think.v1             # operator-facing reasoning
      - memory_recall.v1         # query agent + personal memory
      - memory_write.v1          # log operator-companion observations
      - timestamp_window.v1      # timing context for "what did we discuss yesterday"
      - text_summarize.v1        # condense for operator brevity
      - personal_recall.v1       # ADR-0076 T4 — hybrid retrieval; genre-gated to {companion, assistant, operator_steward, domain_orchestrator}; operator_companion is on the gate-list
      - operator_profile_read.v1 # ADR-0068 — read operator-truth (name, work_hours, etc.)
      - operator_profile_write.v1 # ADR-0068 T2 — mutate operator-truth. requires_human_approval=True gates every call through tool_call_pending_approvals
      - delegate.v1              # hand off specialist work to domain agents

  learning_partner:
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1
      - web_fetch.v1

  journaling_partner:
    # ADR-0038 companion harm model. NO web_fetch — keep the surface
    # narrow. NO memory_disclose — journals stay private to the user.
    # The constitution (journaling_partner role_base) enforces the
    # non-clinical disclaimer + crisis-topic refusal at policy layer.
    standard_tools:
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1

  # -- Tranche 8 — open-web genres (ADR-003X) ------------------------------
  # web_watcher is observer-tier (read_only): just fetch + observe.
  # web_researcher is researcher-tier (memory_write at lineage scope).
  # web_actuator is actuator-tier (external side effects, approval-gated).
  web_watcher:
    standard_tools:
      - web_fetch.v1
      - dns_lookup.v1
      - timestamp_window.v1
      - llm_think.v1
      - memory_recall.v1

  web_researcher:
    standard_tools:
      - web_fetch.v1
      - dns_lookup.v1
      - llm_think.v1
      - memory_recall.v1
      - memory_write.v1

  web_actuator:
    # ADR-003X §"actuator posture". browser_action + mcp_call are
    # external side effects; the constitution policy approval_per_action
    # gates each invocation in the dispatcher. forbid_unallowlisted_domain
    # narrows web_fetch + browser_action targets to the allowlist.
    standard_tools:
      - browser_action.v1
      - mcp_call.v1
      - web_fetch.v1
      - llm_think.v1
      - memory_recall.v1

# Per-genre fallback kits (ADR-0021 T4). Used by the kit resolver as
# the LAST step in the chain when a role has no archetype-specific
# standard_tools entry above. Lets a freshly-declared role inherit a
# sensible default just by being claimed by a genre — operators don't
# have to copy-paste the same standard_tools into every new role.
#
# Resolution order (per ADR-0018 + T4):
#   1. tools_remove (per-request)
#   2. tools_add    (per-request)
#   3. archetypes[role].standard_tools  (per-role)
#   4. genre_default_tools[genre]       (per-genre fallback)
#
# Existing roles with an archetype kit are unchanged — the genre
# fallback only fires when (3) is empty. That preserves byte-for-byte
# behavior for every agent already born.
#
# Each list must reference a real tool key from the `tools:` mapping
# above; the loader rejects unknowns at startup.
genre_default_tools:
