      - memory_write.v1
      - memory_disclose.v1
      - delegate.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392

  vault_warden:
    standard_tools:
      - key_inventory.v1
      - tamper_detect.v1
      - file_integrity.v1
      - timestamp_window.v1
      - memory_recall.v1
