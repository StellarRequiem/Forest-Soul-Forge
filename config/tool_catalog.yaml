# Forest Soul Forge — tool catalog (ADR-0018).
#
# Canonical source of MCP-style tool descriptors. Each tool is keyed by
# {name}.{version}. Versions are pinned in soul.md frontmatter at birth
# time so old agents stay reasonable-about even after newer versions of
# a tool land in this file.
#
# When you add a new version of an existing tool:
#   - DO add a new entry (e.g. packet_query.v2) alongside the old one.
#   - DO update the relevant archetype's standard_tools list to point at
#     the new version IF you want fresh births to pick it up by default.
#   - DO NOT edit an existing v1 entry's schema. v1 is frozen — any
#     committed agent that references it relies on its bytes being
#     stable. The catalog-integrity check at daemon startup catches
#     this and refuses to boot.
#
# When you add a new tool:
#   - Pick a clear, verb-or-noun-phrase name (snake_case).
#   - Always start at version "1".
#   - Tag with archetype_tags so the resolver knows which archetype
#     bundles can take it as a default.
#   - side_effects must be one of: read_only, network, filesystem,
#     external. The constitution constraint policy keys off this — a
#     non-read_only tool gets requires_human_approval bumped per
#     trait policy.

version: "0.1"

tools:
  # ----- network_watcher kit ----------------------------------------------
  # NOTE: packet_query.v1 and flow_summary.v1 were specced in ADR-0018
  # but never implemented at v0.1 (catalog vs impl drift caught in the
  # 2026-04-30 audit, Finding C-1).
  #   - packet_query.v1    DEFERRED — supersedeed by Phase G's planned
  #                         tshark_pcap_query.v1 (libpcap-free wrapper
  #                         around Wireshark's tshark CLI). Removed
  #                         from catalog + kits.
  #   - flow_summary.v1    SUBSTITUTED with traffic_flow_local.v1
  #                         (already implemented). Same conceptual
  #                         surface — flow records, 5-tuple aggregation.
  #                         Removed from catalog + kits.
  #
  # Post-ADR-0044 ownership clarification (Burst 126):
  # tshark_pcap_query.v1 is USERSPACE, not kernel. It's a security-
  # observation tool that lives in the SoulUX security distribution
  # alongside the rest of the swarm (network_watcher, log_lurker,
  # net_ninja). The kernel ships the dispatcher + governance pipeline
  # + audit chain + plugin protocol; concrete tools live in userspace
  # tool packs (default = SoulUX). When tshark_pcap_query.v1 lands,
  # it goes in the SoulUX security pack, not the kernel ABI surface.
  #
  # See docs/audits/2026-04-30-c1-zombie-tool-dissection.md for the
  # per-tool §0 verdict, ADR-0018 for the tool-catalog contract, and
  # ADR-0044 for the kernel/userspace boundary.
  dns_lookup.v1:
    name: dns_lookup
    version: "1"
    description: |
      Forward or reverse DNS lookup via the OS resolver (stdlib socket).
      Single A or PTR record only — multi-record-type support
      (MX, TXT, AAAA, NS, CNAME) deferred to dns_lookup.v2 once we
      decide whether to take a dnspython dep.

      Implemented 2026-04-30 under C-1 zombie-tool dissection.
      See docs/audits/2026-04-30-c1-zombie-tool-dissection.md.
    input_schema:
      type: object
      properties:
        hostname:
          type: string
          description: "Hostname to resolve forward (A record). Mutex with ip."
        ip:
          type: string
          description: "IP to resolve reverse (PTR record). Mutex with hostname."
        timeout:
          type: integer
          minimum: 1
          maximum: 30
          default: 5
      oneOf:
        - {required: [hostname]}
        - {required: [ip]}
    side_effects: network
    archetype_tags: [network_watcher]

  # ----- log_analyst kit --------------------------------------------------
  # NOTE: log_grep.v1 was specced in ADR-0018 but never implemented at
  # v0.1. C-1 dissection (2026-04-30) verdict: SUBSTITUTED with
  # log_scan.v1 (already implemented at src/.../tools/builtin/log_scan.py,
  # tested in test_b1_tools.py, ships in security_low log_lurker kit).
  # Functionally equivalent — regex/pattern scan over file or directory.
  # Removed from catalog + archetype kits.
  log_aggregate.v1:
    name: log_aggregate
    version: "1"
    description: |
      Aggregate log events by a field over a time window. Returns a
      bucketed count distribution. Useful for spotting spikes, finding
      top sources, or detecting absence-of-signal. Read-only.
    input_schema:
      type: object
      required: [group_by, start_ts, end_ts]
      properties:
        group_by:
          type: string
          description: "Field name to group by (e.g. 'source_ip', 'level')."
        start_ts: { type: string, format: date-time }
        end_ts: { type: string, format: date-time }
        bucket_seconds:
          type: integer
          minimum: 1
          maximum: 86400
          default: 60
        filter:
          type: string
          description: "Optional regex to pre-filter events before grouping."
        top_n:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    side_effects: read_only
    archetype_tags: [log_analyst, anomaly_investigator]

  timestamp_window.v1:
    name: timestamp_window
    version: "1"
    description: |
      Convert a relative time expression to absolute ISO-8601 UTC
      timestamps. Examples: 'last 15 minutes' → (start, end), 'past 24h'
      → (start, end). Pure helper, no I/O.
    input_schema:
      type: object
      required: [expression]
      properties:
        expression:
          type: string
          description: "Natural-language relative window (e.g. 'last 15 minutes')."
        anchor:
          type: string
          format: date-time
          description: "Reference point. Defaults to current UTC if omitted."
    side_effects: read_only
    archetype_tags: [log_analyst, network_watcher, anomaly_investigator]

  # ----- anomaly_investigator kit -----------------------------------------
  # NOTE: baseline_compare.v1 and correlation_window.v1 were specced
  # in ADR-0018 but never implemented at v0.1. C-1 dissection
  # (2026-04-30) verdicts:
  #   - baseline_compare.v1   SUBSTITUTED with the pair behavioral_baseline.v1
  #                            + anomaly_score.v1 (already implemented).
  #                            Together they cover the same surface
  #                            (summary stats over event stream + z-score
  #                            deviation) with cleaner separation of
  #                            concerns. Removed from catalog + kits.
  #   - correlation_window.v1 SUBSTITUTED with log_correlate.v1 (already
  #                            implemented in security_mid swarm kits,
  #                            tested in test_b2_tools.py). Identical
  #                            conceptual surface — temporal cross-source
  #                            joins. Removed from catalog + kits.
  # See docs/audits/2026-04-30-c1-zombie-tool-dissection.md.

  # ----- memory subsystem (ADR-0022 v0.1+v0.2) ----------------------------
  memory_recall.v1:
    name: memory_recall
    version: "1"
    description: |
      Read memory the calling agent can see, scoped by `mode`.
      ADR-0022 v0.1+v0.2 + ADR-0027 §1 + ADR-0033.

      mode='private' (default) — owner-only, scope='private'.
      mode='lineage'           — own private+lineage rows + lineage
                                  chain peers' lineage rows. The
                                  chain is auto-computed from
                                  agent_ancestry (ancestors+descendants);
                                  caller can override via lineage_chain.
      mode='consented'         — lineage's set + scope='consented' rows
                                  the reader has an active grant for.
      mode='realm'             — refused; reserved for H3 federation.

      Cross-agent reads (modes other than 'private') count as
      information-flow boundary crossings; the runtime emits
      memory_read on the audit chain when the result includes rows
      owned by an instance other than the caller.
    input_schema:
      type: object
      properties:
        query: {type: string}
        layer:
          type: string
          enum: [episodic, semantic, procedural]
        limit:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
        mode:
          type: string
          enum: [private, lineage, consented]
          default: private
        lineage_chain:
          type: array
          items: {type: string}
          description: |
            Optional override. When omitted in lineage/consented mode,
            the tool walks agent_ancestry to compute the chain.
    side_effects: read_only
    # ADR-0051 T3: needs ctx.memory + ctx.agent_registry (live
    # SQLite handles on the daemon) — can't pickle across a
    # subprocess boundary, so the runtime keeps this in-process
    # regardless of FSF_TOOL_SANDBOX mode.
    sandbox_eligible: false
    archetype_tags: [companion, researcher, investigator, communicator, security_low, security_mid, security_high]

  memory_write.v1:
    name: memory_write
    version: "1"
    description: |
      Append an entry to the calling agent's own memory store.
      Same-agent self-writes only — cross-agent disclosure is a
      separate tool (memory_disclose.v1). The genre's privacy
      ceiling caps the scope: a Companion-genre agent cannot
      write past `private`. side_effects=read_only because the
      write is local-only (registry SQLite) — no network, no host
      filesystem outside the registry, no external service.
    input_schema:
      type: object
      required: [content, layer]
      properties:
        content: {type: string}
        layer:
          type: string
          enum: [episodic, semantic, procedural]
        scope:
          type: string
          enum: [private, lineage, realm, consented]
          default: private
        tags:
          type: array
          items: {type: string}
    side_effects: read_only
    # ADR-0051 T3: writes go through ctx.memory (live SQLite cursor
    # + per-agent write_lock on the daemon). Pickling that handle is
    # impossible; the registry stays single-writer per ADR-0007.
    sandbox_eligible: false
    archetype_tags: [companion, researcher, investigator, communicator]

  memory_disclose.v1:
    name: memory_disclose
    version: "1"
    description: |
      Disclose one of the calling agent's `scope='consented'` memory
      entries to another agent's store. ADR-0022 v0.2 + ADR-0027 §4
      data-minimization rule: the recipient gets a summary string
      and a back-reference to the source entry — NOT the original
      content. Refuses if the source is not owned by the caller, is
      deleted, is at a non-consented scope, or if no active consent
      grant exists for the (source, recipient) pair. Used by the
      Security Swarm (ADR-0033) to escalate findings across tier
      boundaries. side_effects=read_only because the disclosed copy
      lands in the local registry; no network or external system.
    input_schema:
      type: object
      required: [source_entry_id, recipient_instance, summary]
      properties:
        source_entry_id:    {type: string}
        recipient_instance: {type: string}
        summary:            {type: string}
    side_effects: read_only
    # ADR-0051 T3: reads + writes via ctx.memory + ctx.agent_registry,
    # plus emits memory_disclosed via the daemon's audit chain. None
    # of those handles cross a subprocess boundary.
    sandbox_eligible: false
    archetype_tags: [investigator, communicator, security_low, security_mid, security_high]

  delegate.v1:
    name: delegate
    version: "1"
    description: |
      Invoke another agent's skill. ADR-0033 A3 — the swarm
      escalation primitive. Routes the request through the
      pre-bound ctx.delegate callable which loads the target's
      skill manifest, runs it under the target's identity, and
      returns the outcome. Refuses if the target is missing, equals
      the caller, or is not in the caller's lineage chain (unless
      allow_out_of_lineage=true is set, which records the override
      in the audit chain). Each successful delegation appends one
      agent_delegated audit event BEFORE the target's skill runs,
      so a crash mid-skill still leaves the delegation visible.
      side_effects=read_only for the dispatch itself; the target's
      skill may include privileged steps that go through the
      approval queue under the target's own constraints.
    input_schema:
      type: object
      required: [target_instance_id, skill_name, skill_version, reason]
      properties:
        target_instance_id:   {type: string}
        skill_name:           {type: string}
        skill_version:        {type: string}
        inputs:               {type: object}
        reason:               {type: string}
        session_id:           {type: string}
        allow_out_of_lineage: {type: boolean, default: false}
    side_effects: read_only
    # ADR-0051 T3: needs ctx.delegate — a closure built per-dispatch
    # that captures the daemon's registry + audit chain + write_lock.
    # The closure can't survive pickle; delegation MUST run in-process
    # so the target agent's skill executes against the same daemon
    # state machine.
    sandbox_eligible: false
    archetype_tags: [investigator, communicator, security_low, security_mid, security_high]

  # ----- security_low tier (ADR-0033 Phase B1) ----------------------------
  audit_chain_verify.v1:
    name: audit_chain_verify
    version: "1"
    description: |
      Walk the daemon's audit chain JSONL and verify hash links
      end-to-end. Returns ok/broken-at + reason; surfaces unknown
      event types as a forward-compat warning (not a failure).
      Wraps AuditChain.verify; LogLurker's reason to exist.
    input_schema:
      type: object
      properties:
        max_unknown_to_report:
          type: integer
          minimum: 1
          maximum: 1000
          default: 20
    side_effects: read_only
    archetype_tags: [security_low, guardian, observer]

  security_scan.v1:
    name: security_scan
    version: "1"
    description: |
      ADR-0062 supply-chain IoC scanner. Reads
      config/security_iocs.yaml (the version-controlled pattern
      catalog drawn from Shai-Hulud / MCP-STDIO-RCE / LiteLLM /
      Axios incident IOCs) and walks installed plugins, forged
      tools, forged skills, and pyproject.toml for matches.
      Returns structured findings tagged by severity + the
      file:line + an evidence excerpt. Read-only; report-only
      in v1 (install-time gate lands in B250+).
    input_schema:
      type: object
      required: [scan_kind]
      properties:
        scan_kind:
          type: string
          enum: [plugins, forged_tools, forged_skills, pyproject, all]
        scan_paths:
          type: array
          items:
            type: string
        catalog_path:
          type: string
        max_findings:
          type: integer
          minimum: 1
          maximum: 100000
          default: 1000
    side_effects: read_only
    archetype_tags: [security_low, guardian, observer]

  route_to_domain.v1:
    name: route_to_domain
    version: "1"
    description: |
      ADR-0067 T3 cross-domain routing primitive. Consumes the
      output of decompose_intent.v1, emits a domain_routed audit
      event capturing the routing decision, then fires delegate.v1
      to invoke the target agent's skill.

      Gates: target_domain must be in the registry; domain.status
      must be partial/live (planned domains refuse unless
      allow_planned=true, which gets recorded in the audit event).

      Audit shape: emits domain_routed BEFORE the delegate (captures
      the orchestrator's intent independently of the downstream
      delegate outcome), then the downstream delegate emits
      agent_delegated. Audit-chain queries can filter on either
      event_type to distinguish routing decisions from raw
      agent-invocation events.

      Required initiative L3 (mirrors delegate.v1) — reactive
      Companion (L1) can't autonomously route across domains.
      Audit payload PII-safe: intent_hash, never raw intent text.
    input_schema:
      type: object
      required:
        - target_domain
        - target_capability
        - target_instance_id
        - skill_name
        - skill_version
        - intent
        - reason
      properties:
        target_domain: {type: string}
        target_capability: {type: string}
        target_instance_id: {type: string}
        skill_name: {type: string}
        skill_version: {type: string}
        intent: {type: string}
        reason: {type: string}
        inputs: {type: object}
        confidence: {type: number}
        decomposition_seq: {type: integer}
        allow_planned: {type: boolean}
        session_id: {type: string}
        allow_out_of_lineage: {type: boolean}
    side_effects: read_only
    archetype_tags:
      - companion
      - assistant

  decompose_intent.v1:
    name: decompose_intent
    version: "1"
    description: |
      ADR-0067 T2 cross-domain orchestrator decomposer. Reads the
      operator utterance, queries the domain registry
      (config/domains/*.yaml), and uses the local LLM (via
      ctx.provider) to break the utterance into per-domain
      sub-intents with confidence scores.

      Output: list of {intent, domain, capability, confidence,
      status}. status ∈ {routable, ambiguous, no_match,
      planned_domain}. T3's route_to_domain.v1 gates on status —
      only 'routable' sub-intents dispatch.

      Read-only side-effect tier. The decomposition itself is pure
      LLM-call; no state mutation. Audit event records utterance
      HASH (not raw text) + subintent_count + ambiguity_count +
      model, so the audit chain is forensic but doesn't store
      personal utterances verbatim.

      Confidence floor is operator-tunable per call (default 0.6).
      Below-threshold sub-intents surface as 'ambiguous' rather
      than routing to a bad guess.
    input_schema:
      type: object
      required: [utterance]
      properties:
        utterance:
          type: string
        confidence_threshold:
          type: number
        task_kind:
          type: string
    side_effects: read_only
    archetype_tags:
      - companion
      - assistant

  operator_profile_read.v1:
    name: operator_profile_read
    version: "1"
    description: |
      ADR-0068 T1 operator profile primitive. Returns the parsed
      OperatorProfile (operator_id, name, preferred_name, email,
      timezone, locale, work_hours) as a dict so any agent with the
      constitution permission can ask "who is the operator?" without
      re-prompting the human every conversation. Reads from
      data/operator/profile.yaml (or its .enc variant under
      ADR-0050 T5 encryption-at-rest); the dispatcher threads its
      master_key into the tool context so decryption is transparent.

      Audit event captures operator_id + schema_version only (not
      the full PII payload) — the result goes to the agent's
      reasoning but the chain entry stays minimal.

      Every domain agent in the ten-domain platform arc reads this:
      Knowledge Forge needs preferred_name for attribution; Daily
      Life OS needs timezone + work_hours for scheduling; Content
      Studio needs locale for prompt language; Smart Home needs
      operator_id for routing.
    input_schema:
      type: object
      properties: {}
    side_effects: read_only
    archetype_tags:
      - companion
      - researcher
      - communicator
      - guardian
      - observer
      - assistant

  operator_profile_write.v1:
    name: operator_profile_write
    version: "1"
    description: |
      ADR-0068 T2 operator profile mutator. Takes a dotted
      field_path + new_value + reason; atomically updates
      data/operator/profile.yaml (encryption-aware) and emits
      the canonical operator_profile_changed audit event with
      before/after diff + operator-supplied reason.

      side_effects=filesystem + requires_human_approval=True:
      operator-truth changes ALWAYS gate through per-call
      approval. An LLM emitting this without operator presence
      lands in tool_call_pending_approvals; only an operator
      OK promotes it to a real write.

      Supported field_paths at T2: name, preferred_name, email,
      timezone, locale, work_hours.start, work_hours.end.
      Future tranches (T4-T6) extend under the OperatorProfile
      extra slot for trust_circle / voice_samples /
      financial_jurisdiction.

      Re-runs profile_to_ground_truth_seeds after the write and
      surfaces the new seed list in the tool result's metadata
      so the operator can manually trigger Reality Anchor
      reload via POST /reality-anchor/reload.

      No-op semantics: if new_value equals current value, no
      file write and no audit emit — surfaces output.no_op=True.
    input_schema:
      type: object
      properties:
        field_path:
          type: string
          enum:
            - name
            - preferred_name
            - email
            - timezone
            - locale
            - work_hours.start
            - work_hours.end
        new_value:
          type: string
        reason:
          type: string
          minLength: 1
      required:
        - field_path
        - new_value
        - reason
    side_effects: filesystem
    requires_human_approval: true
    archetype_tags:
      - assistant
      - operator_steward

  personal_recall.v1:
    name: personal_recall
    version: "1"
    description: |
      ADR-0076 T4 hybrid retrieval over the operator's personal-
      context PersonalIndex. Returns top-k hits via Reciprocal
      Rank Fusion over BM25 lexical + cosine semantic rankings.

      Genre-gated to {companion, assistant, operator_steward,
      domain_orchestrator}. Other genres get tool_call_rejected
      at validate-time.

      Indexes ONLY scope='personal' memory rows — the agent-
      private surface stays out of the vector index by design
      (B313 + B320). Memory.append's indexer hook lands new
      personal-scope writes asynchronously; queries see them
      within ms-to-seconds of the write.

      mode='hybrid' (default) — RRF over BM25 + cosine. Best
      for natural-language operator queries.
      mode='cosine'           — pure semantic. Best for
      paraphrase / synonym matching.
      mode='bm25'             — pure lexical. Best for exact
      phrases / proper nouns / numbers.

      Refuses with substrate_unwired when ctx.personal_index is
      None (operator hasn't enabled FSF_PERSONAL_INDEX_ENABLED).

      The audit_payload records query_hash (NOT the raw query) +
      mode + limit + hit_count. Operator privacy: what the
      operator searched for never lands on the chain in plaintext.
    input_schema:
      type: object
      properties:
        query:
          type: string
          minLength: 1
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        mode:
          type: string
          enum: [hybrid, cosine, bm25]
          default: hybrid
      required:
        - query
    side_effects: read_only
    archetype_tags:
      - companion
      - assistant
      - operator_steward
      - domain_orchestrator

  verify_claim.v1:
    name: verify_claim
    version: "1"
    description: |
      ADR-0063 Reality Anchor verifier. Pattern-matches a claim
      against config/ground_truth.yaml (the operator-asserted
      ground-truth catalog). Returns verdict ∈ {confirmed,
      contradicted, unknown, not_in_scope} + per-fact
      citations (which fact matched, on which canonical or
      forbidden term, in which domain). Read-only;
      lightweight (no LLM in v1; ms-scale). The
      RealityAnchorStep in the governance pipeline (B252)
      consumes this on every gated dispatch.
    input_schema:
      type: object
      required: [claim]
      properties:
        claim:
          type: string
        fact_ids:
          type: array
          items: {type: string}
        agent_constitution:
          type: object
        catalog_path:
          type: string
    side_effects: read_only
    archetype_tags: [verifier, guardian, observer, security_low]

  schedule_reminder.v1:
    name: schedule_reminder
    version: "1"
    description: |
      ADR-0087 Phase B — D2 Daily Life OS reminder substrate.
      Appends a reminder record to data/d2/reminders.jsonl with
      fire_at + channel + message. Filesystem side-effect;
      ``filesystem_always_human_approval`` gates each creation
      so the operator approves before any reminder lands in the
      ledger. The fire itself runs unattended when a future
      forest-mail / forest-slack / desktop-notification connector
      picks the record up. Time_steward (actuator, YELLOW posture)
      is the primary consumer.
    input_schema:
      type: object
      required: [fire_at, message]
      properties:
        fire_at:
          type: string
          description: "ISO-8601 timestamp when the reminder fires. Must be in the future."
        message:
          type: string
          description: "Reminder text (1-2000 chars)."
        channel:
          type: string
          enum: [memory, email, slack, desktop, audit]
          default: memory
          description: "Delivery surface. 'memory' always works without external connectors."
        reminders_path:
          type: string
          description: "Override ledger path (tests; production omits)."
    side_effects: filesystem
    archetype_tags: [time_steward]

  calendar_block.v1:
    name: calendar_block
    version: "1"
    description: |
      ADR-0087 Phase B — D2 Daily Life OS calendar surface.
      Queues create / decline / cancel requests for the
      forest-calendar connector via data/d2/calendar_queue.jsonl.
      side_effects=external + every call operator-gated via the
      ``external_always_human_approval`` rule (load-bearing
      regardless of agent posture). Refuses cleanly when the
      forest-calendar connector is absent (graceful degradation
      per ADR-0086 Decision 4 pattern). Time_steward is the only
      role with this in its kit.
    input_schema:
      type: object
      required: [operation]
      properties:
        operation:
          type: string
          enum: [create, decline, cancel]
        start:
          type: string
          description: "ISO-8601 start timestamp (required for create)."
        end:
          type: string
          description: "ISO-8601 end timestamp (required for create; must be after start)."
        subject:
          type: string
          description: "Event title (required for create; max 500 chars)."
        body:
          type: string
          description: "Event description / agenda (optional; max 5000 chars)."
        attendees:
          type: array
          items: {type: string}
          description: "Email addresses (optional; max 50)."
        event_id:
          type: string
          description: "Required for decline / cancel."
        decline_message:
          type: string
          description: "Optional polite decline text (max 5000 chars)."
        queue_path:
          type: string
          description: "Override queue ledger (tests; production omits)."
        assume_connector:
          type: boolean
          description: "Tests bypass the connector-marker presence check; production omits."
    side_effects: external
    archetype_tags: [time_steward]

  decision_journal_compile.v1:
    name: decision_journal_compile
    version: "1"
    description: |
      ADR-0087 Phase D — D2 Daily Life OS decision-journal
      compiler. Walks the audit chain over a window (default 24h)
      and buckets operator-decision events, deferred / open items,
      and recurring-topic patterns. Read-only end-to-end; the
      ``daily_reflection.v1`` skill wraps this with chain-integrity
      verification + memory_write of the final attestation.
      The reflector role is the primary consumer.
    input_schema:
      type: object
      properties:
        window_hours:
          type: integer
          minimum: 1
          maximum: 720
          default: 24
        audit_chain_path:
          type: string
    side_effects: read_only
    archetype_tags: [reflector]

  task_rank.v1:
    name: task_rank
    version: "1"
    description: |
      ADR-0087 Phase C — D2 Daily Life OS task ranker.
      Deterministic urgency / impact / effort scoring over an
      operator-provided task list, with optional operator-profile
      areas_of_focus bonus. Read-only. The composite score is
      ``urgency_weight * urgency + impact_weight * impact -
      effort_weight * effort + focus_bonus``. Default weights
      (1.2 / 1.5 / 0.5) bias toward high-impact + cheap; operators
      can override per-call. Deterministic so the operator can
      audit + replay the ranking — LLM-driven ranking is opaque
      and unrepeatable; the task_prioritization.v1 skill layers
      LLM narrative on top via llm_think.
    input_schema:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: object
            required: [title]
            properties:
              title: {type: string}
              urgency: {type: number, minimum: 0, maximum: 10}
              impact:  {type: number, minimum: 0, maximum: 10}
              effort:  {type: number, minimum: 0, maximum: 10}
              due_in_hours: {type: number, minimum: 0}
              tags: {type: array, items: {type: string}}
        weights:
          type: object
          properties:
            urgency: {type: number, minimum: 0}
            impact:  {type: number, minimum: 0}
            effort:  {type: number, minimum: 0}
        areas_of_focus:
          type: array
          items: {type: string}
        focus_bonus:
          type: number
          minimum: 0
    side_effects: read_only
    archetype_tags: [task_prioritizer]

  daily_knowledge_delta.v1:
    name: daily_knowledge_delta
    version: "1"
    description: |
      ADR-0086 Phase D daily-knowledge-delta builder. Walks the
      audit chain over an operator-named window (default 24h)
      and buckets D1-relevant memory writes by topic into three
      families: catalog_writes (librarian), prospector_pulls
      (prospector inbox), contradiction_flags (knowledge_verifier
      escalations). Returns a structured delta + per-family
      summary counts. Read-only; synthesizer's primary
      daily-sweep tool. The skill persists the delta artifact
      via memory_write at its own attestation step.
    input_schema:
      type: object
      properties:
        window_hours:
          type: integer
          minimum: 1
          maximum: 720
        audit_chain_path:
          type: string
        topic_filter:
          type: string
          pattern: "^[a-z0-9-]*$"
    side_effects: read_only
    archetype_tags: [synthesizer, researcher]

  knowledge_contradiction_scan.v1:
    name: knowledge_contradiction_scan
    version: "1"
    description: |
      ADR-0086 Phase C single-agent contradiction scanner. Walks
      the calling agent's private + lineage memory for
      contradictions on a topic; uses an explicit-flag pass
      (Relationship: contradicts/potential_contradiction in
      catalog blocks, confidence 1.0) plus a lexical-cue pass
      (opposite-pair words + negation flips, confidence 0.4).
      Returns a candidate-pair list with per-pair confidence;
      caller's skill writes the actual flag via
      memory_flag_contradiction.v1. Read-only. Cross-agent
      scope deferred to v0.4 per ADR-0086 Decision 3 —
      scope='cross_agent' raises ToolValidationError until then.
    input_schema:
      type: object
      required: [topic_slug]
      properties:
        topic_slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        agent_role:
          type: string
        window_days:
          type: integer
          minimum: 1
          maximum: 730
        audit_chain_path:
          type: string
        min_confidence:
          type: number
          minimum: 0.0
          maximum: 1.0
        scope:
          type: string
          enum: [single_agent]
    side_effects: read_only
    archetype_tags: [knowledge_verifier, guardian]

  topic_genealogy_build.v1:
    name: topic_genealogy_build
    version: "1"
    description: |
      ADR-0086 Phase B topic-graph builder. Walks memory entries
      tagged topic:<slug> via the audit chain, derives edges
      between them from the catalog block's Relationship: field
      (refines / confirms / potential_contradiction) with a
      temporal-ordering fallback, and returns a structured graph
      (nodes + edges) the synthesizer's skill persists via
      memory_write. Read-only; synthesizer is the primary
      consumer.
    input_schema:
      type: object
      required: [topic_slug]
      properties:
        topic_slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        window_days:
          type: integer
          minimum: 1
          maximum: 730
        audit_chain_path:
          type: string
        max_entries:
          type: integer
          minimum: 1
          maximum: 5000
    side_effects: read_only
    archetype_tags: [synthesizer, researcher]

  audit_packet_generate.v1:
    name: audit_packet_generate
    version: "1"
    description: |
      ADR-0085 Phase D audit packet builder. Walks the audit
      chain within a time window, buckets entries tagged
      framework:<framework_id> by family (scan reports, evidence,
      archives, remediations), bundles them with per-control
      summaries pulled from the framework yaml, and returns a
      single packet with a sha256 over its body. Read-only;
      report_generator's primary tool. The 30-second-audit-packet
      value-prop deliverable.
    input_schema:
      type: object
      required: [framework_id]
      properties:
        framework_id:
          type: string
          pattern: "^[a-zA-Z0-9_]+$"
        window_days:
          type: integer
          minimum: 1
          maximum: 730
        framework_dir:
          type: string
        audit_chain_path:
          type: string
    side_effects: read_only
    archetype_tags: [report_generator, researcher]

  policy_lint.v1:
    name: policy_lint
    version: "1"
    description: |
      ADR-0085 Phase C compliance policy linter. Reads operator
      config files + a framework's lint_rules section, evaluates
      content-level rules (yaml_key_required, yaml_key_forbidden,
      file_max_age_days), emits findings + proposed remediation
      text. Does NOT apply remediations — policy_enforcer (YELLOW)
      consumes the proposals + surfaces them for operator approval.
      Read-only; policy_enforcer is the primary consumer.
    input_schema:
      type: object
      required: [framework_id, target_paths]
      properties:
        framework_id:
          type: string
          pattern: "^[a-zA-Z0-9_]+$"
        target_paths:
          type: array
          items: {type: string}
          minItems: 1
          maxItems: 100
        framework_dir:
          type: string
        rule_ids:
          type: array
          items: {type: string}
    side_effects: read_only
    archetype_tags: [policy_enforcer, actuator]

  framework_check.v1:
    name: framework_check
    version: "1"
    description: |
      ADR-0085 Phase B compliance rule evaluator. Loads a
      framework YAML from config/compliance_frameworks/ and
      evaluates each rule against the live system. Rule kinds:
      required_file (paths must exist), forbidden_pattern (regex
      must not match), required_attestation (memory entry tagged
      <tag> within window), audit_event_required (audit chain
      entry of <event_type> within window). Returns per-rule
      verdicts + control-level aggregates. Read-only;
      compliance_scanner consumes via compliance_scan.v1.
    input_schema:
      type: object
      required: [framework_id]
      properties:
        framework_id:
          type: string
          pattern: "^[a-zA-Z0-9_]+$"
        framework_dir:
          type: string
        audit_chain_path:
          type: string
        control_ids:
          type: array
          items: {type: string}
    side_effects: read_only
    archetype_tags: [compliance_scanner, guardian]

  file_integrity.v1:
    name: file_integrity
    version: "1"
    description: |
      sha256 a list of operator-named paths (files or directories);
      optionally diff against a baseline {path: digest} dict.
      Symlinks are NOT followed — they're recorded as
      'symlink:<target>' so the algorithm doesn't get tricked by
      planted symlinks. Capped at 5000 files / 256 MiB per file
      per call. Used by PatchPatrol + LogLurker for daily sweeps.
    input_schema:
      type: object
      required: [paths]
      properties:
        paths:
          type: array
          items: {type: string}
          minItems: 1
          maxItems: 200
        mode:
          type: string
          enum: [snapshot, diff]
          default: snapshot
        baseline:
          type: object
          description: "Required when mode='diff'; ignored otherwise."
    side_effects: read_only
    archetype_tags: [security_low, security_high, guardian]

  log_scan.v1:
    name: log_scan
    version: "1"
    description: |
      Regex/pattern scan over a list of files or directories. Walks
      directories recursively; never follows symlinks. Refuses
      catastrophic-backtracking patterns at validation time.
      Returns matches with optional surrounding context lines, capped
      at max_matches (default 500). LogLurker's primary surface.
    input_schema:
      type: object
      required: [paths, pattern]
      properties:
        paths:
          type: array
          items: {type: string}
          minItems: 1
          maxItems: 200
        pattern:
          type: string
          maxLength: 256
        flags:
          type: array
          items:
            type: string
            enum: [IGNORECASE, DOTALL, MULTILINE, VERBOSE]
        context_lines:
          type: integer
          minimum: 0
          maximum: 5
          default: 0
        max_matches:
          type: integer
          minimum: 1
          maximum: 5000
          default: 500
    side_effects: read_only
    archetype_tags: [security_low, observer, investigator]

  log_aggregate.v1:
    name: log_aggregate
    version: "1"
    description: |
      Combine multiple log files into one timestamp-sorted view,
      normalizing common timestamp formats (ISO 8601, syslog,
      apache-common, unix epoch) to ISO 8601 UTC. Untimestamped
      lines float to the head of the output rather than being
      silently dropped. Caps: 50 files, 64 MiB per file, 10000
      lines out (operator-tunable up to 50000). Feeds AnomalyAce.
    input_schema:
      type: object
      required: [paths]
      properties:
        paths:
          type: array
          items: {type: string}
          minItems: 1
          maxItems: 50
        max_lines_out:
          type: integer
          minimum: 1
          maximum: 50000
          default: 10000
    side_effects: read_only
    archetype_tags: [security_low, observer, investigator]

  # ----- security_low OS-shellout tools (ADR-0033 Phase B1) ---------------
  patch_check.v1:
    name: patch_check
    version: "1"
    description: |
      Probe installed package managers (brew, softwareupdate, apt,
      dnf) for pending updates. Each backend runs only if its
      binary exists on PATH; missing ones surface in
      backends_skipped. Per-backend timeout 30s; query-only
      subcommands. PatchPatrol's daily sweep.
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [brew, softwareupdate, apt, dnf]
    side_effects: read_only
    archetype_tags: [security_low, guardian]

  software_inventory.v1:
    name: software_inventory
    version: "1"
    description: |
      Inventory installed apps + packages via macos_apps (walk
      /Applications), brew (formulae+casks), dpkg (Debian), rpm
      (RPM). Each backend conditional on binary availability.
      Cap: 5000 entries. PatchPatrol baselines with this so
      file_integrity has a known surface to diff.
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [macos_apps, brew, dpkg, rpm]
    side_effects: read_only
    archetype_tags: [security_low, guardian]

  port_policy_audit.v1:
    name: port_policy_audit
    version: "1"
    description: |
      Read-only enumeration of listening TCP+UDP ports via lsof
      (macOS/BSD), ss (Linux preferred), or netstat (Linux fallback).
      Tries backends in order; first one whose binary exists wins.
      Cap: 1000 listeners. Gatekeeper's primary surface for
      "what's accepting inbound on this machine?"
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [lsof, ss, netstat]
    side_effects: read_only
    archetype_tags: [security_low, observer]

  usb_device_audit.v1:
    name: usb_device_audit
    version: "1"
    description: |
      Snapshot the USB device tree via system_profiler (macOS
      JSON tree) or lsusb (Linux text). Vendor/product IDs
      normalized to 0xXXXX so baseline diffs don't trigger on
      format drift. Cap: 500 devices. Gatekeeper diffs against
      a known-good baseline to catch unauthorized inserts.
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [system_profiler, lsusb]
    side_effects: read_only
    archetype_tags: [security_low, observer]

  # ----- security_mid analytics (ADR-0033 Phase B2) -----------------------
  behavioral_baseline.v1:
    name: behavioral_baseline
    version: "1"
    description: |
      Compute summary stats (categorical frequency tables, numeric
      mean/stddev/min/max, timestamp bucket distributions) over a
      list of events. Output shape is consumed directly by
      anomaly_score.v1 — they're a designed pair. AnomalyAce calls
      this on a healthy window and persists the result via
      memory_write at scope='lineage' so the next sweep can score
      against it.
    input_schema:
      type: object
      required: [events, fields]
      properties:
        events:
          type: array
          items: {type: object}
          maxItems: 100000
        fields:
          type: object
          description: |
            map of {field_name: {type: categorical|numeric|timestamp,
            top_n?, buckets?}}
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  anomaly_score.v1:
    name: anomaly_score
    version: "1"
    description: |
      Score a window of events against a baseline emitted by
      behavioral_baseline.v1. Per-field: categorical → novelty
      score (1.0 if value never seen, else 1/(1+log10(1+count))) +
      max-per-row aggregate; numeric → max |z-score| against
      baseline mean+stddev (cap at 100 when stddev=0); timestamp →
      chi-square-ish divergence between bucket distributions.
      Returns a single overall score (max of per-field) for skills
      that need one number to threshold against.
    input_schema:
      type: object
      required: [events, baseline]
      properties:
        events:
          type: array
          items: {type: object}
          maxItems: 100000
        baseline: {type: object}
        fields:
          type: array
          items: {type: string}
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  log_correlate.v1:
    name: log_correlate
    version: "1"
    description: |
      Cross-source join over normalized log streams. Group events
      by an extracted key — either a dict field (key.field) or the
      first capturing group of a regex against a text field
      (key.regex + key.field). Returns groups sorted by event
      count, each with earliest/latest timestamps, distinct sources,
      and a capped sample of the matched events. Caps: 500 groups,
      50 events per group (operator-tunable up to 10000 each).
    input_schema:
      type: object
      required: [events, key]
      properties:
        events:
          type: array
          items: {type: object}
          maxItems: 100000
        key:
          type: object
          description: |
            {field: <name>} OR {regex: <pat>, field: <text-field>}
        max_groups:
          type: integer
          minimum: 1
          maximum: 10000
          default: 500
        max_per_group:
          type: integer
          minimum: 1
          maximum: 10000
          default: 50
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  lateral_movement_detect.v1:
    name: lateral_movement_detect
    version: "1"
    description: |
      Graph analysis over connection tuples. Given a list of
      (src, dst[, port]) records, surface lateral-movement-shaped
      patterns: fan_out (sources reaching many dsts), fan_in
      (dsts receiving from many srcs), new_edges (against an
      optional baseline_edges list), distinct_ports (a single
      src→dst pair touching many ports = port scan signature).
      Each pattern reports triggering nodes/edges with capped
      examples. Used by NetNinja over flow records.
    input_schema:
      type: object
      required: [edges]
      properties:
        edges:
          type: array
          items: {type: object}
          maxItems: 100000
        baseline_edges:
          type: array
          items: {type: object}
          maxItems: 100000
        thresholds:
          type: object
          properties:
            fan_out_min:        {type: integer, minimum: 1, default: 10}
            fan_in_min:         {type: integer, minimum: 1, default: 10}
            distinct_ports_min: {type: integer, minimum: 1, default: 20}
        max_examples:
          type: integer
          minimum: 1
          maximum: 1000
          default: 25
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  ueba_track.v1:
    name: ueba_track
    version: "1"
    description: |
      Per-user behavioral fingerprint over time. Partition events
      by (user, sliding-window) and emit per-user stats: event
      count, top values per feature, distinct-value counts. Window
      sizes: hour | day | week. Pairs with anomaly_score for
      "compare last hour to rolling N-hours baseline" detection.
      Used by AnomalyAce + Investigator.
    input_schema:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items: {type: object}
          maxItems: 100000
        features:
          type: array
          items: {type: string}
        window:
          type: string
          enum: [hour, day, week]
          default: hour
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  port_scan_local.v1:
    name: port_scan_local
    version: "1"
    description: |
      Active TCP/UDP probe against the loopback interface ONLY
      (127.0.0.1, ::1, localhost). Non-loopback targets refused at
      validation time. Caps: 1024 ports per call, 0.5s per-port
      timeout, 100 ports/sec sweep rate. Useful for finding
      services that listen but weren't surfaced by read-only
      port_policy_audit (different namespace, restricted /proc
      visibility). UDP results are inherently ambiguous —
      "filtered_or_open" is the standard UDP-scan caveat.
    input_schema:
      type: object
      properties:
        target:
          type: string
          enum: ["127.0.0.1", "::1", "localhost"]
          default: "127.0.0.1"
        ports:
          type: array
          items: {type: integer, minimum: 1, maximum: 65535}
          maxItems: 1024
        port_range:
          type: object
          properties:
            start: {type: integer, minimum: 1, maximum: 65535}
            end:   {type: integer, minimum: 1, maximum: 65535}
        proto:
          type: string
          enum: [tcp, udp]
          default: tcp
    side_effects: network
    archetype_tags: [security_mid, investigator]

  traffic_flow_local.v1:
    name: traffic_flow_local
    version: "1"
    description: |
      Snapshot the OS connection table (all states, not just LISTEN).
      Backends: lsof (macOS/BSD) or ss (Linux); first available wins.
      Output records {src, dst, src_port, dst_port, proto, state, pid,
      command, user} feed lateral_movement_detect directly. TIME_WAIT
      entries dropped by default (operator-tunable via include_timewait).
      Cap: 5000 flows.
    input_schema:
      type: object
      properties:
        backends:
          type: array
          items:
            type: string
            enum: [lsof, ss]
        include_timewait:
          type: boolean
          default: false
    side_effects: read_only
    archetype_tags: [security_mid, investigator]

  evidence_collect.v1:
    name: evidence_collect
    version: "1"
    description: |
      Forensic snapshot to a tar.gz archive. Captures: ps output,
      listening ports, current flow table, and per-PID detail
      (cmdline, environ, status, cwd, open FDs on Linux; ps + lsof
      on macOS) for each PID the operator names. Manifest.json
      indexes the archive. Tarball lands in the daemon's
      evidence_dir; output returns path + sha256 + file list.
      ResponseRogue runs this BEFORE isolate_process so the
      process state is captured while still alive.
    input_schema:
      type: object
      properties:
        pids:
          type: array
          items: {type: integer, minimum: 2}
          maxItems: 50
        label:
          type: string
          maxLength: 64
    side_effects: read_only
    archetype_tags: [security_mid, guardian]

  triage.v1:
    name: triage
    version: "1"
    description: |
      LLM-driven structured triage of an alert. Operator supplies
      the alert + a list of {label, prompt} diagnostic questions
      (e.g. "is_lateral", "is_known_actor"); the tool calls the
      bound provider once per question, then runs a final
      classification call returning {severity, summary,
      recommended_action} as JSON. Severity scored 0..1
      (low=0.25, medium=0.5, high=0.75, critical=1.0). Falls back
      to medium severity (with a fallback flag) when no provider
      is wired or the model output can't be parsed — caller
      always gets a usable verdict. Caps: 10 questions, 600 chars
      per prompt, 60s total timeout.
    input_schema:
      type: object
      required: [alert, questions]
      properties:
        alert:
          type: string
          maxLength: 4000
        questions:
          type: array
          maxItems: 10
          items:
            type: object
            required: [label, prompt]
            properties:
              label:  {type: string}
              prompt: {type: string, maxLength: 600}
        context:
          type: object
    side_effects: network
    archetype_tags: [security_mid, investigator]

  isolate_process.v1:
    name: isolate_process
    version: "1"
    description: |
      ResponseRogue's containment primitive — kill a PID via the
      privileged sudo helper at /usr/local/sbin/fsf-priv (Phase A6).
      The helper sends SIGTERM, waits 2s, then SIGKILL if the
      process is still alive. Refuses pid ≤ 1 (kernel/init); reason
      is recorded in the audit chain so operators can review why
      the kill was attempted. side_effects=external means
      security_high gates this regardless of tool config; for
      security_mid agents (ResponseRogue's tier) it gates per the
      tool's own requires_human_approval. Refuses cleanly with
      "PrivClient not wired" when the helper isn't installed —
      operator runs docs/runbooks/sudo-helper-install.md to enable.
    input_schema:
      type: object
      required: [pid, reason]
      properties:
        pid:
          type: integer
          minimum: 2
        reason:
          type: string
          maxLength: 256
    side_effects: external
    # Note: side_effects=external automatically gates requires_human_approval
    # via tool_policy.py's external_always_human_approval rule — no extra
    # constraint needed in YAML. The constitution build process picks it up.
    archetype_tags: [security_mid, guardian]

  # ----- security_high posture + verification (ADR-0033 Phase B3) ---------
  posture_check.v1:
    name: posture_check
    version: "1"
    description: |
      Read-only host security posture probe. Runs a list of OS-
      specific queries (macOS: csrutil, fdesetup, spctl, pfctl,
      defaults read alf; Linux: getenforce, aa-status, ufw,
      cryptsetup) and aggregates per-check {state, severity}
      records into one overall_severity. Probes that hit a
      missing binary land in checks_skipped — operators can
      tell "no info" from "bad info." Per-check warn-state
      severities are operator-tunable via severity_overrides.
      Used by SecOpsSentinel as the ground-truth probe before
      JIT access grants and by ContinuousVerify as the input
      snapshot for drift detection. Timeout: 10s per probe.
    input_schema:
      type: object
      properties:
        checks:
          type: array
          items: {type: string}
          maxItems: 20
        severity_overrides:
          type: object
          description: |
            map of {check_name: severity}; severity is one of
            low/medium/high/critical
    side_effects: read_only
    archetype_tags: [security_high, guardian]

  continuous_verify.v1:
    name: continuous_verify
    version: "1"
    description: |
      Pure-Python composer: diffs a current posture snapshot
      against a baseline (typically the prior call written to
      memory at scope='lineage') and emits drift records:
      checks_added (new probes), checks_removed (vanished
      probes), checks_changed (state or severity flip), and
      checks_steady (identical between runs). Verdict is the
      max severity across flagged items — empty diff → low.
      No I/O — caller drives posture_check + memory before
      handing the snapshots in. Used by SecOpsSentinel on a
      cadence to surface posture drift between sweeps.
    input_schema:
      type: object
      required: [current]
      properties:
        current:  {type: object}
        baseline: {type: object}
        escalate_on_missing:
          type: boolean
          default: false
    side_effects: read_only
    archetype_tags: [security_high, investigator]

  jit_access.v1:
    name: jit_access
    version: "1"
    description: |
      Issue a time-bounded access grant — the grant IS the
      audit event. The runtime hashes (principal, scope,
      ttl_seconds, reason, granted_at, expires_at) into the
      tool_invoked chain entry; downstream skills query the
      chain (or memory snapshot) for the latest grant matching
      (principal, scope) and compare expires_at to now.
      side_effects=external auto-triggers human approval per
      tool_policy's external_always_human_approval rule —
      every grant goes through the operator queue. Caps:
      ttl_seconds ≤ 86400 (24h), reason ≤ 256 chars, scope is
      URL-safe-ish. One grant per call (no batch issuance —
      operator approval per grant is the design intent).
    input_schema:
      type: object
      required: [principal, scope, ttl_seconds, reason]
      properties:
        principal:   {type: string, maxLength: 64}
        scope:       {type: string, maxLength: 64}
        ttl_seconds: {type: integer, minimum: 1, maximum: 86400}
        reason:      {type: string, maxLength: 256}
    side_effects: external
    archetype_tags: [security_high, guardian]

  key_inventory.v1:
    name: key_inventory
    version: "1"
    description: |
      Enumerate cryptographic key material on the host —
      paths + sizes + mtimes + counts ONLY, never the bytes.
      Categories: keychain (macOS, file paths via ``security
      list-keychains``; never dump-keychain), ssh (~/.ssh
      private keys with perms-warning, public keys, line
      counts for authorized_keys + known_hosts), signing
      (~/.gnupg file enumeration without invoking gpg).
      Drift between successive runs is the high-value signal
      — KeyKeeper composes this with memory_recall +
      continuous_verify to surface a new private key that
      wasn't there yesterday. Refuses paths outside the
      caller's HOME + standard system keychain locations.
      Timeout: 10s for shellouts.
    input_schema:
      type: object
      properties:
        categories:
          type: array
          items: {type: string, enum: [keychain, ssh, signing]}
          maxItems: 3
        home_dir:
          type: string
    side_effects: read_only
    archetype_tags: [security_high, observer]

  dynamic_policy.v1:
    name: dynamic_policy
    version: "1"
    description: |
      Apply or revoke a transient firewall rule via the
      Phase A6 sudo helper (PrivClient.pf_add / pf_drop).
      Operations: add (anchor + rule body) and drop (anchor
      only). Refuses op=drop with a rule arg to keep the
      audit log unambiguous. Refuses cleanly with "no
      PrivClient wired" when the helper isn't installed or
      FSF_ENABLE_PRIV_CLIENT is false. side_effects=external
      auto-triggers human approval per tool_policy. The TTL
      is operator-promised — the tool does NOT schedule a
      teardown; the playbook is to record the grant in the
      audit chain and call again with op=drop when the timer
      fires, keeping every change as one tool call → one
      audit entry. Used by ResponseRogue + SecOpsSentinel.
    input_schema:
      type: object
      required: [op, anchor, reason]
      properties:
        op:
          type: string
          enum: [add, drop]
        anchor: {type: string, maxLength: 64}
        rule:   {type: string, maxLength: 256}
        reason: {type: string, maxLength: 256}
    side_effects: external
    archetype_tags: [security_high, guardian]

  tamper_detect.v1:
    name: tamper_detect
    version: "1"
    description: |
      Two complementary integrity signals: (1) canary file
      digests vs an operator-supplied baseline, classified
      ok / mismatch / new / vanished / error per file —
      vanished is the highest-severity signal because it
      implies attempted cleanup; (2) optional macOS SIP probe
      via the helper's read-protected op, which answers "can
      the helper still read this SIP-protected file?". The
      canary scan is filesystem (read-only); SIP probe is
      privileged. Both refuse cleanly when their preconditions
      aren't met (SIP on Linux → skipped; SIP without
      PrivClient → skipped). Verdict: vanished or failed SIP
      probe → critical; mismatch → warn; otherwise ok. Output
      composes with continuous_verify so a skill can persist
      the digest map to memory and detect drift across sweeps.
      Cap: 50 canaries per call, 10 MiB per file.
    input_schema:
      type: object
      required: [canaries]
      properties:
        canaries:
          type: array
          items: {type: string}
          maxItems: 50
        baseline_digests: {type: object}
        probe_sip:        {type: boolean, default: false}
        sip_paths:
          type: array
          items: {type: string}
    side_effects: filesystem
    archetype_tags: [security_high, investigator]

  canary_token.v1:
    name: canary_token
    version: "1"
    description: |
      Plant + check honeytokens with dual signals — atime
      drift (read access) AND content-hash (modification).
      Either signal is a finding; together they cover the
      full set of "someone interacted with this token" cases.
      Operations: plant (write decoy files, record baseline
      hash + atime + size) and check (re-stat + re-hash
      against baseline; classify untouched / accessed /
      modified / vanished / error per token). atime tracking
      degraded? per-token atime_capability='unavailable' so
      operator knows the token falls back to hash-only
      detection. Default token body is a recognisable
      FSF-CANARY-DO-NOT-USE banner + random ID so analysts
      seeing it in egress immediately know it's a planted
      decoy. Verdict: vanished or modified → critical;
      accessed → warn. Caps: 50 tokens, 4 KiB content per
      token, 4 MiB re-hash cap.
    input_schema:
      type: object
      required: [op, tokens]
      properties:
        op:
          type: string
          enum: [plant, check]
        tokens:
          type: array
          maxItems: 50
          items:
            type: object
            required: [path]
            properties:
              path:    {type: string}
              content: {type: string}
              label:   {type: string}
        baseline:
          type: object
          description: "required for op=check; map of path → {hash, atime_unix, size}"
        atime_drift_seconds:
          type: integer
          minimum: 0
          default: 0
    side_effects: filesystem
    archetype_tags: [security_high, guardian]

  honeypot_local.v1:
    name: honeypot_local
    version: "1"
    description: |
      Bind a TCP listener on a chosen high port (default
      loopback-only); accept connections for a bounded
      duration; capture {timestamp, src_ip, src_port,
      banner_sent, bytes_received_preview[:128]} per attempt.
      Any connection to a port that should have nothing on it
      is by definition suspicious — this is the active-recon
      signal. side_effects=network because binding holds the
      port for the window AND the optional banner emits bytes
      to whoever connects. Banner is operator-controlled (no
      default — refuses to mislead operators into thinking
      they have a real service running). Caps: port range
      1024..65535, duration 1..300s, max_connections 1..1000,
      banner ≤ 256 bytes, payload preview truncated at 128
      bytes per connection. Bind to non-loopback host flagged
      in 'skipped' as a confirmation hint to operator.
    input_schema:
      type: object
      required: [port, duration_seconds]
      properties:
        port:
          type: integer
          minimum: 1024
          maximum: 65535
        duration_seconds:
          type: integer
          minimum: 1
          maximum: 300
        banner:    {type: string, maxLength: 256}
        bind_host:
          type: string
          default: "127.0.0.1"
        max_connections:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
    side_effects: network
    archetype_tags: [security_high, observer]

  # ----- ADR-003X open-web tool family --------------------------------------
  web_fetch.v1:
    name: web_fetch
    version: "1"
    description: |
      HTTP GET/POST against a per-agent host allowlist. Optional
      auth via the per-agent secrets store (pass auth_secret_name;
      tool reads via ctx.secrets.get and attaches as Authorization:
      Bearer). The agent's constitution must list allowed_hosts;
      hosts NOT on the list are refused before any network activity.
      Each redirect re-checks the allowlist so a 302 to an off-list
      host fails cleanly. Body is truncated to 32 KB; the metadata
      flags whether truncation happened. Audit captures host +
      method + status — never the body (privacy + noise). Future
      web_researcher / web_actuator genres pull this tool by default.
    input_schema:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: "http or https URL. Host must be in allowed_hosts."
        method:
          type: string
          enum: [GET, POST, HEAD]
          default: GET
        body:
          type: string
          description: "Request body for POST. JSON content gets application/json."
        auth_secret_name:
          type: string
          description: "Name in agent's secrets store; sent as Bearer token."
        timeout_s:
          type: number
          minimum: 0.1
          maximum: 60
          default: 15
    side_effects: network
    archetype_tags: [web_observer, web_researcher, web_actuator]

  suggest_agent.v1:
    name: suggest_agent
    version: "1"
    description: |
      Operator-facing agent matcher. Given a natural-language task
      description, returns the top-K agents whose role + name fit best.
      v1 ranks via BM25 over (role, agent_name, genre). Future v2 adds
      skill-history weighting once that telemetry is queryable.
      Critical for catalog scaling once Phase I lands ~30 new role
      types — operators can't keep them all in their head.
      Reads from ctx.agent_registry; refuses cleanly if the dispatcher
      wasn't given a registry handle. Read-only side effects.
    input_schema:
      type: object
      required: [task]
      properties:
        task:
          type: string
          description: "Natural-language task description."
        top_k:
          type: integer
          minimum: 1
          maximum: 50
          default: 5
        filter:
          type: object
          properties:
            genre:
              type: string
              description: "Restrict to agents in this genre (e.g. 'observer')."
            status:
              type: string
              description: "Restrict to agents with this status. Default 'active'."
              default: active
    side_effects: read_only
    archetype_tags: [operator_companion, web_researcher]

  mcp_call.v1:
    name: mcp_call
    version: "1"
    description: |
      Call an operator-registered MCP server via stdio JSON-RPC.
      Server registry lives in config/mcp_servers.yaml — operator
      pre-registers each server with binary path + sha256 + allowed
      tool list + side-effect classification. SHA256 verified before
      each launch (typosquat / supply-chain-swap defense). Per-agent
      constitution lists allowed_mcp_servers; per-server config lists
      allowlisted_tools. Optional auth via the per-agent secrets
      store (auth_secret_name → FSF_MCP_AUTH env var on the server
      subprocess). v1 supports stdio: transport only; ws:// + http://
      are future additions. Auto-discovery is explicitly out of scope
      (operator types the config). Result is passthrough from the MCP
      server; isError indicates JSON-RPC-level error vs success.
    input_schema:
      type: object
      required: [server_name, tool_name]
      properties:
        server_name:
          type: string
          description: "Name from config/mcp_servers.yaml; must be in agent's allowed_mcp_servers."
        tool_name:
          type: string
          description: "Tool to call; must be in server's allowlisted_tools."
        args:
          type: object
          description: "Tool-specific arguments. Empty if omitted."
        auth_secret_name:
          type: string
          description: "Name in agent's secrets store; passed as FSF_MCP_AUTH env var."
        timeout_s:
          type: number
          minimum: 0.1
          maximum: 300
          default: 30
    side_effects: external
    archetype_tags: [web_actuator, web_researcher]

  browser_action.v1:
    name: browser_action
    version: "1"
    description: |
      Drive a chromium browser via Playwright through a sequence of
      UI actions (click, type, wait, press, hover, select_option).
      Per-agent host allowlist enforced before navigation AND
      re-checked on every framenavigated event so a redirect to an
      off-list host fails cleanly. Ephemeral browser context per
      call — cookies, localStorage, cache do NOT bleed across
      calls. Headless by default; FSF_BROWSER_HEADFUL=true makes
      it headful for debugging. Optional screenshot saved to
      data/browser_screenshots/<uuid>.png; the path is returned in
      the output. Console messages from the page are captured and
      surfaced. Heaviest of the open-web primitives — requires
      Playwright + chromium (~150 MB binary). Always gated:
      side_effects=external triggers requires_human_approval per
      the constraint resolver. Per-agent constitution must list
      allowed_hosts.
    input_schema:
      type: object
      required: [url]
      properties:
        url: {type: string, format: uri}
        actions:
          type: array
          items:
            type: object
            required: [type]
            properties:
              type: {enum: [click, type, wait, press, hover, select_option]}
              selector: {type: string}
              text: {type: string}
              key: {type: string}
              ms: {type: integer, minimum: 0}
              value: {type: string}
        screenshot: {type: boolean, default: true}
        timeout_ms: {type: integer, minimum: 100, maximum: 60000, default: 5000}
        headful: {type: boolean, default: false}
    side_effects: external
    archetype_tags: [web_actuator]

  memory_verify.v1:
    name: memory_verify
    version: "1"
    description: |
      Promote a memory entry to verified status via an external
      human verifier (Iron Gate equivalent — ADR-003X K1). Layered
      on the existing consent-grant table via the
      'operator:verified' sentinel recipient — no schema bump.
      Verifier_id is the human's identifier (operator handle, public
      key, signing key); recorded in granted_by on the consent row
      and in the memory_verified audit event. Re-verification
      updates the timestamp and clears any prior revocation.
      Verification can be queried via Memory.is_verified(entry_id)
      and revoked via Memory.unmark_verified(entry_id).
      Refuses to verify entries the calling agent can't see (private
      to a different agent).
    input_schema:
      type: object
      required: [entry_id, verifier_id]
      properties:
        entry_id:
          type: string
          description: "ID of the memory entry to verify."
        verifier_id:
          type: string
          description: "Identifier of the human verifier (operator handle, key fingerprint)."
        seal_note:
          type: string
          maxLength: 500
          description: "Optional free-text reason for verification."
    side_effects: filesystem
    archetype_tags: [observer, guardian, security_high]

  pytest_run.v1:
    name: pytest_run
    version: "1"
    description: |
      Run pytest against the agent's allowed_paths. Filesystem-tier
      side_effects (pytest writes .pytest_cache + test fixtures may
      mutate). required_initiative_level L4 — reversible-with-policy
      class per ADR-0021-am §5; SW-track Engineer (Actuator default
      L5) reaches; Reviewer at default L3 must be birthed at ceiling
      L4 to use this tool. Subprocess invocation of `python3 -m
      pytest` (or `pytest` PATH fallback). Default 5-minute timeout
      (test suites take time); max 30 minutes. Output: structured
      pass/fail/skip/error counts + per-failure traceback (capped at
      max_failures_reported with max_failure_lines per failure).
      Selectors arg accepts pytest's full selector syntax.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path to test (file or dir)."
        selectors:
          type: array
          items: {type: string}
          description: "Optional pytest selectors (e.g., '-k expr', '-m mark', test_id)."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 1800
          description: "Subprocess timeout. Default 300 (5 min)."
        max_failures_reported:
          type: integer
          minimum: 0
          maximum: 1000
          description: "Cap on failures with traceback details. Default 50."
        max_failure_lines:
          type: integer
          minimum: 1
          maximum: 500
          description: "Cap on lines per failure traceback. Default 50."
    side_effects: filesystem
    archetype_tags: [actuator, software_engineer]

  ruff_lint.v1:
    name: ruff_lint
    version: "1"
    description: |
      Run the `ruff` linter against the agent's allowed_paths.
      Read-only: lint reports findings; never modifies files. Subprocess
      invocation of `ruff check --output-format json --no-cache`. Pure
      Phase G.1.A programming primitive — gives SW-track agents
      (Architect, Engineer, Reviewer) a stable lint surface for their
      work. Agent-claimed tags include the SW-track triune; other
      genres can include via tools_add. Cap on findings (max_findings,
      default 500) prevents pathological output. 30-second default
      timeout (configurable up to 120s for large monorepos).
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path to lint (file or dir)."
        max_findings:
          type: integer
          minimum: 1
          maximum: 100000
          description: "Cap on findings returned. Default 500."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
          description: "Subprocess timeout. Default 30."
    side_effects: read_only
    archetype_tags: [observer, guardian, researcher, security_low]

  git_log_read.v1:
    name: git_log_read
    version: "1"
    description: |
      Read commit history via `git log`. Read-only: inspects refs and
      commit objects; nothing in the repo is mutated. Subprocess
      invocation of `git -C <path> log --pretty=format:<delim>` with
      ASCII US/RS field+record separators (robust against any
      commit-message content). Per-agent allowed_paths constraint
      gates both the repo path and any paths_filter entries. Output
      includes sha/author/dates/parents/subject/body for each commit;
      capped at max_count (default 50, hard ceiling 500). Phase G.1.A
      programming primitive — gives SW-track Architect / Engineer /
      Reviewer a structured read of repo history before suggesting
      edits.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Path inside a git repo (root or subdir); invoked via `git -C`."
        max_count:
          type: integer
          minimum: 1
          maximum: 500
          description: "Cap on commits returned. Default 50."
        ref:
          type: string
          description: "Ref to start the log from (default HEAD). Must not start with '-'."
        since:
          type: string
          description: "Forwarded as --since=<value> (approxidate accepted)."
        until:
          type: string
          description: "Forwarded as --until=<value> (approxidate accepted)."
        author:
          type: string
          description: "Forwarded as --author=<value> (regex; substring match works)."
        paths_filter:
          type: array
          items: {type: string}
          description: "Path filters (after `--`); each must resolve within allowed_paths."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
          description: "Subprocess timeout. Default 30."
    side_effects: read_only
    archetype_tags: [observer, guardian, researcher, software_engineer]

  git_local_scan.v1:
    name: git_local_scan
    version: "1"
    description: |
      Scan local git checkout against ADR-0084 posture rules. Four
      dimensions: (1) committed-secret detection via ADR-0062 IoC
      catalog v2+ token-prefix patterns + an inline floor of GitHub
      PAT prefixes, SSH/PGP private-key headers, OpenAI sk- tokens,
      and AWS AKIA keys, (2) signed-commit verification on the last
      N commits via `git log --format=%G?` parsing G/B/U/N status
      codes, (3) sync state vs upstream tracking branch (ahead/behind
      counts; read-only, does NOT fetch), (4) .gitignore coverage of
      operator-secret-bearing patterns (.env, *.pem, *.key, id_rsa,
      id_ed25519, .streamlit/secrets.toml, credentials*). Returns
      severity-bucketed findings + ok flag. Designed for the
      WiringSentinel-style scheduled-task pattern: hourly local-git
      posture telemetry without third-party feed dependencies.
      Read-only: subprocess `git ls-files`, `git log`, `git rev-list`,
      `git rev-parse` — all inspection.
    input_schema:
      type: object
      properties:
        repo_path:
          type: string
          description: "Absolute path to repo root. Defaults to agent's first allowed_paths entry."
        max_commits:
          type: integer
          minimum: 1
          maximum: 500
          description: "Recent commits to check for signature status. Default 50."
        max_files:
          type: integer
          minimum: 1
          maximum: 100000
          description: "Cap on tracked files scanned for secrets. Default 5000."
    side_effects: read_only
    archetype_tags: [guardian, observer, security_low, wiring_sentinel, software_engineer]

  git_diff_read.v1:
    name: git_diff_read
    version: "1"
    description: |
      Read structured diffs via `git diff`. Read-only: inspects
      tree/index/working-copy state; never mutates the repo. Three
      modes: `refs` (between two refs), `staged` (--cached), and
      `working` (default; unstaged changes). Subprocess invocation
      of `git -C <path> diff --no-color -M -p [--cached] [refs] [-- paths]`,
      parsed into per-file structures with hunk metadata
      (old_start/new_start/old_count/new_count + body). A second
      invocation with `--numstat` overlays accurate additions/
      deletions and detects binary files. Per-agent allowed_paths
      gates the repo path AND each paths_filter entry. Phase G.1.A
      programming primitive — SW-track Reviewer is the primary
      consumer (diffing a feature branch against main is the
      canonical code-review entry point). Truncation: max_files
      (default 100, ceiling 1000) and max_lines_per_file
      (default 500, ceiling 5000).
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Path inside a git repo (root or subdir); invoked via `git -C`."
        mode:
          type: string
          enum: [refs, staged, working]
          description: "Diff mode. Default 'working'."
        ref_a:
          type: string
          description: "Required when mode='refs'. The 'from' ref. Must not start with '-'."
        ref_b:
          type: string
          description: "Required when mode='refs'. The 'to' ref. Must not start with '-'."
        paths_filter:
          type: array
          items: {type: string}
          description: "Path filters (after `--`); each must resolve within allowed_paths."
        max_files:
          type: integer
          minimum: 1
          maximum: 1000
          description: "Cap on files in output. Default 100."
        max_lines_per_file:
          type: integer
          minimum: 1
          maximum: 5000
          description: "Cap on hunk-body lines per file. Default 500."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
          description: "Subprocess timeout. Default 30."
    side_effects: read_only
    archetype_tags: [observer, guardian, researcher, software_engineer]

  git_blame_read.v1:
    name: git_blame_read
    version: "1"
    description: |
      Per-line blame via `git blame --porcelain`. Read-only: inspects
      commit objects + the file at the requested ref; nothing is
      mutated. Subprocess invocation of `git -C <parent> blame
      --porcelain [-L start,end] <ref> -- <basename>`. The porcelain
      stream is parsed into a flat per-line list (line_no /
      original_line_no / sha / author_name / author_email /
      author_date / summary / content). Per-agent allowed_paths
      gates the file path. Optional line_range narrows the scan
      upstream of max_lines for a precise read of a hot section.
      Phase G.1.A programming primitive — answers 'who last touched
      this specific line, when, in what commit?' for SW-track
      Reviewer + Architect.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path to a file inside a git repo."
        ref:
          type: string
          description: "Commit/branch/tag to blame at. Default HEAD. Must not start with '-'."
        line_range:
          type: array
          items: {type: integer, minimum: 1}
          minItems: 2
          maxItems: 2
          description: "[start, end] (inclusive, 1-indexed). Forwarded as -L start,end."
        max_lines:
          type: integer
          minimum: 1
          maximum: 5000
          description: "Cap on entries returned. Default 500."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
          description: "Subprocess timeout. Default 30."
    side_effects: read_only
    archetype_tags: [observer, guardian, researcher, software_engineer]

  mypy_typecheck.v1:
    name: mypy_typecheck
    version: "1"
    description: |
      Run mypy against the agent's allowed_paths. Read-only: type
      errors are reported; nothing is mutated. Subprocess invocation
      of `python3 -m mypy --no-incremental --show-column-numbers
      --show-error-codes --no-error-summary --no-color-output` so
      no `.mypy_cache` is written (honors the read_only contract).
      Output parsed from mypy's stable text format into structured
      findings (filename / line / column / severity / code /
      message). Optional config_file path (must be within
      allowed_paths). Optional `strict` flag toggles `--strict`.
      60-second default timeout (mypy is slower than ruff because
      whole-program inference). Phase G.1.A primitive — where ruff
      catches style + simple logic, mypy catches the class of bugs
      that come from 'I thought this was a string'. SW-track
      Engineer + Reviewer.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path to typecheck (file or dir)."
        config_file:
          type: string
          description: "Optional mypy config file path; must resolve within allowed_paths."
        strict:
          type: boolean
          description: "Forward --strict. Default false."
        max_findings:
          type: integer
          minimum: 1
          maximum: 10000
          description: "Cap on findings returned. Default 500."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 300
          description: "Subprocess timeout. Default 60."
    side_effects: read_only
    archetype_tags: [actuator, guardian, software_engineer]

  semgrep_scan.v1:
    name: semgrep_scan
    version: "1"
    description: |
      Run semgrep against the agent's allowed_paths. Read-only:
      semgrep reports findings; nothing is mutated. Subprocess
      invocation of semgrep with --json --quiet --no-rewrite-rule-ids
      --disable-version-check --metrics=off. Output parsed from
      semgrep's JSON shape into structured findings (rule_id /
      severity / message / filename / start_line / end_line /
      start_column / end_column / code_snippet). Config can be a
      registry ref ("auto", "p/python", "p/security-audit") or a
      local yaml ruleset path (must resolve within allowed_paths).
      Optional severity_filter narrows to subset of
      {ERROR, WARNING, INFO}. Phase G.1.A primitive — catches the
      class of bugs that come from 'this looks like it could be
      exploited'. SW-track Reviewer (Guardian L3) primary consumer.
    input_schema:
      type: object
      required: [path, config]
      properties:
        path:
          type: string
          description: "File or directory to scan."
        config:
          type: string
          description: "Registry ref ('auto', 'p/python') or yaml path. Must not start with '-'."
        max_findings:
          type: integer
          minimum: 1
          maximum: 10000
          description: "Cap on findings returned. Default 500."
        severity_filter:
          type: array
          items:
            type: string
            enum: [ERROR, WARNING, INFO]
          description: "Subset of severities to keep. Default: all."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 600
          description: "Subprocess timeout. Default 60."
    side_effects: read_only
    archetype_tags: [guardian, security_low, software_engineer]

  tree_sitter_query.v1:
    name: tree_sitter_query
    version: "1"
    description: |
      AST-level structural queries via tree-sitter S-expressions.
      Read-only: parses source files into syntax trees and runs
      queries; nothing is mutated. Where the previous primitives
      operate at line-and-token level, tree_sitter operates at the
      syntax-tree level — answering questions like 'find every
      function definition that calls deprecated_func' or 'find all
      class methods missing docstrings' that are awkward in regex.
      Lazy-imports tree_sitter + tree_sitter_languages so daemon
      boots without the optional dep. Per-agent allowed_paths gates
      both the target path and the file walk in directory mode.
      Languages supported (v1):
      python/javascript/typescript/rust/go/java/c/cpp/ruby/yaml/
      json/bash. SW-track Architect's primary structural-search tool.
    input_schema:
      type: object
      required: [path, query, language]
      properties:
        path:
          type: string
          description: "File or directory to query."
        query:
          type: string
          description: "Tree-sitter S-expression query string."
        language:
          type: string
          enum: [python, javascript, typescript, rust, go, java, c, cpp, ruby, yaml, json, bash]
          description: "Source language."
        max_matches:
          type: integer
          minimum: 1
          maximum: 1000
          description: "Cap on matches returned. Default 100."
        max_files:
          type: integer
          minimum: 1
          maximum: 2000
          description: "Cap on files scanned in directory mode. Default 200."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 300
          description: "Wall-clock budget. Default 30."
    side_effects: read_only
    archetype_tags: [observer, researcher, software_engineer]

  bandit_security_scan.v1:
    name: bandit_security_scan
    version: "1"
    description: |
      Python-specific security linter via bandit. Read-only:
      bandit reports findings; nothing is mutated. Where
      semgrep_scan covers multi-language patterns and arbitrary
      rulesets, bandit is the canonical Python security gate —
      OWASP-aligned rules curated for over a decade catch the
      common Python footguns (pickle, exec, shell=True, weak
      hashing, flask debug=True, hardcoded secrets). Subprocess
      invocation of 'bandit -f json -q [-r] [-l/-ll/-lll]
      [-i/-ii/-iii] [--skip ids]'. Output parsed from bandit's
      JSON shape into structured findings (test_id / test_name /
      severity / confidence / filename / line / message /
      code_snippet / more_info). Optional severity_level and
      confidence_level filters (low/medium/high). Optional
      skip_tests list (B-codes). Phase G.1.A primitive; SW-track
      Reviewer + Guardian-genre security_low consumers.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "File or directory to scan."
        severity_level:
          type: string
          enum: [low, medium, high]
          description: "Minimum severity to report. Default 'low'."
        confidence_level:
          type: string
          enum: [low, medium, high]
          description: "Minimum confidence to report. Default 'low'."
        skip_tests:
          type: array
          items:
            type: string
            pattern: '^B[0-9]{3}$'
          description: "Bandit test IDs to skip (e.g., ['B101', 'B404'])."
        max_findings:
          type: integer
          minimum: 1
          maximum: 10000
          description: "Cap on findings returned. Default 500."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 600
          description: "Subprocess timeout. Default 60."
    side_effects: read_only
    archetype_tags: [guardian, security_low, software_engineer]

  pip_install_isolated.v1:
    name: pip_install_isolated
    version: "1"
    description: |
      Install packages into an isolated venv. Filesystem-tier
      side_effects (writes to venv site-packages + pip cache).
      required_initiative_level L4 (reversible-with-policy per
      ADR-0021-am §5). The only ACTUATOR in the G.1.A batch — the
      gateway tool for any agent-driven dependency change. Where
      the rest of G.1.A are read_only inspection tools, this is
      what completes the change loop after code_edit + pytest_run
      reveals a missing dependency. SW-track Engineer (Actuator
      default L5) reaches autonomously; Reviewer (Guardian L3) does
      NOT — must be deliberately birthed at ceiling L4 to use this.
      Companion (L1) refused at the dispatcher.

      Refuses to CREATE venvs (existing-only) — that's a separate
      primitive. Each package spec validated against PEP-503-ish
      grammar OR the VCS form 'name @ git+https://...' before being
      passed to pip. 5-min default timeout, 30-min ceiling.
    input_schema:
      type: object
      required: [venv_path, packages]
      properties:
        venv_path:
          type: string
          description: "Existing venv directory; must resolve within allowed_paths."
        packages:
          type: array
          items: {type: string}
          minItems: 1
          description: "Package specs (PEP-503 form or VCS form)."
        upgrade:
          type: boolean
          description: "Forward --upgrade. Default false."
        no_deps:
          type: boolean
          description: "Forward --no-deps. Default false."
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 1800
          description: "Subprocess timeout. Default 300 (5 min)."
        max_log_lines:
          type: integer
          minimum: 1
          maximum: 2000
          description: "Cap on stdout/stderr lines. Default 200."
    side_effects: filesystem
    required_initiative_level: L4
    archetype_tags: [actuator, software_engineer]

  memory_challenge.v1:
    name: memory_challenge
    version: "1"
    description: |
      Stamp a memory entry as challenged (ADR-0027-amendment §7.4).
      Distinct from a contradiction: a challenge is operator scrutiny
      WITHOUT a competing later entry. Updates last_challenged_at to
      NOW; surfaces through memory_recall.v1's staleness threshold
      check. Operator-driven by convention — gated via constitutional
      kit (operator deliberately includes this tool only on agents
      that should surface the signal on their behalf). Mirrors
      memory_verify.v1's challenger_id pattern: the human's
      identifier lands in the audit-event payload. Refuses to
      challenge entries the calling agent can't see (private to a
      different agent). The note (if any) lands in audit only — the
      entry's content + claim_type stay unchanged.
    input_schema:
      type: object
      required: [entry_id, challenger_id]
      properties:
        entry_id:
          type: string
          description: "ID of the memory entry to challenge."
        challenger_id:
          type: string
          description: "Identifier of the human challenger (operator handle, key fingerprint)."
        note:
          type: string
          maxLength: 500
          description: "Optional free-text reason for the challenge."
    side_effects: filesystem
    archetype_tags: [observer, guardian]

  memory_flag_contradiction.v1:
    name: memory_flag_contradiction
    version: "1"
    description: |
      Stamp a row in memory_contradictions naming both sides of a
      contradiction (ADR-0036 T2). Distinct from memory_challenge.v1:
      a challenge marks ONE entry as in-question; a contradiction
      names TWO entries (earlier + later) that disagree. Action
      surface for the Verifier Loop role; also reachable by operators
      via constitutional kit gating. Validates both entries exist +
      are reachable by the calling agent, then writes through the
      single-writer SQLite lock. detected_by = ctx.instance_id
      so operators can audit the Verifier's track record per
      ADR-0036 §4.2. The note (if any) lands in the audit-event
      payload, NOT on the contradiction row.
    input_schema:
      type: object
      required: [earlier_entry_id, later_entry_id, contradiction_kind, confidence]
      properties:
        earlier_entry_id:
          type: string
          description: "ID of the older memory entry (the 'former claim' side)."
        later_entry_id:
          type: string
          description: "ID of the newer memory entry (the 'competing claim' side)."
        contradiction_kind:
          type: string
          enum: [direct, updated, qualified, retracted]
          description: "Kind per ADR-0027-am §7.3 CHECK enum."
        confidence:
          type: string
          enum: [low, medium, high]
          description: "Verifier confidence. Verifier role refuses below high via constitutional gate."
        note:
          type: string
          maxLength: 500
          description: "Optional free-text rationale; lands in audit payload only."
    side_effects: filesystem
    required_initiative_level: L3
    archetype_tags: [guardian]

  memory_tag_outcome.v1:
    name: memory_tag_outcome
    version: "1"
    description: |
      Operator-driven reinforcement of procedural-shortcut hits
      (ADR-0054 T5). The chat-tab thumbs UI dispatches this with
      outcome ∈ {good, bad, neutral}; the tool calls strengthen
      / weaken / no-op on the agent's ProceduralShortcutsTable.
      side_effects=read_only because the mutation is per-instance
      counter integers — the agent's own state per ADR-0001 D2
      (identity invariance: this table is per-instance state,
      not identity). required_initiative_level=L2 because
      operator-initiated by design — the chat-tab thumbs widget
      is the load-bearing caller; the agent never autonomously
      tags its own outcomes. A row with net-negative
      reinforcement (failure_count > success_count) stays in the
      table but search_by_cosine soft-deletes it from the match
      path; the output's soft_deleted boolean makes that state
      observable to the UI ("this pattern won't fire again").
      Refuses cross-agent tags as a structural fence against
      privilege escalation. Refuses cleanly with "procedural
      shortcut substrate is not wired" when ctx.procedural_shortcuts
      is None (pre-T6 daemons).
    input_schema:
      type: object
      required: [shortcut_id, outcome]
      properties:
        shortcut_id:
          type: string
          minLength: 1
          description: "The shortcut row to tag. Must belong to the calling agent."
        outcome:
          type: string
          enum: [good, bad, neutral]
          description: "good=strengthen +1, bad=weaken +1, neutral=no counter change but still audit-visible."
        note:
          type: string
          maxLength: 300
          description: "Optional free-text context; lands in metadata only."
    side_effects: read_only
    required_initiative_level: L2
    archetype_tags: [companion, assistant]

  llm_think.v1:
    name: llm_think
    version: "1"
    description: |
      Audited LLM completion as a dispatchable tool. The bridge tool
      that lets Forest agents actually use the active LLM provider —
      every call goes through the governance pipeline (constitution
      constraints, genre kit-tier ceiling, per-task task_caps,
      hardware quarantine) and lands in the audit chain as
      tool_call_dispatched → tool_call_succeeded/failed with token
      counts reported. Side_effects=read_only because the LLM call
      itself produces no external mutation; this lets Guardian-genre
      agents (e.g. code_reviewer in a coding triune) think out loud
      without per-call human approval. Honors T2.2b usage_cap_tokens
      task_cap. Default system prompt derives agent identity from
      role + genre; operators can override with `system`. Default
      task_kind="conversation"; pass "generate" for heavier reasoning
      to route to the FSF_LOCAL_MODEL_GENERATE override.
    input_schema:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 32000
          description: "The user/operator question or instruction."
        system:
          type: string
          description: "System prompt override. Defaults to a minimal one derived from agent role + genre."
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          default: 800
        task_kind:
          type: string
          enum: [classify, generate, safety_check, conversation, tool_use]
          default: conversation
          description: "Routes to the model the operator picked for this task_kind via FSF_LOCAL_MODEL_<KIND>."
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: "Provider passthrough; default left to provider."
    side_effects: read_only
    # ADR-0051 T3: needs ctx.provider — the bound LLM provider with
    # HTTP client + credentials + token accounting. Can't pickle the
    # provider handle, and the provider owns the rate-limit + cost
    # accounting that the dispatcher reconciles back into the audit
    # chain. Stays in-process regardless of FSF_TOOL_SANDBOX mode.
    sandbox_eligible: false
    archetype_tags: [system_architect, software_engineer, code_reviewer, companion, researcher, investigator, guardian]

  # ===========================================================
  # B363 — six curated-prompt LLM tools that revive the dead-
  # skill set flagged by section-02-skill-manifests. Each is a
  # thin wrapper over provider.complete with a stable per-tool
  # system prompt; same read_only side-effects posture as
  # llm_think.v1 so Guardian-genre agents can call them without
  # per-call human approval. Implementations share
  # _prompt_template_base for consistent audit shape +
  # max_tokens/task_kind/temperature handling.
  #
  # Why not just call llm_think with operator-supplied prompts:
  # each curated tool's audit row records the INTENT (text_summarize
  # was called) rather than 'llm_think with prompt = ...'. That
  # gives the operator's audit-chain readback a typed surface
  # instead of a wall of free-form prompts. Skills can also pin
  # to a specific curated tool, so a workflow's behavior doesn't
  # drift when an operator re-words their llm_think prompt.
  # ===========================================================

  text_summarize.v1:
    name: text_summarize
    version: "1"
    description: |
      Summarize a text blob to a target length and style. Wraps an
      LLM call with a stable summarization system prompt. Output
      is a draft summary; never modifies the source. Used by
      agent_activity_digest, agent_introspect, commit_changelog,
      memory_consolidate, morning_briefing, release_notes.
    input_schema:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 16000
          description: "The text blob to summarize."
        target_words:
          type: integer
          minimum: 10
          maximum: 1500
          default: 150
        style:
          type: string
          enum: [bullet_points, paragraph, tldr]
          default: paragraph
        focus:
          type: string
          description: "Optional emphasis hint - the summary will prioritize this angle."
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          default: 600
        task_kind:
          type: string
          enum: [classify, generate, safety_check, conversation, tool_use]
          default: generate
        temperature:
          type: number
          minimum: 0
          maximum: 2
    side_effects: read_only
    sandbox_eligible: false
    archetype_tags: [companion, researcher, system_architect, code_reviewer, investigator, guardian]

  code_explain.v1:
    name: code_explain
    version: "1"
    description: |
      Explain what a code snippet does. Audience-tunable
      (novice/peer/expert). Reading-only; never modifies the
      code. Used by bug_report_polish + code_review_quick.
    input_schema:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 16000
        audience:
          type: string
          enum: [novice, peer, expert]
          default: peer
        language:
          type: string
          description: "Optional language hint when extension/contents are ambiguous."
        focus:
          type: string
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          default: 800
        task_kind:
          type: string
          enum: [classify, generate, safety_check, conversation, tool_use]
          default: generate
        temperature:
          type: number
          minimum: 0
          maximum: 2
    side_effects: read_only
    sandbox_eligible: false
    archetype_tags: [code_reviewer, software_engineer, system_architect, researcher]

  email_draft.v1:
    name: email_draft
    version: "1"
    description: |
      Draft an email body from intent + audience + tone. Output is
      a draft for operator review — tool NEVER sends the email
      itself (no network side-effects). Used by bug_report_polish
      + meeting_followup.
    input_schema:
      type: object
      required: [intent]
      properties:
        intent:
          type: string
          minLength: 1
          maxLength: 16000
          description: "What the operator wants the email to convey."
        recipient:
          type: string
          maxLength: 200
        sender:
          type: string
          maxLength: 200
        tone:
          type: string
          enum: [formal, friendly, direct, apologetic, neutral]
          default: neutral
        length:
          type: string
          enum: [short, medium, long]
          default: medium
        context:
          type: string
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          default: 700
        task_kind:
          type: string
          enum: [classify, generate, safety_check, conversation, tool_use]
          default: generate
        temperature:
          type: number
          minimum: 0
          maximum: 2
    side_effects: read_only
    sandbox_eligible: false
    archetype_tags: [companion, researcher, code_reviewer]

  commit_message.v1:
    name: commit_message
    version: "1"
    description: |
      Generate a commit message from a diff or change summary.
      Output is text only — tool NEVER runs git commands. Used
      by commit_changelog + release_notes.
    input_schema:
      type: object
      required: [diff]
      properties:
        diff:
          type: string
          minLength: 1
          maxLength: 16000
          description: "The diff or change summary."
        format:
          type: string
          enum: [conventional, imperative, plain]
          default: conventional
        scope:
          type: string
          maxLength: 100
        ticket:
          type: string
          maxLength: 100
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          default: 400
        task_kind:
          type: string
          enum: [classify, generate, safety_check, conversation, tool_use]
          default: generate
        temperature:
          type: number
          minimum: 0
          maximum: 2
    side_effects: read_only
    sandbox_eligible: false
    archetype_tags: [software_engineer, system_architect, code_reviewer]

  action_items_extract.v1:
    name: action_items_extract
    version: "1"
    description: |
      Extract ownable action items from a text blob (meeting
      transcript, conversation log, document). Returns a
      structured list. Used by meeting_followup.
    input_schema:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 16000
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
        require_owner:
          type: boolean
          default: false
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          default: 700
        task_kind:
          type: string
          enum: [classify, generate, safety_check, conversation, tool_use]
          default: classify
        temperature:
          type: number
          minimum: 0
          maximum: 2
    side_effects: read_only
    sandbox_eligible: false
    archetype_tags: [companion, researcher, system_architect]

  tone_shift.v1:
    name: tone_shift
    version: "1"
    description: |
      Rewrite a text blob in a different tone/register while
      preserving meaning, facts, and numbers. Used by
      release_notes to adapt a technical draft for a less-
      technical audience.
    input_schema:
      type: object
      required: [text, target_tone]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 16000
        target_tone:
          type: string
          enum: [formal, casual, professional, friendly, direct, gentle, enthusiastic, neutral, executive_summary, marketing, technical]
        preserve_structure:
          type: boolean
          default: true
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          default: 800
        task_kind:
          type: string
          enum: [classify, generate, safety_check, conversation, tool_use]
          default: generate
        temperature:
          type: number
          minimum: 0
          maximum: 2
    side_effects: read_only
    sandbox_eligible: false
    archetype_tags: [companion, code_reviewer, researcher]

  code_read.v1:
    name: code_read
    version: "1"
    description: |
      Read a file from the local filesystem. Side_effects=read_only,
      so runnable inside Guardian-genre agents without per-call human
      approval. Per-agent constitution must populate
      constraints.allowed_paths (list of absolute roots); the agent
      cannot read files outside those roots even via symlink or
      relative-path tricks (Path.resolve() applied before allowlist
      check). Output is utf-8 text only; binary files refuse cleanly.
      Cap on returned bytes (default 100 KB, max 2 MB) keeps a single
      tool result from sucking the whole repo into the audit chain.
    input_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: "Absolute or relative path; resolved before allowlist check."
        max_bytes:
          type: integer
          minimum: 1
          maximum: 2000000
          default: 100000
    side_effects: read_only
    archetype_tags: [system_architect, software_engineer, code_reviewer]

  code_edit.v1:
    name: code_edit
    version: "1"
    description: |
      Write a file to the local filesystem. Side_effects=filesystem,
      so the constraint resolver lands requires_human_approval=true on
      Engineer's actuator-genre kit (every dispatch gates through the
      operator queue). Per-agent constitution must populate
      constraints.allowed_paths; same Path.resolve() defense as
      code_read.v1. Modes: "write" (default — replaces content,
      atomic via temp+rename) or "append". Refuses if parent
      directory doesn't exist (won't create dirs; use shell_exec for
      mkdir). Content cap 5 MB.
    input_schema:
      type: object
      required: [path, content]
      properties:
        path: {type: string}
        content: {type: string, maxLength: 5000000}
        mode:
          type: string
          enum: [write, append]
          default: write
    side_effects: filesystem
    archetype_tags: [software_engineer]

  shell_exec.v1:
    name: shell_exec
    version: "1"
    description: |
      Run a command via argv-list (NEVER shell=True). Side_effects=
      external, so this gates through human approval on every call
      for Engineer (actuator genre). Strict safety: argv must be a
      list of strings; argv[0] must be a bare command name (no
      slashes — absolute paths refused) and must be in
      constraints.allowed_commands; cwd (if supplied) must be inside
      constraints.allowed_paths; mandatory subprocess timeout
      (default 30s, max 300s). Stdout/stderr captured + truncated
      (100 KB / 50 KB) so verbose tools don't blow the audit chain.
      Subprocess inherits the daemon's environment — operators
      should run the daemon under a restricted user account if env-
      leakage is a concern.
    input_schema:
      type: object
      required: [argv]
      properties:
        argv:
          type: array
          minItems: 1
          items: {type: string}
        cwd:
          type: string
          description: "Working directory; defaults to first allowed_path."
        timeout_s:
          type: integer
          minimum: 1
          maximum: 300
          default: 30
    side_effects: external
    archetype_tags: [software_engineer]

# Per-archetype standard kits. Each role's kit is the default tool
# surface for a freshly-birthed agent of that role; per-request
# tools_add / tools_remove on /birth or /spawn override it.
archetypes:
  # ---- Original 5 archetype kits (post C-1 dissection 2026-04-30) -------
  # The 6 zombie tools that lived in these kits at v0.1 were either
  # newly implemented (dns_lookup.v1) or substituted with existing
  # equivalent v0.2 tools. See docs/audits/2026-04-30-c1-zombie-tool-
  # dissection.md for per-tool §0 verdicts.
  network_watcher:
    # network_watcher is in genre observer (max_side_effects=read_only).
    # dns_lookup.v1 is a network side-effect tool; keeping it in the
    # standard kit would trip the genre kit-tier ceiling at birth time.
    # The original kit had this latent bug — it never tripped because
    # dns_lookup wasn't implemented (dispatcher refused with
    # unknown_tool before the kit-tier check fired). Now that
    # dns_lookup exists, we leave it OUT of the standard kit and
    # operators who genuinely want network_watcher to do DNS lookups
    # either:
    #   (a) birth with tools_add: [{name: dns_lookup, version: 1}], or
    #   (b) use the investigator-genre roles (anomaly_investigator),
    #       which already get dns_lookup-equivalent capability.
    standard_tools:
      # packet_query.v1 deferred to Phase G tshark_pcap_query.v1
      # dns_lookup.v1 NOT included — see comment above (genre ceiling)
      - traffic_flow_local.v1   # was flow_summary.v1; read_only — fits observer
      - timestamp_window.v1
      - llm_think.v1            # B392 — operator-readable reasoning over observations
      - text_summarize.v1       # B392 — operator-facing summaries (read_only)
      - memory_recall.v1        # B392 — base read access to private memory
      - memory_write.v1         # B392 — write own observation log
  log_analyst:
    standard_tools:
      - log_scan.v1              # was log_grep.v1
      - log_aggregate.v1
      - timestamp_window.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392
      - memory_recall.v1
      - memory_write.v1
  anomaly_investigator:
    standard_tools:
      # packet_query.v1 deferred to Phase G tshark_pcap_query.v1
      - traffic_flow_local.v1    # was flow_summary.v1 (shared with network_watcher)
      - log_scan.v1              # was log_grep.v1
      - behavioral_baseline.v1   # half of was baseline_compare.v1
      - anomaly_score.v1         # half of was baseline_compare.v1
      - log_correlate.v1         # was correlation_window.v1
      - timestamp_window.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392
      - memory_recall.v1
      - memory_write.v1

  # ---- ADR-0033 Phase D — Security Swarm role kits (9) -------------------
  # Every Swarm role gets memory_recall + memory_write so they can read and
  # write at scope='lineage' for inter-tier handoff. Mid + high tier also
  # get delegate.v1 so they can initiate cross-agent chains.
  #
  # NOTE: three tools called out in ADR-0033 §4 are NOT in the kit because
  # they're deferred: config_audit (B1 follow-on), mfa_check (B1 deferred
  # pending operator scoping of MFA posture target), decoy_file (functionally
  # absorbed by canary_token.v1). When those land, add them to the
  # corresponding role.
  # B392 — all 9-swarm SOC archetypes get llm_think + text_summarize
  # so the operator can get readable summaries of their findings.
  # Both are read_only; fits guardian/investigator ceiling for every
  # role here without exception.
  patch_patrol:
    standard_tools:
      - patch_check.v1
      - software_inventory.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392

  gatekeeper:
    standard_tools:
      - port_policy_audit.v1
      - usb_device_audit.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392

  log_lurker:
    standard_tools:
      - log_scan.v1
      - log_aggregate.v1
      - audit_chain_verify.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - delegate.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392

  anomaly_ace:
