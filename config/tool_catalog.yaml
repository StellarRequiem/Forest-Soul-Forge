      - log_correlate.v1
      - anomaly_score.v1
      - ueba_track.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - delegate.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392

  net_ninja:
    standard_tools:
      - traffic_flow_local.v1
      - lateral_movement_detect.v1
      - port_scan_local.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - delegate.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392

  response_rogue:
    standard_tools:
      - triage.v1
      - isolate_process.v1
      - evidence_collect.v1
      - timestamp_window.v1
      - memory_recall.v1
      - memory_write.v1
      - delegate.v1
      - llm_think.v1             # B392
      - text_summarize.v1        # B392

  zero_zero:
    standard_tools:
      - jit_access.v1
      - continuous_verify.v1
      - posture_check.v1
      - dynamic_policy.v1
      - timestamp_window.v1
