# ADR-0066 Phase D — purple-team scenario starter library.
# See docs/runbooks/soar-playbooks.md for the scenario DSL reference.
#
# This scenario emulates keychain credential theft and expects the
# keychain_credential_access rule to catch it.
scenario_id: keychain-credential-access
version: '1'
description: |
  Emulates an adversary spawning /usr/bin/security to dump or query
  the macOS keychain (a Credentials-from-Password-Stores step).
  Exercises the keychain_credential_access detection rule.
technique: attack.T1555.001      # Credentials from Password Stores: Keychain

events:
  - source: endpoint_sensor
    event_type: process_spawn
    severity: warn
    payload:
      process:
        image: /usr/bin/security
        argv: ["security", "dump-keychain"]

expect:
  detection_rule_id: keychain_credential_access
