  # ---- Architectural invariants from CLAUDE.md ----------------------------

  - id: schema_version
    statement: "The current registry schema version is v19 (post-B243; agents table has public_key column for ADR-0049)."
    domain_keywords: ["schema version", "schema_version", "registry version", "db version"]
    canonical_terms: ["v19", "schema 19", "schema version 19"]
    forbidden_terms: ["v15", "v16", "v17", "v18", "v20", "v21"]
