  - id: audit_chain_path
    statement: "The LIVE audit chain is examples/audit_chain.jsonl, NOT data/audit_chain.jsonl (override via FSF_AUDIT_CHAIN_PATH). data/audit_chain.jsonl is a stale dev fixture."
    domain_keywords: ["audit chain path", "audit_chain.jsonl", "chain location"]
    canonical_terms: ["examples/audit_chain.jsonl"]
    forbidden_terms: []
    severity: HIGH
    last_confirmed_at: "2026-05-12"
    notes: "CLAUDE.md §architectural-invariants. Don't repeat the B134 drift."

  - id: write_lock_pattern
    statement: "All SQLite writes go through app.state.write_lock (threading.RLock). New writers MUST acquire it."
    domain_keywords: ["write lock", "single writer", "concurrency model", "sqlite writer"]
    canonical_terms: ["app.state.write_lock", "threading.rlock", "write_lock"]
    forbidden_terms: ["threading.lock", "multi-writer", "multiprocess writer"]
    severity: HIGH
    last_confirmed_at: "2026-05-12"
    notes: |
      RLock is reentrant by design — nested skill runs re-acquire.
      Plain threading.Lock would deadlock; flag explicitly.

  # ---- Identity invariants (ADR-0001) -------------------------------------

  - id: dna_identity
    statement: "DNA is content-addressed: same trait profile → same DNA. DNA derivation MUST NOT change without a major version bump + migration plan."
    domain_keywords: [dna, "agent identity", "content-addressed", "agent hash"]
    canonical_terms: ["content-addressed", "same trait profile", "deterministic dna", "from trait profile"]
    forbidden_terms: [random, uuid, "timestamp-based", "uuid4", "uuid-based", "random.choice"]
    severity: CRITICAL
    last_confirmed_at: "2026-05-12"
    notes: |
      ADR-0001 D2 architectural invariant. A claim that DNA is random,
      uuid-based, or timestamp-based is a hallucination that breaks
      verification end-to-end. Forbidden terms kept short (single words
      or phrases that appear regardless of word order in the claim).

  - id: constitution_hash_immutable
    statement: "A born agent's constitution_hash is immutable. Recomputing invalidates verification."
    domain_keywords: ["constitution hash", "constitution_hash", "agent constitution"]
    canonical_terms: [immutable, "bound to identity", "do not recompute", "never changes"]
    forbidden_terms: [mutable, recomputed, "recompute on", dynamic, regenerate, changeable]
    severity: CRITICAL
    last_confirmed_at: "2026-05-12"
    notes: |
      Forbidden list is single-word friendly so claims like
      'constitution hash is mutable' or 'recomputed on edit' match
      regardless of word order around them.
