# ADR-0063 — Operator-asserted ground truth.
#
# This file IS the operator's reality. The Reality Anchor
# (verify_claim.v1 + RealityAnchorStep in the governance
# pipeline) consults this catalog before letting an agent
# act on a claim that conflicts with these facts.
#
# Edit this file whenever your reality changes (license,
# email, daemon URL, schema version, etc.). The loader
# hot-reloads on POST /reality-anchor/reload (T7 — queued).
# Until that endpoint ships, daemon restart picks up edits.
#
# Schema per fact:
#   id              — short snake_case identifier. Stable; used
#                     as the citation key in audit events.
#   statement       — canonical English. Used in operator-
#                     facing flag messages.
#   domain_keywords — claim must mention AT LEAST ONE of these
#                     words to be "in scope" for this fact.
#                     If the claim's domain doesn't match,
#                     the fact is skipped (no false positives
#                     from unrelated claims).
#   canonical_terms — presence in the claim = CONFIRMS the
#                     fact. Forbidden terms below are ignored
#                     when a canonical term is present.
#   forbidden_terms — presence in the claim WITHOUT a
#                     canonical term = CONTRADICTS the fact.
#                     Trigger for refusal at severity ≥ HIGH.
#   severity        — CRITICAL | HIGH | MEDIUM | LOW | INFO.
#                     CRITICAL + HIGH refuse the action;
#                     MEDIUM/LOW warn; INFO is silent.
#   last_confirmed_at — ISO date. Operator updates this on
#                     edit. Facts older than 90d emit a
#                     staleness warning in /reality-anchor
#                     status (T7).
#   notes           — optional free-text rationale.

catalog_version: 1
catalog_updated: "2026-05-12"

facts:

  # ---- Operator identity --------------------------------------------------

  - id: operator_identity
    statement: "The operator's identifier is 'alex'."
    domain_keywords: [operator, owner, user, "logged in as"]
    canonical_terms: [alex]
    forbidden_terms: []
    severity: HIGH
    last_confirmed_at: "2026-05-12"

  - id: operator_email
    statement: "The operator's email is alexanderprice91@yahoo.com."
    domain_keywords: ["operator email", "user email", "owner email", "alex's email", "operator's email", "user's email", "alex@"]
    canonical_terms: ["alexanderprice91@yahoo.com"]
    forbidden_terms: ["@gmail.com", "@outlook.com", "@anthropic.com", "@hotmail.com", "@icloud.com"]
    severity: HIGH
    last_confirmed_at: "2026-05-12"
    notes: |
      Forbidden list catches LLMs that 'fill in a plausible' email.
      Domain keywords include both apostrophe forms because LLM-emitted
      claims drift between the two.

  # ---- License + project identity -----------------------------------------

  - id: license
    statement: "Forest Soul Forge is licensed under the Elastic License 2.0 (ELv2), effective 2026-05-12 (commit f799757 onward). Commits at or before f799757 remain under Apache 2.0 per §4 irrevocability."
    domain_keywords: [license, licensed, licensing, "open source", "open-source"]
    canonical_terms: [elv2, "elastic license", "elastic license 2.0"]
    forbidden_terms: [mit, gpl, "mpl", "bsd-2", "bsd-3", "agpl", "lgpl", "proprietary"]
    severity: HIGH
    last_confirmed_at: "2026-05-12"
    notes: |
      Apache 2.0 is NOT a forbidden term — Apache covers the historical
      pre-B245 commits. ELv2 is the current license. Both can be true.

