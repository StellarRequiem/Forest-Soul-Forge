# ADR-0065 detection-as-code — starter rule library.
id: launchdaemon_persistence_write
title: File write into a LaunchDaemon / LaunchAgent directory
description: |
  Flags a file_change whose target directory is one of the macOS
  persistence locations launchd reads at boot / login. Dropping a
  property-list job here is the canonical macOS persistence move.
  Legitimate installers also write here, so correlate the match
  against the writing process and whether an install was expected.

  STARTER TEMPLATE — activates once an adapter feeding file_change
  events is wired. The two directories below are the system-wide
  LaunchDaemons + LaunchAgents trees; add the per-user
  ~/Library/LaunchAgents path as a third selection if your adapter
  resolves home directories to a stable form.
level: high
tags:
  - attack.T1543.004      # Create or Modify System Process: Launch Daemon
logsource:
  event_type: file_change
detection:
  system_daemons:
    file.directory: /Library/LaunchDaemons
  system_agents:
    file.directory: /Library/LaunchAgents
  condition: system_daemons or system_agents
