# ADR-0065 detection-as-code — starter rule library.
id: osascript_interpreter_spawn
title: AppleScript interpreter (osascript) spawned
description: |
  Flags a process_spawn of /usr/bin/osascript. Adversaries use
  AppleScript via osascript for execution, UI scripting, and
  credential-prompt phishing on macOS. osascript does run in some
  legitimate admin + app-automation flows, so this is a medium-
  confidence lead — pair it with the spawning parent process and
  the command line during triage.

  STARTER TEMPLATE — activates once an adapter feeding process_spawn
  events is wired. Tune by adding a parent-process exclusion
  selection once you observe your host's baseline osascript callers.
level: medium
tags:
  - attack.T1059.002      # Command and Scripting Interpreter: AppleScript
logsource:
  event_type: process_spawn
detection:
  selection:
    process.image: /usr/bin/osascript
  condition: selection
