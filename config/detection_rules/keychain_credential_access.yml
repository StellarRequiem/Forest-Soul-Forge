# ADR-0065 detection-as-code — starter rule library.
id: keychain_credential_access
title: Keychain command-line tool (security) spawned
description: |
  Flags a process_spawn of /usr/bin/security, the command-line
  interface to the macOS keychain. `security dump-keychain` and
  `security find-generic-password` are common credential-theft
  steps. The tool has legitimate scripting uses, so this is a
  medium-confidence lead — the discriminating signal is the
  subcommand, which lives in the command line; correlate during
  triage.

  STARTER TEMPLATE — activates once an adapter feeding process_spawn
  events is wired.
level: medium
tags:
  - attack.T1555.001      # Credentials from Password Stores: Keychain
logsource:
  event_type: process_spawn
detection:
  selection:
    process.image: /usr/bin/security
  condition: selection
