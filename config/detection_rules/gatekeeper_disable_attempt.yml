# ADR-0065 detection-as-code — starter rule library.
id: gatekeeper_disable_attempt
title: Gatekeeper assessment tool (spctl) spawned
description: |
  Flags a process_spawn of /usr/sbin/spctl, the command-line front
  end for macOS Gatekeeper. Adversaries run `spctl --master-disable`
  (or per-app disables) to let unsigned / unnotarized payloads
  execute. spctl is rare in normal interactive use; a spawn is a
  high-confidence lead. Triage the command line to confirm whether
  the call disabled assessment or merely queried status.

  STARTER TEMPLATE — activates once an adapter feeding process_spawn
  events is wired.
level: high
tags:
  - attack.T1553.001      # Subvert Trust Controls: Gatekeeper Bypass
logsource:
  event_type: process_spawn
detection:
  selection:
    process.image: /usr/sbin/spctl
  condition: selection
