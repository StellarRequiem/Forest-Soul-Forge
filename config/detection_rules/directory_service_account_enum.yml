# ADR-0065 detection-as-code — starter rule library.
id: directory_service_account_enum
title: Directory Service command (dscl) spawned
description: |
  Flags a process_spawn of /usr/bin/dscl, the Directory Service
  command-line utility. `dscl . -list /Users` is a standard local
  account-discovery step; `dscl . -create` is used to add accounts.
  dscl appears in some legitimate admin scripts, so this is a
  low-confidence lead on its own — its value is volume + sequence
  (many dscl calls in one batch, or dscl right after an initial
  access event).

  STARTER TEMPLATE — activates once an adapter feeding process_spawn
  events is wired.
level: low
tags:
  - attack.T1087.001      # Account Discovery: Local Account
logsource:
  event_type: process_spawn
detection:
  selection:
    process.image: /usr/bin/dscl
  condition: selection
